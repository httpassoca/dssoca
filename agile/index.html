torybook","dx"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a consumer exploring Storybook, I can exercise every prop via controls. Several\u003c/p>\n\u003cp>stories expose only a fraction of their component's API.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Button story: add \u003ccode>size\u003c/code>, \u003ccode>loading\u003c/code>, \u003ccode>loadingLabel\u003c/code>, \u003ccode>fullWidth\u003c/code>, \u003ccode>iconOnly\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>leading\u003c/code>, \u003ccode>trailing\u003c/code> argTypes.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Badge story: add \u003ccode>size\u003c/code>, \u003ccode>dot\u003c/code>, \u003ccode>count\u003c/code>, \u003ccode>max\u003c/code>, \u003ccode>live\u003c/code>, \u003ccode>label\u003c/code>, \u003ccode>ondismiss\u003c/code>.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Input story: add \u003ccode>size\u003c/code>, \u003ccode>invalid\u003c/code>, \u003ccode>error\u003c/code>, \u003ccode>hint\u003c/code>, \u003ccode>clearable\u003c/code>, \u003ccode>prefix\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>suffix\u003c/code>, \u003ccode>readonly\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>MetricTile story: add \u003ccode>prefix\u003c/code>, \u003ccode>trend\u003c/code>, \u003ccode>loading\u003c/code>, \u003ccode>chart\u003c/code>.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Sidebar story: add \u003ccode>size\u003c/code>, \u003ccode>collapsed\u003c/code>, \u003ccode>onToggleCollapsed\u003c/code>.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>SegmentedControl story: add \u003ccode>value\u003c/code> + remaining props; Link story: add \u003ccode>size\u003c/code>.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>size\u003c/code> argType added across the remaining stories that support it (BottomNav, Card,\u003c/li>\n\u003c/ul>\n\u003cp>  Topbar, Sparkline, Toaster, LogStream, Menu) — plus Heading, Container, Textarea\u003c/p>\n\u003cp>  (Spinner already had it).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>An intro/overview MDX page (component index + axis explanation) added to\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>src/stories/\u003c/code> (\u003ccode>Introduction.mdx\u003c/code>). No \u003ccode>.storybook/main.ts\u003c/code> change needed — its\u003c/p>\n\u003cp>  \u003ccode>stories\u003c/code> glob already includes \u003ccode>../src/**/*.mdx\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Story-level \u003ccode>parameters.a11y\u003c/code> set where useful (form inputs, buttons):\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>a11y: { test: 'error' }\u003c/code> on Button, Badge, Input, Textarea, SegmentedControl, Link.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stories stay in \u003ccode>src/stories/\u003c/code> (never \u003ccode>src/lib/\u003c/code>); Storybook builds clean\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>pnpm build-storybook\u003c/code> green, 188 index entries incl. \u003ccode>introduction--docs\u003c/code>).\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Optional: shared \u003ccode>render: template\u003c/code> snippets for Menu/MetricTile/SegmentedControl/\u003c/li>\n\u003c/ul>\n\u003cp>  ServiceCard/Sparkline/LogStream stories to dedupe markup and make controls bind reliably.\u003c/p>\n\u003cp>  → Done for Menu (replaced six per-story templates with one shared snippet), MetricTile\u003c/p>\n\u003cp>  (needed for the \u003ccode>chart\u003c/code> snippet slot), and SegmentedControl. Sparkline/LogStream/\u003c/p>\n\u003cp>  ServiceCard pass plain args and bind fine without one.\u003c/p>\n\u003cul>\n\u003cli>Snippet-valued props are toggled via story-only booleans (\u003ccode>withLeading\u003c/code>, \u003ccode>withTrailing\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>withPrefix\u003c/code>, \u003ccode>withSuffix\u003c/code>, \u003ccode>withChart\u003c/code>, \u003ccode>dismissible\u003c/code>) that conditionally pass demo\u003c/p>\n\u003cp>  snippets.\u003c/p>\n\u003cul>\n\u003cli>Defensive wiring for in-flight APIs (props pass through templates; Svelte ignores them\u003c/li>\n\u003c/ul>\n\u003cp>  until the prop lands): Link \u003ccode>disabled\u003c/code>, SegmentedControl component-wide \u003ccode>disabled\u003c/code>,\u003c/p>\n\u003cp>  BottomNav per-item \u003ccode>disabled\u003c/code>, Topbar \u003ccode>ariaLabel\u003c/code>, EmptyState \u003ccode>ariaLabel\u003c/code>. Topbar\u003c/p>\n\u003cp>  object \u003ccode>tabs\u003c/code> / \u003ccode>services\u003c/code> / \u003ccode>clock\u003c/code> argTypes were already covered.\u003c/p>","acTotal":10,"acDone":10},{"id":"DS-0075","type":"story","title":"CI hardening — docs tests, Storybook build, coverage, lint","status":"done","priority":"high","tags":["ci","tooling"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a maintainer, CI catches what the rules require. Today \u003ccode>.github/workflows/ci.yml\u003c/code>\u003c/p>\n\u003cp>runs only \u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm pack\u003c/code> — the docs suite, Storybook build, lint and coverage\u003c/p>\n\u003cp>are unchecked, so \"keep \u003ccode>pnpm docs:test\u003c/code> green\" is enforced by convention only.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>CI runs \u003ccode>pnpm docs:test\u003c/code> (documentation workspace).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>CI runs \u003ccode>pnpm build-storybook\u003c/code> so a broken story can't merge.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Coverage collected (vitest v8 provider) and surfaced in CI (artifact or summary).\u003c/li>\n\u003c/ul>\n\u003cp>  *CI runs \u003ccode>pnpm test:coverage\u003c/code> (new script, \u003ccode>vitest run --coverage\u003c/code>) and uploads\u003c/p>\n\u003cp>  \u003ccode>coverage/\u003c/code> as an artifact; \u003ccode>@vitest/coverage-v8\u003c/code> added. Provider/threshold config lives\u003c/p>\n\u003cp>  in \u003ccode>vitest.config.ts\u003c/code>, owned by DS-0070 (in flight) — defaults apply until it lands.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>ESLint + Prettier introduced (eslint-plugin-svelte, svelte prettier plugin), a\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>lint\u003c/code> script added, and CI runs it; codebase formatted/lint-clean in the same PR.\u003c/p>\n\u003cp>  *Flat \u003ccode>eslint.config.js\u003c/code> (@eslint/js + typescript-eslint + eslint-plugin-svelte +\u003c/p>\n\u003cp>  eslint-config-prettier) and \u003ccode>.prettierrc\u003c/code> matching the dominant style (no semicolons,\u003c/p>\n\u003cp>  single quotes, 2-space, 100 cols) + \u003ccode>.prettierignore\u003c/code>. Scripts: \u003ccode>lint\u003c/code>, \u003ccode>format\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>format:check\u003c/code>. \u003ccode>pnpm lint\u003c/code> passes on the current tree by tuning severities (see\u003c/p>\n\u003cp>  eslint.config.js comments) rather than mass-editing files owned by parallel stories.\u003c/p>\n\u003cp>  \"Formatted in the same PR\" is deferred to the integrator: run \u003ccode>pnpm format\u003c/code> once after\u003c/p>\n\u003cp>  all in-flight edits land, then add \u003ccode>format:check\u003c/code> to CI (intentionally not added yet).*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Workflow has \u003ccode>concurrency\u003c/code> with cancel-in-progress; action versions current;\u003c/li>\n\u003c/ul>\n\u003cp>  Node 24 pinned to match \u003ccode>engines\u003c/code>. *\u003ccode>engines.node &gt;= 24\u003c/code> added to package.json (was\u003c/p>\n\u003cp>  missing); checkout/setup-node bumped to v5; pnpm pinned via \u003ccode>packageManager\u003c/code> + corepack.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>All checks green on the PR that introduces them. *Integrator-dependent: verifiable\u003c/li>\n\u003c/ul>\n\u003cp>  only on the actual PR after all parallel stories merge. \u003ccode>pnpm lint\u003c/code>, \u003ccode>pnpm test\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>pnpm docs:test\u003c/code> and \u003ccode>pnpm pack\u003c/code> were green locally at time of writing; svelte-check\u003c/p>\n\u003cp>  runs non-blocking (see DS-0076).*\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>No user-facing docs surface beyond updating CLAUDE.md's CI description.\u003c/li>\n\u003cli>Depends loosely on [[DS-0070-size-variant-test-coverage]] for the coverage config.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":5},{"id":"DS-0076","type":"story","title":"Fix svelte-check — make `pnpm check` clean and CI-enforceable","status":"done","priority":"high","tags":["typescript","tooling","ci"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a maintainer I can run \u003ccode>pnpm check\u003c/code> and trust the output. It currently reports a known\u003c/p>\n\u003cp>\u003ccode>$lib\u003c/code> alias error plus 50+ errors from \u003ccode>vitest-axe\u003c/code> type augmentation not being visible\u003c/p>\n\u003cp>under svelte-check's tsconfig context, so type regressions go unnoticed (CI skips it).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>vitest-axe matcher types visible to svelte-check: \u003ccode>/// &lt;reference types=\"vitest-axe\" /&gt;\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  in \u003ccode>test/setup.ts\u003c/code> or a tsconfig \u003ccode>types\u003c/code> entry — those errors gone.\u003c/p>\n\u003cp>  *Done via a new \u003ccode>test/types.d.ts\u003c/code> ambient file instead (vitest-axe exports \u003ccode>AxeMatchers\u003c/code>\u003c/p>\n\u003cp>  but never augments vitest's \u003ccode>Assertion\u003c/code> itself, so a reference alone wouldn't help; the\u003c/p>\n\u003cp>  d.ts adds the \u003ccode>declare module 'vitest'\u003c/code> augmentation). \u003ccode>test/setup.ts\u003c/code> untouched.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>The \u003ccode>$lib\u003c/code> alias error resolved (tsconfig context fix) or conclusively documented as\u003c/li>\n\u003c/ul>\n\u003cp>  upstream with the issue linked. *Resolved: root \u003ccode>tsconfig.json\u003c/code> no longer overrides\u003c/p>\n\u003cp>  \u003ccode>module\u003c/code>/\u003ccode>moduleResolution\u003c/code> to \u003ccode>NodeNext\u003c/code>, which broke extensionless \u003ccode>$lib/...\u003c/code> imports.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>moduleResolution\u003c/code> aligned: root \u003ccode>tsconfig.json\u003c/code> uses \u003ccode>NodeNext\u003c/code> while the generated\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>.svelte-kit/tsconfig.json\u003c/code> uses \u003ccode>bundler\u003c/code> — align on \u003ccode>bundler\u003c/code>. *Aligned by inheriting\u003c/p>\n\u003cp>  \u003ccode>bundler\u003c/code>/\u003ccode>esnext\u003c/code> from the generated config (overrides removed). Also added \u003ccode>@types/node\u003c/code>\u003c/p>\n\u003cp>  to satisfy the generated config's \u003ccode>types: [\"node\"]\u003c/code> (was a warning).*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>The known rune-types quirk on \u003ccode>Image.svelte\u003c/code> \u003ccode>$state&lt;T&gt;()\u003c/code> re-checked after the\u003c/li>\n\u003c/ul>\n\u003cp>  tsconfig fixes (it may clear). *Re-checked: it does NOT clear and is now root-caused —\u003c/p>\n\u003cp>  \u003ccode>Image.svelte\u003c/code> declares \u003ccode>let state = $state&lt;State&gt;(...)\u003c/code>; svelte2tsx treats \u003ccode>$state\u003c/code> as a\u003c/p>\n\u003cp>  store subscription of the local variable \u003ccode>state\u003c/code> (circular), shadowing the rune. Fix is to\u003c/p>\n\u003cp>  rename the variable (e.g. \u003ccode>loadState\u003c/code>) in \u003ccode>Image.svelte\u003c/code> — not edited here (file owned by\u003c/p>\n\u003cp>  a parallel story); flagged for the integrator.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm check\u003c/code> exits 0 (or with only documented known issues) and is added to CI.\u003c/li>\n\u003c/ul>\n\u003cp>  *Config-level errors fixed: 73 → 18. All remaining errors are file-level and owned by\u003c/p>\n\u003cp>  in-flight stories: Image.svelte (7, rename above), src/stories/* typings (9),\u003c/p>\n\u003cp>  test/harness/InputHarness.svelte autocomplete/inputmode types (2). Added to CI as a\u003c/p>\n\u003cp>  \u003ccode>continue-on-error\u003c/code> step — integrator removes the flag once those land clean.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>CLAUDE.md \"known \u003ccode>$lib\u003c/code> alias error\" note updated/removed. *Updated: fix documented,\u003c/li>\n\u003c/ul>\n\u003cp>  Image.svelte quirk + non-blocking CI status noted.*\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>See [[DS-0075-ci-hardening]] for the CI wiring; this story makes the check worth wiring.\u003c/li>\n\u003cli>Quirk first recorded in DS-0065 notes.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0077","type":"story","title":"Release automation & packaging polish — changelog, provenance, exports","status":"done","priority":"low","tags":["release","packaging","npm"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a maintainer I cut releases without manual checklists. Releasing is currently a\u003c/p>\n\u003cp>hand-run sequence (bump, branch, tag, \u003ccode>pnpm publish\u003c/code> with OTP); the package exports map\u003c/p>\n\u003cp>lacks a \u003ccode>default\u003c/code> condition and publishes without npm provenance.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Exports map: add \u003ccode>\"default\": \"./dist/index.js\"\u003c/code> after \u003ccode>svelte\u003c/code> in both export\u003c/li>\n\u003c/ul>\n\u003cp>  entries of \u003ccode>package.json\u003c/code>; \u003ccode>publint\u003c/code> stays clean. *Added after \u003ccode>svelte\u003c/code> in the \u003ccode>\".\"\u003c/code>\u003c/p>\n\u003cp>  entry — the only entry with conditions; \u003ccode>./theme.css\u003c/code> and \u003ccode>./tokens.css\u003c/code> are plain\u003c/p>\n\u003cp>  string targets (already their own default) and keep working. \u003ccode>pnpm pack\u003c/code> (publint)\u003c/p>\n\u003cp>  verified clean.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Release flow automated or scripted (changesets or release-please): changelog\u003c/li>\n\u003c/ul>\n\u003cp>  generated, tag + GitHub release created from the release PR. *Chose a small local\u003c/p>\n\u003cp>  script over changesets/release-please (single-maintainer, OTP-gated manual publish —\u003c/p>\n\u003cp>  a bot flow would fight git-flow): \u003ccode>scripts/release.mjs\u003c/code> (\u003ccode>pnpm release\u003c/code>) validates the\u003c/p>\n\u003cp>  semver bump against the last tag, checks the \u003ccode>release/&lt;x.y.z&gt;\u003c/code> branch, generates a\u003c/p>\n\u003cp>  changelog stub from conventional commits since the last tag (\u003ccode>--write\u003c/code> inserts it under\u003c/p>\n\u003cp>  \u003ccode>## [Unreleased]\u003c/code>), and prints the exact tag/GitHub-release/publish/back-merge steps.\u003c/p>\n\u003cp>  Initial \u003ccode>CHANGELOG.md\u003c/code> 0.9.0 entry written from real git history. Tag + GitHub release\u003c/p>\n\u003cp>  remain manual by design (git-flow encoded, not replaced).*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Publish uses \u003ccode>--provenance\u003c/code> (trusted publishing from CI, or documented in the\u003c/li>\n\u003c/ul>\n\u003cp>  manual flow); CLAUDE.md release section updated to match. *Documented in the manual\u003c/p>\n\u003cp>  flow (CLAUDE.md Releasing + the script's printed steps). Full trusted-publishing from\u003c/p>\n\u003cp>  CI (OIDC) is explicitly out of scope — noted in CLAUDE.md.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>A release dry-run (\u003ccode>pnpm pack\u003c/code>) validated in CI. *Verified: ci.yml's\u003c/li>\n\u003c/ul>\n\u003cp>  \"Build + validate package (release dry-run)\" step runs \u003ccode>pnpm pack\u003c/code> (prepack →\u003c/p>\n\u003cp>  svelte-package + CSS + publint → tarball) on every PR.*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (CLAUDE.md release steps).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Keep git-flow semantics (release/x.y.z → main + back-merge) — automation should encode\u003c/li>\n\u003c/ul>\n\u003cp>  it, not replace it.\u003c/p>","acTotal":5,"acDone":5},{"id":"DS-0078","type":"story","title":"Component API consistency — naming conventions, disabled states, small a11y fixes","status":"done","priority":"low","tags":["components","api","a11y"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a consumer, component APIs follow one convention. The scan found naming drift\u003c/p>\n\u003cp>(\u003ccode>title\u003c/code> vs \u003ccode>label\u003c/code>, ad-hoc \u003ccode>ariaLabel\u003c/code> props), missing disabled states on some\u003c/p>\n\u003cp>interactive components, and two small interaction nits.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Naming convention decided and written into DESIGN.md: when a component uses \u003ccode>title\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  vs \u003ccode>label\u003c/code>, and that \u003ccode>ariaLabel\u003c/code> (camelCase) is the standard prop for icon-only/landmark\u003c/p>\n\u003cp>  labels; existing components audited against it (Card/EmptyState \u003ccode>title\u003c/code>, Accordion\u003c/p>\n\u003cp>  \u003ccode>label\u003c/code>; BottomNav/LogStream \u003ccode>ariaLabel\u003c/code>, Topbar/EmptyState lacking one).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>disabled\u003c/code> support added where missing on Link (inert: no href, \u003ccode>role=\"link\"\u003c/code> +\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>aria-disabled=\"true\"\u003c/code>, \u003ccode>tabindex=\"-1\"\u003c/code>, onclick swallowed) and component-wide on\u003c/p>\n\u003cp>  SegmentedControl (per-option exists; group gets \u003ccode>aria-disabled\u003c/code>, segments inert,\u003c/p>\n\u003cp>  no tab stop).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>disabled\u003c/code> on BottomNav items — implemented in the parallel DS-0068/69 workstream; verified at integration (native disabled button, aria-disabled, 4 tests incl. axe).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Image.svelte\u003c/code> lightbox focus-trap selector (~L130-143) excludes disabled focusables\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>:not([disabled]):not([aria-disabled=\"true\"])\u003c/code>; also excludes \u003ccode>tabindex=\"-1\"\u003c/code> elements\u003c/p>\n\u003cp>  such as the backdrop button).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Menu.svelte\u003c/code> \u003ccode>onDocPointerDown\u003c/code> guards \u003ccode>panelEl\u003c/code> (covered by [[DS-0067-ssr-safety-pass]]\u003c/li>\n\u003c/ul>\n\u003cp>  if that lands first).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Any renames are backwards-compatible (alias + deprecation) or batched for a semver\u003c/li>\n\u003c/ul>\n\u003cp>  bump.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests extended for new disabled states; \u003ccode>pnpm test\u003c/code> green.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (docs.config.ts prop tables for every touched component).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Coordinate breaking renames with [[DS-0072-token-docs-sync]]'s \u003ccode>.hs-*\u003c/code> decision — one\u003c/li>\n\u003c/ul>\n\u003cp>  breaking release beats several.\u003c/p>\n\u003cul>\n\u003cli>Implementation (2026-06-12): no renames were made — \u003ccode>Menu.label\u003c/code> / \u003ccode>SegmentedControl.label\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  are documented in DESIGN.md as grandfathered exceptions (any rename batched for a\u003c/p>\n\u003cp>  semver-major). New props, all backwards compatible: \u003ccode>Topbar.ariaLabel\u003c/code> (default\u003c/p>\n\u003cp>  \u003ccode>'Primary'\u003c/code> — previously hardcoded), \u003ccode>EmptyState.ariaLabel\u003c/code> (default unset),\u003c/p>\n\u003cp>  \u003ccode>Link.disabled\u003c/code> (default \u003ccode>false\u003c/code>), \u003ccode>SegmentedControl.disabled\u003c/code> (default \u003ccode>false\u003c/code>).\u003c/p>","acTotal":8,"acDone":8},{"id":"DS-0079","type":"epic","title":"passoca adoption gaps — components & variations missing from the DS","status":"done","priority":"high","tags":["ui","epic","components","adoption"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The \u003ccode>passoca\u003c/code> website (\u003ccode>/home/passoca/dev/passoca\u003c/code>) just completed a real-world migration to dssoca\u003c/p>\n\u003cp>(passoca PR httpassoca/passoca#3), adopting **Button / Input / Link / Accordion / Menu / BottomNav /\u003c/p>\n\u003cp>Topbar\u003cstrong>. The migration succeeded but forced a series of \u003c/strong>site-side workarounds** — global CSS\u003c/p>\n\u003cp>overrides against \u003ccode>.ss-*\u003c/code> internals, hand-copied token values, re-registered icons, recreated\u003c/p>\n\u003cp>recipes — each of which marks a gap in the design system. This epic groups the ten resulting\u003c/p>\n\u003cp>stories: Topbar flexibility (link tabs, optional chrome, responsive strip), four missing\u003c/p>\n\u003cp>components/recipes (Heading, Textarea, Container, Spinner), richer Icon/Menu content, and a\u003c/p>\n\u003cp>tokens-only stylesheet entry for consumers who can't adopt \u003ccode>theme.css\u003c/code> wholesale.\u003c/p>\n\u003cp>Every fix honours the house rules: \u003cstrong>zero border-radius\u003c/strong>, \u003ccode>--ss-*\u003c/code> tokens, \u003ccode>.ss-*\u003c/code> identity\u003c/p>\n\u003cp>prefix, scoped SCSS, Svelte 5 runes, WCAG 2.2 AA, and the tests/docs/agile RULEs.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All child stories (DS-0080 … DS-0089) are done or explicitly descoped.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>The corresponding passoca workarounds can be deleted (each story names the one it removes).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Board rebuilt (\u003ccode>node build.mjs\u003c/code>) as items move.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Sibling epic [[DS-0043-new-components-from-website]] *added* the components the site needed;\u003c/li>\n\u003c/ul>\n\u003cp>  this epic fixes what the *adoption* of those components revealed.\u003c/p>\n\u003cul>\n\u003cli>Findings sourced from the passoca migration branch (passoca PR httpassoca/passoca#3).\u003c/li>\n\u003cli>\u003cstrong>Shipped via \u003ccode>feature/ds-0079-adoption-gaps\u003c/code>\u003c/strong> — all ten stories implemented in one PR:\u003c/li>\n\u003c/ul>\n\u003cp>  Topbar link tabs / optional chrome / responsive strip, new Heading / Container / Textarea /\u003c/p>\n\u003cp>  Spinner components (Spinner animates cli-spinners frames, MIT), seven new Icon glyphs,\u003c/p>\n\u003cp>  Menu leading visuals (snippet/swatch/emoji), and the \u003ccode>dssoca/tokens.css\u003c/code> entry.\u003c/p>\n\u003cp>  Site-side workaround removal in passoca is the consumer's follow-up.\u003c/p>","acTotal":3,"acDone":3},{"id":"DS-0080","type":"story","title":"Topbar: link tabs","status":"done","priority":"high","tags":["ui","topbar","a11y","routing"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer with a router (SvelteKit), I want \u003cstrong>Topbar tabs as links\u003c/strong>. Today \u003ccode>tabs\u003c/code>\u003c/p>\n\u003cp>is a \u003ccode>string[]\u003c/code> rendered as \u003ccode>&lt;button onclick&gt;\u003c/code>, so navigation only works imperatively and the\u003c/p>\n\u003cp>tab's identity *is* its label. Tabs should also accept objects \u003ccode>{ id, label, href }\u003c/code> rendered as\u003c/p>\n\u003cp>real \u003ccode>&lt;a href&gt;\u003c/code> with \u003ccode>aria-current\u003c/code> on the active one — giving consumers SSR-friendly/client\u003c/p>\n\u003cp>routing for free and decoupling the stable \u003ccode>id\u003c/code> from a localized \u003ccode>label\u003c/code>. The passoca site\u003c/p>\n\u003cp>currently round-trips label strings to identify the active tab and calls \u003ccode>goto()\u003c/code> from the\u003c/p>\n\u003cp>click handler; this story removes that workaround.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>tabs\u003c/code> accepts \u003ccode>Array&lt;{ id: string; label: string; href: string }&gt;\u003c/code> (the existing\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>string[]\u003c/code> form keeps working — additive, no breaking change).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Object tabs render \u003ccode>&lt;a href&gt;\u003c/code>; the active tab carries \u003ccode>aria-current\u003c/code> (\u003ccode>\"page\"\u003c/code> for links).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Active-tab matching uses \u003ccode>id\u003c/code>, not the rendered label, so localized labels don't break it.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Works without JS (SSR): links navigate natively (link tabs keep the natural tab order, no\u003c/li>\n\u003c/ul>\n\u003cp>  roving \u003ccode>tabindex=\"-1\"\u003c/code>); \u003ccode>onTab\u003c/code>/click callbacks still fire for consumers who want them.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests cover both tab shapes, \u003ccode>aria-current\u003c/code>, and id-based active matching; \u003ccode>pnpm test\u003c/code> green.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (component-docs Topbar page + usage example with \u003ccode>href\u003c/code> tabs).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]]; sibling Topbar stories\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0081-topbar-optional-chrome]] and [[DS-0082-topbar-responsive-tabs]].\u003c/p>\n\u003cul>\n\u003cli>Site workaround removed: label-string round-tripping + \u003ccode>goto()\u003c/code> in the passoca header.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0081","type":"story","title":"Topbar: optional built-in chrome","status":"done","priority":"high","tags":["ui","topbar","api"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer outside the homelab-dashboard context, I want the Topbar's built-in\u003c/p>\n\u003cp>chrome to be \u003cstrong>opt-out\u003c/strong>. The services status dot (\"6/7 up\"), the stats segments, the ⌘K\u003c/p>\n\u003cp>command chip, and the live clock are currently hardcoded — a portfolio site like passoca shows\u003c/p>\n\u003cp>a meaningless \"6/7 up\" badge and a dead ⌘K chip today. Each piece should be hideable via props\u003c/p>\n\u003cp>(e.g. \u003ccode>services?: false\u003c/code>, \u003ccode>clock?: false\u003c/code>, and the command chip hidden automatically when no\u003c/p>\n\u003cp>\u003ccode>onCommand\u003c/code> handler is passed) so the Topbar degrades gracefully to a plain brand + tabs bar.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Services status dot/summary hideable (\u003ccode>services: false\u003c/code>; \u003ccode>{ up, total }\u003c/code> renders real data).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stats segments hideable the same way (\u003ccode>stats={[]}\u003c/code>).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Live clock hideable (\u003ccode>clock: false\u003c/code>; the 1s interval is also skipped).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>⌘K command chip renders only when an \u003ccode>onCommand\u003c/code> handler is provided (the Cmd/Ctrl+K\u003c/li>\n\u003c/ul>\n\u003cp>  shortcut is likewise only claimed when the handler exists).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Defaults preserve today's rendering for existing dashboard consumers (no breaking change).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests assert each piece can be removed independently and that nothing dead renders;\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pnpm test\u003c/code> green.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (component-docs Topbar prop table + a \"minimal Topbar\" usage example).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]]; sibling Topbar stories\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0080-topbar-link-tabs]] and [[DS-0082-topbar-responsive-tabs]].\u003c/p>\n\u003cul>\n\u003cli>Site workaround removed: passoca currently ships a Topbar advertising \"6/7 up\" services and a\u003c/li>\n\u003c/ul>\n\u003cp>  ⌘K chip that does nothing.\u003c/p>","acTotal":7,"acDone":7},{"id":"DS-0082","type":"story","title":"Topbar: responsive tab strip","status":"done","priority":"high","tags":["ui","topbar","responsive"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer shipping to mobile, I want the Topbar to \u003cstrong>behave at narrow viewports\u003c/strong>.\u003c/p>\n\u003cp>Today the tab strip has no responsive behavior: tabs overflow the bar on small screens. The\u003c/p>\n\u003cp>passoca site papers over this with a global CSS override that hides \u003ccode>.ss-topbar .ws\u003c/code> — exactly\u003c/p>\n\u003cp>the kind of reach-into-internals hack the scoped-styling rule exists to prevent. The Topbar\u003c/p>\n\u003cp>should own a strategy: collapse the strip below a breakpoint, or keep priority tabs visible and\u003c/p>\n\u003cp>move the rest into an overflow menu (the shipped \u003ccode>Menu\u003c/code> component is a natural fit).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>At narrow viewports tabs no longer overflow: the strip shrinks (\u003ccode>min-width: 0\u003c/code>) and\u003c/li>\n\u003c/ul>\n\u003cp>  scrolls horizontally instead of pushing the right-side chrome off-canvas; stat segments\u003c/p>\n\u003cp>  collapse at the documented 720px breakpoint and the strip collapses at 520px (consumers\u003c/p>\n\u003cp>  pair with \u003ccode>BottomNav\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Behavior is driven by documented breakpoints (named Sass constants in the component +\u003c/li>\n\u003c/ul>\n\u003cp>  the Topbar docs page; media queries cannot read CSS custom properties, so these are the\u003c/p>\n\u003cp>  documented-breakpoint path the criterion allows).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Overflowed tabs remain keyboard-reachable (focus scrolls them into view natively) and\u003c/li>\n\u003c/ul>\n\u003cp>  the active tab announces via \u003ccode>aria-current=\"page\"\u003c/code>; WCAG 2.2 AA upheld (axe green).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>No consumer needs to target \u003ccode>.ss-topbar\u003c/code> internals from global CSS (use \u003ccode>tabs={[]}\u003c/code> to\u003c/li>\n\u003c/ul>\n\u003cp>  drop the strip entirely).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests cover the narrow-viewport rendering path's structural hooks (single \u003ccode>nav.ws\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  scroll container, \u003ccode>collapsible\u003c/code> stat hooks, keyboard reach of overflowed tabs); the visual\u003c/p>\n\u003cp>  collapse is exercised in Storybook (\"Many Tabs\" story). \u003ccode>pnpm test\u003c/code> green.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (component-docs Topbar page describes the responsive behavior).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]]; sibling Topbar stories\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0080-topbar-link-tabs]] and [[DS-0081-topbar-optional-chrome]].\u003c/p>\n\u003cul>\n\u003cli>Site workaround removed: passoca's global \u003ccode>.ss-topbar .ws { display: none }\u003c/code> override.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0083","type":"story","title":"Heading component","status":"done","priority":"high","tags":["ui","components","typography"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>Heading\u003c/strong> component for display/page titles — the\u003c/p>\n\u003cp>accent-underline recipe (\u003ccode>.hs-display\u003c/code>-style span underline) with \u003ccode>centered\u003c/code> and \u003ccode>accent\u003c/code>\u003c/p>\n\u003cp>options and a heading-level prop (\u003ccode>h1\u003c/code>…\u003ccode>h6\u003c/code>) so semantics and styling stay independent. Today\u003c/p>\n\u003cp>the recipe exists only as global classes inside \u003ccode>theme.css\u003c/code>, which token-bridge consumers (who\u003c/p>\n\u003cp>can't import \u003ccode>theme.css\u003c/code>, see [[DS-0089-tokens-only-entry]]) must copy by hand — passoca\u003c/p>\n\u003cp>recreated the whole thing inside its \u003ccode>AppTitle\u003c/code> component, which will drift from the DS.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Heading\u003c/code> component with \u003ccode>.ss-heading\u003c/code> identity root: accent-underline span treatment,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>centered\u003c/code> and \u003ccode>accent\u003c/code> boolean options, and a \u003ccode>level\u003c/code> prop rendering the matching \u003ccode>h1\u003c/code>–\u003ccode>h6\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Styled in scoped SCSS from \u003ccode>--ss-*\u003c/code> tokens (rescales across sm/md/lg); zero border-radius.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Usable without importing \u003ccode>theme.css\u003c/code> (component carries its own recipe; pairs with\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0089-tokens-only-entry]]).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Additive: new file + barrel export; existing \u003ccode>theme.css\u003c/code> classes untouched (or aliased to\u003c/li>\n\u003c/ul>\n\u003cp>  the same tokens).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests cover level rendering and option combinations; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (new docs.config.ts component page; \u003ccode>docs/tokens.md\u003c/code> for any new tokens).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]].\u003c/li>\n\u003cli>Site workaround removed: passoca's \u003ccode>AppTitle\u003c/code> hand-copy of the \u003ccode>theme.css\u003c/code> display-heading recipe.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0084","type":"story","title":"Textarea component","status":"done","priority":"high","tags":["ui","components","forms","a11y"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer building forms, I want a \u003cstrong>Textarea\u003c/strong> component. \u003ccode>Input\u003c/code> has no\u003c/p>\n\u003cp>multiline variant, so contact forms (passoca's contact page is the reference case) fall back\u003c/p>\n\u003cp>to a raw \u003ccode>&lt;textarea&gt;\u003c/code> that matches none of the DS chrome. Textarea should share Input's\u003c/p>\n\u003cp>anatomy — label / hint / error slots, the same \u003ccode>--ss-*\u003c/code> field tokens and focus/error styling —\u003c/p>\n\u003cp>plus an autosize option for grow-with-content behavior.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Textarea\u003c/code> component with \u003ccode>.ss-textarea\u003c/code> identity root, mirroring Input's API: \u003ccode>label\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>hint\u003c/code>, \u003ccode>error\u003c/code>, \u003ccode>disabled\u003c/code>, \u003ccode>value\u003c/code> binding.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Shares Input's field tokens and focus/error treatment so the two sit side by side in a\u003c/li>\n\u003c/ul>\n\u003cp>  form without visual drift; zero border-radius.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>autosize\u003c/code> option grows the field with content (with sensible min/max rows).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Label/field association and error announcement match Input's a11y behavior (WCAG 2.2 AA).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Additive: new file + barrel export; \u003ccode>Input\u003c/code> untouched. (Barrel export lands in the\u003c/li>\n\u003c/ul>\n\u003cp>  integration step — \u003ccode>index.ts\u003c/code> is owned there.)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests mirror the Input suite (label/hint/error, disabled, autosize); \u003ccode>pnpm test\u003c/code> green,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pnpm pack\u003c/code> clean.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (new docs.config.ts component page; \u003ccode>docs/tokens.md\u003c/code> for any new tokens).\u003c/li>\n\u003c/ul>\n\u003cp>  (New \u003ccode>component-docs/textarea.ts\u003c/code> page; registration in \u003ccode>docs.config.ts\u003c/code>'s COMPONENTS list lands\u003c/p>\n\u003cp>  in the integration step. No new tokens — Textarea reuses the \u003ccode>--ss-input-*\u003c/code> field tokens.)\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]].\u003c/li>\n\u003cli>Site workaround removed: passoca's contact form styling a bare \u003ccode>&lt;textarea&gt;\u003c/code> by hand next to\u003c/li>\n\u003c/ul>\n\u003cp>  DS \u003ccode>Input\u003c/code>s.\u003c/p>\n\u003cul>\n\u003cli>Implementation: autosize prefers native \u003ccode>field-sizing: content\u003c/code> (\u003ccode>@supports\u003c/code>-gated) with a\u003c/li>\n\u003c/ul>\n\u003cp>  scrollHeight JS fallback; \u003ccode>rows\u003c/code> (default 3) is the minimum, \u003ccode>maxRows\u003c/code> (default 10) caps\u003c/p>\n\u003cp>  growth via a \u003ccode>1lh\u003c/code>-based max-height. \u003ccode>'Textarea'\u003c/code> still needs adding to the \u003ccode>COMPONENT_NAMES\u003c/code>\u003c/p>\n\u003cp>  union in \u003ccode>dssoca.config.ts\u003c/code> (cast in the component until then).\u003c/p>","acTotal":7,"acDone":7},{"id":"DS-0085","type":"story","title":"Container/Page component","status":"done","priority":"high","tags":["ui","components","layout"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>Container/Page\u003c/strong> wrapper — a centered, max-width\u003c/p>\n\u003cp>page-content element with the standard page paddings — as a layout component or a documented\u003c/p>\n\u003cp>layout class that works \u003cstrong>without importing the full \u003ccode>theme.css\u003c/code>\u003c/strong>. The app-shell/layout\u003c/p>\n\u003cp>classes exist today only inside \u003ccode>theme.css\u003c/code>, so passoca keeps its own \u003ccode>AppContent\u003c/code> component\u003c/p>\n\u003cp>(centered, max-width, page paddings) that re-derives values the DS already owns.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>A \u003ccode>Container\u003c/code> (or \u003ccode>Page\u003c/code>) layout primitive ships: centered, token-driven max-width and\u003c/li>\n\u003c/ul>\n\u003cp>  page paddings, full-bleed by default at narrow viewports.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Delivered either as a component (\u003ccode>.ss-container\u003c/code> identity root, scoped SCSS) or as a\u003c/li>\n\u003c/ul>\n\u003cp>  documented standalone layout class consumable without the rest of \u003ccode>theme.css\u003c/code> (coordinate\u003c/p>\n\u003cp>  with [[DS-0089-tokens-only-entry]]).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Width/padding read \u003ccode>--ss-*\u003c/code> tokens and rescale across sm/md/lg; zero border-radius.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Additive: no existing layout class changes meaning.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests cover rendering and token-driven sizing; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (docs.config.ts page or layout docs; \u003ccode>docs/tokens.md\u003c/code> for any new tokens).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]].\u003c/li>\n\u003cli>Site workaround removed: passoca's \u003ccode>AppContent\u003c/code> wrapper re-implementing the DS page width/paddings.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0086","type":"story","title":"Spinner component","status":"done","priority":"high","tags":["ui","components","a11y"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a standalone \u003cstrong>Spinner\u003c/strong> loading indicator. \u003ccode>Button\u003c/code> already\u003c/p>\n\u003cp>embeds one for its loading state, but it is private — nothing exportable exists for\u003c/p>\n\u003cp>empty-page or inline loading, so passoca (and any consumer) must draw its own and match the\u003c/p>\n\u003cp>DS look by eye. Extract/build the spinner as a first-class component so the same glyph serves\u003c/p>\n\u003cp>Button, page-level loading, and inline \"fetching…\" affordances.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Spinner\u003c/code> component with \u003ccode>.ss-spinner\u003c/code> identity root, exported from the barrel. (Barrel\u003c/li>\n\u003c/ul>\n\u003cp>  export lands in the integration step — \u003ccode>index.ts\u003c/code> is owned there.)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Sized from \u003ccode>--ss-*\u003c/code> tokens (rescales across sm/md/lg) with a size override for inline\u003c/li>\n\u003c/ul>\n\u003cp>  vs page-level use; zero border-radius; respects \u003ccode>prefers-reduced-motion\u003c/code> (static first\u003c/p>\n\u003cp>  frame, no cycling).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Announced correctly to AT (\u003ccode>role=\"status\"\u003c/code> + visually-hidden — or visible — label;\u003c/li>\n\u003c/ul>\n\u003cp>  frames are \u003ccode>aria-hidden\u003c/code>) — WCAG 2.2 AA.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Button\u003c/code>'s loading state reuses it (or shares its markup/tokens) so the two never drift.\u003c/li>\n\u003c/ul>\n\u003cp>  *Superseded:* the direction changed to text-frame spinners from cli-spinners rather than\u003c/p>\n\u003cp>  extracting Button's drawn glyph; \u003ccode>Button\u003c/code> stays untouched here, and adopting \u003ccode>Spinner\u003c/code>\u003c/p>\n\u003cp>  inside Button is a follow-up.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests cover rendering, a11y role/label, and reduced-motion; \u003ccode>pnpm test\u003c/code> green,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pnpm pack\u003c/code> clean. (Frame cycling is tested deterministically with fake timers.)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (new docs.config.ts component page; \u003ccode>docs/tokens.md\u003c/code> for any new tokens).\u003c/li>\n\u003c/ul>\n\u003cp>  (New \u003ccode>component-docs/spinner.ts\u003c/code> page; registration in \u003ccode>docs.config.ts\u003c/code>'s COMPONENTS list and\u003c/p>\n\u003cp>  the \u003ccode>--ss-spinner-*\u003c/code> token rows in \u003ccode>docs/tokens.md\u003c/code> land in the integration step.)\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]].\u003c/li>\n\u003cli>Site workaround removed: passoca's hand-rolled loading indicators for page/inline states.\u003c/li>\n\u003cli>\u003cstrong>Attribution:\u003c/strong> the animation frames + intervals are embedded verbatim from\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ca href=\"https://github.com/sindresorhus/cli-spinners\" rel=\"noreferrer\">sindresorhus/cli-spinners\u003c/a> (MIT license) —\u003c/p>\n\u003cp>  ten squared/blocky variants curated for the zero-radius look (\u003ccode>boxBounce2\u003c/code> default,\u003c/p>\n\u003cp>  \u003ccode>boxBounce\u003c/code>, \u003ccode>squareCorners\u003c/code>, \u003ccode>toggle2\u003c/code>, \u003ccode>toggle3\u003c/code>, \u003ccode>toggle4\u003c/code>, \u003ccode>pipe\u003c/code>, \u003ccode>line\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>growVertical\u003c/code>, \u003ccode>growHorizontal\u003c/code>). Embedded as a typed record; no runtime fetch, no new\u003c/p>\n\u003cp>  dependency.\u003c/p>\n\u003cul>\n\u003cli>Implementation: cycles frames with \u003ccode>$state\u003c/code> + \u003ccode>$effect\u003c/code> \u003ccode>setInterval\u003c/code> at the variant's\u003c/li>\n\u003c/ul>\n\u003cp>  cli-spinners interval (\u003ccode>speed\u003c/code> overrides); glyphs render in \u003ccode>--ss-font-mono\u003c/code>, colored by\u003c/p>\n\u003cp>  \u003ccode>--ss-spinner-color\u003c/code> (defaults to \u003ccode>--ss-primary\u003c/code>), sized by \u003ccode>--ss-spinner-font\u003c/code> (new\u003c/p>\n\u003cp>  partial \u003ccode>src/styles/components/_spinner.scss\u003c/code>, to be wired into \u003ccode>components/_index.scss\u003c/code>).\u003c/p>\n\u003cp>  \u003ccode>'Spinner'\u003c/code> still needs adding to the \u003ccode>COMPONENT_NAMES\u003c/code> union in \u003ccode>dssoca.config.ts\u003c/code> (cast\u003c/p>\n\u003cp>  in the component until then).\u003c/p>","acTotal":6,"acDone":6},{"id":"DS-0087","type":"story","title":"Icon: extend built-in glyph set","status":"done","priority":"high","tags":["ui","icon","components"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want the built-in **Icon glyph set extended with common nav/social\u003c/p>\n\u003cp>glyphs**: home, briefcase, folder, github, linkedin, language/globe, and color-swatch. These\u003c/p>\n\u003cp>are table-stakes for any site shell, yet none ship today — passoca had to \u003ccode>registerIcon\u003c/code>\u003c/p>\n\u003cp>hand-drawn paths just to fill its \u003ccode>BottomNav\u003c/code>, and still keeps custom SVG components for the\u003c/p>\n\u003cp>social links. Shipping them removes per-consumer path drawing and keeps glyph style consistent\u003c/p>\n\u003cp>with the existing set.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New glyphs added to the built-in set: \u003ccode>home\u003c/code>, \u003ccode>briefcase\u003c/code>, \u003ccode>folder\u003c/code>, \u003ccode>github\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>linkedin\u003c/code>, \u003ccode>language\u003c/code> (globe), \u003ccode>color-swatch\u003c/code> — drawn in the existing set's stroke/grid\u003c/p>\n\u003cp>  style.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Each is available by name via the \u003ccode>IconName\u003c/code> type (type union updated) and renders\u003c/li>\n\u003c/ul>\n\u003cp>  through \u003ccode>Icon\u003c/code> like any built-in.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Additive: \u003ccode>registerIcon\u003c/code> and existing names untouched.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests assert each new name renders and the type union matches the registry;\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (docs.config.ts Icon page lists the new glyphs, e.g. in its\u003c/li>\n\u003c/ul>\n\u003cp>  gallery/names table).\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]].\u003c/li>\n\u003cli>Unblocks [[DS-0088-menu-custom-leading-visual]]'s color-swatch use case.\u003c/li>\n\u003cli>Site workaround removed: passoca's \u003ccode>registerIcon\u003c/code> hand-drawn BottomNav paths + custom social SVGs.\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0088","type":"story","title":"Menu: custom leading visual per item","status":"done","priority":"high","tags":["ui","menu","api"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003cstrong>MenuItem to accept arbitrary leading content\u003c/strong>, not just\u003c/p>\n\u003cp>\u003ccode>icon: IconName\u003c/code>. Real menus lead with things the icon registry can't express: theme color\u003c/p>\n\u003cp>dots (a swatch of the theme being selected) or emoji flags for language pickers. Add a snippet\u003c/p>\n\u003cp>option (and/or a first-class color-swatch option) for the leading slot. Migrating its\u003c/p>\n\u003cp>theme/language menus to \u003ccode>Menu\u003c/code>, passoca had to fold emoji flags into the label text and lost\u003c/p>\n\u003cp>its theme color swatches entirely.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>MenuItem accepts custom leading content — a Svelte 5 snippet for arbitrary markup and/or\u003c/li>\n\u003c/ul>\n\u003cp>  a \u003ccode>swatch: &lt;color&gt;\u003c/code> convenience that renders a token-sized color dot.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Leading visual is sized/spaced from \u003ccode>--ss-*\u003c/code> tokens identically to the \u003ccode>icon\u003c/code> case, so\u003c/li>\n\u003c/ul>\n\u003cp>  mixed menus (icon items + swatch items) align; zero border-radius.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Custom leading content is decorative by default (label carries the semantics) — WCAG\u003c/li>\n\u003c/ul>\n\u003cp>  2.2 AA upheld.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Additive: \u003ccode>icon: IconName\u003c/code> keeps working unchanged.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests cover snippet and swatch rendering alongside icon items; \u003ccode>pnpm test\u003c/code> green.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (docs.config.ts Menu page: new prop/snippet + a swatch usage example).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]]; the swatch glyph need also touches\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0087-icon-glyph-set]].\u003c/p>\n\u003cul>\n\u003cli>Site workaround removed: passoca folding emoji flags into MenuItem labels and dropping its\u003c/li>\n\u003c/ul>\n\u003cp>  theme color dots.\u003c/p>\n\u003cul>\n\u003cli>Shipped API (2026-06-12): \u003ccode>MenuItem.leading?: Snippet\u003c/code> (arbitrary markup),\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>MenuItem.swatch?: string\u003c/code> (square color chip, \u003ccode>--ss-icon\u003c/code> sized, zero radius),\u003c/p>\n\u003cp>  \u003ccode>MenuItem.emoji?: string\u003c/code> (text glyph). Precedence: leading → swatch → emoji → icon.\u003c/p>\n\u003cp>  All leading visuals render aria-hidden; the \u003ccode>label\u003c/code> names the row.\u003c/p>","acTotal":6,"acDone":6},{"id":"DS-0089","type":"story","title":"Tokens-only stylesheet entry","status":"done","priority":"high","tags":["tokens","packaging","theming"],"depends_on":[],"parent":null,"epic":"DS-0079","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer with my own global styles, I want a \u003cstrong>\u003ccode>dssoca/tokens.css\u003c/code> entry\u003c/strong> that\u003c/p>\n\u003cp>ships the design tokens only — no global element styles, no webfont \u003ccode>@import\u003c/code>. \u003ccode>theme.css\u003c/code>\u003c/p>\n\u003cp>today restyles \u003ccode>a\u003c/code>, headings, \u003ccode>code\u003c/code>, and scrollbars, and pulls Google Fonts, so a site that\u003c/p>\n\u003cp>already owns those surfaces can't import it. passoca's bridge is the cautionary tale: it\u003c/p>\n\u003cp>hand-copied ~80 \u003ccode>--ss-*\u003c/code> token values into a local file so the components could resolve their\u003c/p>\n\u003cp>custom properties — a copy that silently drifts with every dssoca release.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New \u003ccode>dssoca/tokens.css\u003c/code> export: all \u003ccode>--ss-*\u003c/code> tokens for both \u003ccode>data-theme\u003c/code> values and all\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>data-size-variant\u003c/code> values — and nothing else (no element selectors, no \u003ccode>@import\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Built from the same Sass token partials as \u003ccode>theme.css\u003c/code> (single source of truth — the two\u003c/li>\n\u003c/ul>\n\u003cp>  can never disagree).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Wired into \u003ccode>package.json\u003c/code> \u003ccode>exports\u003c/code> + the \u003ccode>build:css\u003c/code>/\u003ccode>prepack\u003c/code> pipeline; \u003ccode>pnpm pack\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  clean (publint).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Components render correctly with only \u003ccode>tokens.css\u003c/code> imported (verified by test or\u003c/li>\n\u003c/ul>\n\u003cp>  showcase route).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>theme.css\u003c/code> behavior unchanged for existing consumers.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests/CI cover the new artifact's presence and token completeness; \u003ccode>pnpm test\u003c/code> green.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (\u003ccode>docs/tokens.md\u003c/code> + \u003ccode>docs/themes.md\u003c/code> describe the two entries and\u003c/li>\n\u003c/ul>\n\u003cp>  when to use which; README install section mentions it).\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0079-passoca-adoption-gaps]]. [[DS-0083-heading-component]] and\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0085-container-component]] assume this entry exists for theme-less consumers.\u003c/p>\n\u003cul>\n\u003cli>Site workaround removed: passoca's hand-maintained ~80-value token bridge file.\u003c/li>\n\u003cli>Implementation (2026-06-12): new \u003ccode>src/styles/tokens.scss\u003c/code> entry \u003ccode>@use\u003c/code>s the same\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>_tokens\u003c/code> + \u003ccode>components/\u003c/code> partials as \u003ccode>theme.scss\u003c/code> (no fonts/base/layout); compiled by\u003c/p>\n\u003cp>  \u003ccode>build:css:tokens\u003c/code> (chained from \u003ccode>build:css\u003c/code>, runs in \u003ccode>prepack\u003c/code>) → \u003ccode>dist/tokens.css\u003c/code>.\u003c/p>\n\u003cp>  Token completeness verified by diffing the \u003ccode>--ss-*\u003c/code> name set against \u003ccode>theme.css\u003c/code>\u003c/p>\n\u003cp>  (identical, 353 declarations); \u003ccode>theme.css\u003c/code> output verified byte-identical pre/post.\u003c/p>\n\u003cp>  CI's \u003ccode>pnpm pack\u003c/code> (publint) gates the artifact's presence on every PR. README/docs\u003c/p>\n\u003cp>  copy is delivered by the docs integrator within epic DS-0079.\u003c/p>","acTotal":7,"acDone":7},{"id":"DS-0090","type":"epic","title":"geossoca component gaps — components the score-tracker app needs","status":"done","priority":"high","tags":["ui","epic","components","adoption"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-15","updated":"2026-06-15","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The \u003ccode>geossoca\u003c/code> GeoGuessr score-tracker app (a new SvelteKit + dssoca consumer) needs several\u003c/p>\n\u003cp>components the design system does not yet ship. Rather than build them locally in the app, they are\u003c/p>\n\u003cp>added to dssoca so any future consumer benefits. This epic groups the eleven resulting component\u003c/p>\n\u003cp>tasks: \u003cstrong>Chart\u003c/strong> (D3-backed, the app's performance graphs), \u003cstrong>Table\u003c/strong> (rankings), \u003cstrong>Select\u003c/strong>,\u003c/p>\n\u003cp>\u003cstrong>Modal\u003c/strong>, \u003cstrong>DateField\u003c/strong>, \u003cstrong>FileDrop\u003c/strong> (JSON import/export + game entry), and the good-to-have\u003c/p>\n\u003cp>\u003cstrong>NumberField\u003c/strong>, \u003cstrong>Tooltip\u003c/strong>, \u003cstrong>Avatar\u003c/strong>, \u003cstrong>Pagination\u003c/strong>, and \u003cstrong>Switch\u003c/strong> (theme toggle).\u003c/p>\n\u003cp>\u003ccode>Chart\u003c/code> introduces the design system's first runtime dependencies — the modular \u003ccode>d3-scale\u003c/code>,\u003c/p>\n\u003cp>\u003ccode>d3-shape\u003c/code>, \u003ccode>d3-array\u003c/code> packages. Every other component stays dependency-free.\u003c/p>\n\u003cp>Each component honours the house rules: \u003cstrong>zero border-radius\u003c/strong>, \u003ccode>--ss-*\u003c/code> tokens, \u003ccode>.ss-*\u003c/code> identity\u003c/p>\n\u e\">\u003cspan class=\"box\">✓\u003c/span>Storybook story at \u003ccode>src/stories/Switch.stories.svelte\u003c/code>.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Vitest + vitest-axe test at \u003ccode>test/unit/Switch.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm check\u003c/code> clean.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Docs page at \u003ccode>documentation/src/lib/component-docs/switch.ts\u003c/code>, registered in the docs index.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Epic: [[DS-0090-geossoca-component-gaps]]. Consumer: the geossoca score-tracker app.\u003c/li>\n\u003cli>Used for the dark / light theme toggle.\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5}]}</script>
<script>
const RAW = JSON.parse(document.getElementById('agile-data').textContent);
const ITEMS = RAW.items, SCOPE = RAW.scope;
const STATUSES = ["backlog","todo","in-progress","blocked","done"];
const PRIORITIES = ["high","low"];
const GROUP_KEYS = ['project','status','type','priority'];
// Single-project boards default to grouping by status (one project group is redundant);
// the global hub board defaults to grouping by project.
const state = { view: 'grouped', groupBy: SCOPE === 'global' ? 'project' : 'status', status: '', sortKey: 'id', sortDir: 1 };

function uniq(arr){ return [...new Set(arr)].sort(); }
function opt(sel, vals, label){ const e=document.getElementById(sel); e.innerHTML='<option value="">'+label+'</option>'+vals.map(v=>'<option>'+v+'</option>').join(''); }
opt('f-type', uniq(ITEMS.map(i=>i.type)), 'type: all');
opt('f-status', STATUSES.filter(s=>ITEMS.some(i=>i.status===s)), 'status: all');
opt('f-priority', uniq(ITEMS.map(i=>i.priority)), 'priority: all');
opt('f-tag', uniq(ITEMS.flatMap(i=>i.tags)), 'tag: all');
if (SCOPE === 'global'){ const e=document.getElementById('f-project'); e.hidden=false; opt('f-project', uniq(ITEMS.map(i=>i.project)), 'project: all'); }
const gbSel=document.getElementById('f-groupby');
gbSel.innerHTML=GROUP_KEYS.map(v=>'<option value="'+v+'"'+(v===state.groupBy?' selected':'')+'>group: '+v+'</option>').join('');

function filtered(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  const fp = document.getElementById('f-project').value;
  const ft = document.getElementById('f-type').value;
  const fs = state.status || document.getElementById('f-status').value;
  const fpr = document.getElementById('f-priority').value;
  const ftag = document.getElementById('f-tag').value;
  return ITEMS.filter(i=>{
    if (fp && i.project!==fp) return false;
    if (ft && i.type!==ft) return false;
    if (fs && i.status!==fs) return false;
    if (fpr && i.priority!==fpr) return false;
    if (ftag && !i.tags.includes(ftag)) return false;
    if (q && !(i.id.toLowerCase().includes(q)||i.title.toLowerCase().includes(q)||i.tags.join(' ').toLowerCase().includes(q))) return false;
    return true;
  });
}
function badge(s){ return '<span class="badge '+s+'"><span class="dot"></span>'+s+'</span>'; }
function acStr(i){ return i.acTotal ? i.acDone+'/'+i.acTotal : ''; }
function detail(i){
  const deps = (i.depends_on&&i.depends_on.length)?'<b>depends on</b> '+i.depends_on.join(', '):'';
  const par = i.parent?'<b>parent</b> '+i.parent:'';
  const ep = i.epic?'<b>epic</b> '+i.epic:'';
  const tags = i.tags.length?'<b>tags</b> '+i.tags.join(', '):'';
  const kv = [par,ep,deps,tags,'<b>created</b> '+i.created,'<b>updated</b> '+i.updated].filter(Boolean).join('<span style="opacity:.4">·</span> ');
  return '<div class="detail">'+(i.bodyHtml||'<p style="color:var(--faint)">no description</p>')+'<div class="kv">'+kv+'</div></div>';
}
function renderMetrics(){
  const m = document.getElementById('metrics'); const all = ITEMS;
  const cards = STATUSES.map(s=>{ const n=all.filter(i=>i.status===s).length; return '<div class="metric'+(state.status===s?' on':'')+'" data-s="'+s+'" data-pick="'+s+'"><div class="v">'+n+'</div><div class="l">'+s+'</div></div>'; });
  cards.unshift('<div class="metric'+(state.status===''?' on':'')+'" data-pick=""><div class="v">'+all.length+'</div><div class="l">all</div></div>');
  m.innerHTML = cards.join('');
  m.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{ state.status = el.dataset.pick; document.getElementById('f-status').value=''; render(); });
}
function groupOrder(gb, keys){
  if(gb==='status') return keys.slice().sort((a,b)=>(STATUSES.indexOf(a)+1||99)-(STATUSES.indexOf(b)+1||99));
  if(gb==='priority') return keys.slice().sort((a,b)=>(PRIORITIES.indexOf(a)+1||99)-(PRIORITIES.indexOf(b)+1||99));
  return keys.slice().sort();
}
function renderGrouped(list){
  if(!list.length) return '<div class="empty">no items match</div>';
  const gb = state.groupBy;
  const groups = {};
  list.forEach(i=>{ const k=i[gb]||'—'; (groups[k]=groups[k]||[]).push(i); });
  return groupOrder(gb, Object.keys(groups)).map(p=>{
    const rows = groups[p].map(i=>(
      '<div class="row" data-id="'+i.id+'">'
      +'<span class="id">'+i.id+'</span>'
      +'<span class="ti"><span class="typ">'+i.type+'</span>'+i.title+'</span>'
      +'<span class="ac">'+acStr(i)+'</span>'
      +badge(i.status)
      +'<span class="pri '+i.priority+'">'+i.priority+'</span>'
      +'</div>'
    )).join('');
    return '<div class="group"><div class="gh"><span class="n">'+p+'</span><span class="c">'+groups[p].length+'</span></div>'+rows+'</div>';
  }).join('');
}
function renderTable(list){
  if(!list.length) return '<div class="empty">no items match</div>';
  const cols = [['id','id'],['title','title'],['project','project'],['type','type'],['status','status'],['priority','pri']];
  const sorted = [...list].sort((a,b)=>{ const k=state.sortKey; return String(a[k]).localeCompare(String(b[k]))*state.sortDir || a.id.localeCompare(b.id); });
  const head = '<tr>'+cols.map(c=>'<th data-sort="'+c[0]+'">'+c[0]+(state.sortKey===c[0]?(state.sortDir>0?' ▲':' ▼'):'')+'</th>').join('')+'</tr>';
  const body = sorted.map(i=>(
    '<tr data-id="'+i.id+'"><td class="id">'+i.id+'</td><td>'+i.title+'</td><td>'+i.project+'</td><td>'+i.type+'</td><td>'+badge(i.status)+'</td><td><span class="pri '+i.priority+'">'+i.priority+'</span></td></tr>'
  )).join('');
  return '<table class="tableview"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
}
let openId = null;
const drawer = document.getElementById('drawer');
// Resizable sidebar: drag the left-edge grip to set the drawer width.
(function(){
  const grip = document.getElementById('drawer-grip');
  let dragging = false;
  grip.addEventListener('mousedown', e => { dragging = true; grip.classList.add('drag'); document.body.style.userSelect = 'none'; e.preventDefault(); });
  window.addEventListener('mousemove', e => { if(!dragging) return; const w = Math.max(320, Math.min(window.innerWidth - e.clientX, window.innerWidth * 0.96)); drawer.style.width = w + 'px'; });
  window.addEventListener('mouseup', () => { if(!dragging) return; dragging = false; grip.classList.remove('drag'); document.body.style.userSelect = ''; });
})();
function markSel(){
  document.querySelectorAll('.row.sel,.tableview tbody tr.sel').forEach(el=>el.classList.remove('sel'));
  if(openId){ const el=document.querySelector('[data-id="'+openId+'"]'); if(el) el.classList.add('sel'); }
}
function closeDrawer(){ openId=null; drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); markSel(); }
function openItem(id){
  if(id===openId){ closeDrawer(); return; }
  const i=ITEMS.find(x=>x.id===id); if(!i) return;
  openId=id;
  document.getElementById('d-id').textContent=i.id;
  document.getElementById('d-badge').innerHTML=badge(i.status);
  document.getElementById('d-pri').innerHTML='<span class="pri '+i.priority+'">'+i.priority+'</span>';
  document.getElementById('d-title').innerHTML='<span class="typ">'+i.type+'</span>'+i.title;
  document.getElementById('drawer-body').innerHTML=detail(i);
  drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false');
  markSel();
}
document.getElementById('drawer-close').onclick=closeDrawer;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });
function render(){
  renderMetrics();
  gbSel.style.display = state.view==='grouped' ? '' : 'none';
  const list = filtered();
  document.getElementById('count').textContent = list.length+' / '+ITEMS.length+' items';
  const board = document.getElementById('board');
  board.innerHTML = state.view==='grouped' ? renderGrouped(list) : renderTable(list);
  board.querySelectorAll('[data-id]').forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest('[data-sort]')) return; openItem(el.dataset.id); };
  });
  if(state.view==='table'){
    board.querySelectorAll('[data-sort]').forEach(th=>th.onclick=()=>{ const k=th.dataset.sort; if(state.sortKey===k)state.sortDir*=-1; else {state.sortKey=k;state.sortDir=1;} render(); });
  }
  markSel();
}
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.toggle button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state.view=b.dataset.view; render(); });
['q','f-project','f-type','f-status','f-priority','f-tag'].forEach(id=>{ const el=document.getElementById(id); el.addEventListener('input',()=>{ if(id==='f-status')state.status=''; render(); }); });
gbSel.addEventListener('change',()=>{ state.groupBy=gbSel.value; render(); });
render();
</script>
</body>
</html>
