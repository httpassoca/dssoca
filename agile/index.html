u003c/li>\n\u003cli>Concrete work is the single task [[ds-0031-badge-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/Badge.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0019","type":"story","title":"Best-in-class Button component","status":"done","priority":"low","tags":["ui"],"depends_on":[],"parent":null,"epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003ccode>Button\u003c/code> to a button that covers async (loading) actions, destructive actions, icon affordances, full-width layout, and forwards native attributes, so the component holds up next to a\u003c/p>\n\u003cp>best-in-class equivalent instead of being a thin wrapper. Today it is a thin wrapper (variant/type/disabled/onclick/size) missing the loading, danger, icon-only, and full-width states every best-in-class button ships, and it can't forward \u003ccode>aria-*\u003c/code>/\u003ccode>data-*\u003c/code> or expose an element ref.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Button\u003c/code> gains the improvements tracked in [[ds-0032-button-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0032-button-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/Button.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0020","type":"story","title":"Best-in-class Input component","status":"done","priority":"low","tags":["ui","a11y","forms"],"depends_on":[],"parent":null,"epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003ccode>Input\u003c/code> to a text field that ships its own hint/error text, prefix/suffix affordances, clearable action, and forwards native input attributes, so the component holds up next to a\u003c/p>\n\u003cp>best-in-class equivalent instead of being a thin wrapper. Today the consumer must hand-render helper/error text and wire \u003ccode>describedby\u003c/code> themselves, there is no prefix/suffix/clear, native attrs (readonly/autocomplete/inputmode/maxlength/other handlers) are dropped, and invalid/disabled states are visually identical to normal.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Input\u003c/code> gains the improvements tracked in [[ds-0033-input-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0033-input-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/Input.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0021","type":"story","title":"Best-in-class Card component","status":"done","priority":"high","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003ccode>Card\u003c/code> to a card with header/body/footer + media regions, an optional clickable/linkable surface, and surface variants, so the component holds up next to a\u003c/p>\n\u003cp>best-in-class equivalent instead of being a thin wrapper. Today it only has a header + body, the root identity class is \u003ccode>.ss-panel\u003c/code> (house-rule violation — should be \u003ccode>.ss-card\u003c/code>), and line 22 uses an inline \u003ccode>style\u003c/code> with hardcoded \u003ccode>12px\u003c/code> instead of a token.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Card\u003c/code> gains the improvements tracked in [[ds-0034-card-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0034-card-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/Card.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0022","type":"story","title":"Best-in-class Sparkline component","status":"done","priority":"high","tags":["ui","dataviz","a11y"],"depends_on":[],"parent":null,"epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003ccode>Sparkline\u003c/code> to an inline micro-chart that actually rescales, normalizes honestly, reads its data to assistive tech, and offers line/area variants, so the component holds up next to a\u003c/p>\n\u003cp>best-in-class equivalent instead of being a thin wrapper. Today the \u003ccode>size\u003c/code> prop is wired but inert (SCSS hardcodes 18px height / 3px bars / 1px gap), normalization floors at max only so flat-looking series, bars are \u003ccode>aria-hidden\u003c/code> with no text alternative, and empty/single-point inputs are mishandled (\u003ccode>Math.max(...[])\u003c/code> → -Infinity).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Sparkline\u003c/code> gains the improvements tracked in [[ds-0035-sparkline-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0035-sparkline-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/Sparkline.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0023","type":"story","title":"Best-in-class ServiceCard component","status":"done","priority":"high","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003ccode>ServiceCard\u003c/code> to a service/status tile that shows a keyboard focus ring, a loading state, recency, and navigates as a real link when it opens a URL, so the component holds up next to a\u003c/p>\n\u003cp>best-in-class equivalent instead of being a thin wrapper. Today it has no \u003ccode>:focus-visible\u003c/code> style (WCAG 2.4.7), a hardcoded \u003ccode>#232323\u003c/code> hover that breaks light theme, no loading/timestamp/disabled states, and uses a \u003ccode>role=\"button\"\u003c/code> div even when the footer implies navigation.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>ServiceCard\u003c/code> gains the improvements tracked in [[ds-0036-service-card-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0036-service-card-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/ServiceCard.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0024","type":"story","title":"Best-in-class MetricTile component","status":"done","priority":"low","tags":["ui","a11y","dataviz"],"depends_on":[],"parent":null,"epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want \u003ccode>MetricTile\u003c/code> to a KPI tile whose delta colour encodes sentiment (not raw direction), reads accessibly, and can show a comparison period, trend chart, prefix, and loading state, so the component holds up next to a\u003c/p>\n\u003cp>best-in-class equivalent instead of being a thin wrapper. Today \u003ccode>up → green\u003c/code> is hardcoded so a rising error rate renders \"good\", the delta arrow leaks into the accessible name, and there is no comparison label, sparkline slot, value prefix, or loading state.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>MetricTile\u003c/code> gains the improvements tracked in [[ds-0037-metric-tile-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome th.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>EmptyState\u003c/code> gains the improvements tracked in [[ds-0042-empty-state-improvements]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive / non-breaking where feasible; existing usage keeps working\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0042-empty-state-improvements]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>src/lib/components/EmptyState.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0030","type":"task","title":"Icon improvements","status":"done","priority":"low","tags":["ui","icon"],"depends_on":[],"parent":"DS-0017","epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Implement the researched improvements for \u003ccode>Icon\u003c/code> (\u003ccode>src/lib/components/Icon.svelte\u003c/code>).\u003c/p>\n\u003cp>Each acceptance-criteria line is one concrete prop / state / behaviour drawn from a best-in-class\u003c/p>\n\u003cp>comparison. Keep changes additive and token-driven (zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped\u003c/p>\n\u003cp>SCSS, Svelte 5 runes); extend the Vitest suite for every state added before marking done.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Custom / runtime icon registration\u003c/strong> — add a \u003ccode>paths?: string\u003c/code> escape hatch and/or a module-level \u003ccode>registerIcon(name, paths)\u003c/code> so the curated \u003ccode>IconName\u003c/code> union stays the default but the runtime set is open\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>spin\u003c/code> loading state (reduced-motion aware)\u003c/strong> — add \u003ccode>spin?: boolean\u003c/code> + a \u003ccode>loader\u003c/code> glyph with a scoped 360° keyframe, disabled under \u003ccode>prefers-reduced-motion\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>rotate\u003c/code> / \u003ccode>flip\u003c/code> orientation props\u003c/strong> — add \u003ccode>rotate?: 0|90|180|270\u003c/code> and \u003ccode>flip?: horizontal|vertical\u003c/code> so one \u003ccode>arrow\u003c/code> covers all directions without new glyphs\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Size-invariant stroke weight\u003c/strong> — add \u003ccode>strokeWidth?: number\u003c/code> + \u003ccode>absoluteStroke?: boolean\u003c/code> that recomputes weight from the resolved px so it stays optically constant across sm/md/lg\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Robust accessible name via \u003ccode>&lt;title&gt;\u003c/code>/\u003ccode>&lt;desc&gt;\u003c/code>\u003c/strong> — render a real SVG \u003ccode>&lt;title&gt;\u003c/code> (+ optional \u003ccode>&lt;desc&gt;\u003c/code>) wired with \u003ccode>aria-labelledby\u003c/code>; add an explicit \u003ccode>decorative?: boolean\u003c/code> rather than inferring from \u003ccode>title\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Fill / solid variant\u003c/strong> — add \u003ccode>variant?: outline|solid\u003c/code> (toggles \u003ccode>fill\u003c/code>/\u003ccode>stroke\u003c/code>) to remove the per-glyph fill hacks (e.g. \u003ccode>target\u003c/code>)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Dev-warn on unknown name + extend tests\u003c/strong> — \u003ccode>console.warn\u003c/code> on an unresolved name (optionally a fallback glyph); cover spin/rotate/flip/title/registration in \u003ccode>Icon.svelte.test.ts\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests extended in \u003ccode>test/unit/Icon.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0017-icon-best-in-class]] · Epic: [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Researched against Radix/shadcn, Carbon, Polaris, Primer, Material (+ data-viz/dashboard refs).\u003c/li>\n\u003c/ul>","acTotal":8,"acDone":0},{"id":"DS-0031","type":"task","title":"Badge improvements","status":"done","priority":"high","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0018","epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Implement the researched improvements for \u003ccode>Badge\u003c/code> (\u003ccode>src/lib/components/Badge.svelte\u003c/code>).\u003c/p>\n\u003cp>Each acceptance-criteria line is one concrete prop / state / behaviour drawn from a best-in-class\u003c/p>\n\u003cp>comparison. Keep changes additive and token-driven (zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped\u003c/p>\n\u003cp>SCSS, Svelte 5 runes); extend the Vitest suite for every state added before marking done.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Decouple the dot from tone\u003c/strong> — replace the always-true \u003ccode>hasDot\u003c/code> with a real \u003ccode>dot?: boolean\u003c/code> prop; dot stays \u003ccode>aria-hidden\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Add a neutral / default tone\u003c/strong> — extend the union with \u003ccode>neutral\u003c/code> (using \u003ccode>--ss-line\u003c/code>/\u003ccode>--ss-fg-muted\u003c/code>) as the safe baseline for non-status labels\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Dot-only (label-less) status mode\u003c/strong> — make \u003ccode>children\u003c/code> optional; when omitted render the dot + an \u003ccode>aria-label\u003c/code> carrying the status text (avoids a colour-only WCAG 1.4.1 fail)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Dismissible tag variant\u003c/strong> — add optional \u003ccode>ondismiss\u003c/code> → trailing \u003ccode>&lt;button aria-label=\"Remove …\"&gt;\u003c/code>, reusing the Toaster dismiss pattern\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Expose status semantics to AT\u003c/strong> — opt-in \u003ccode>role=\"status\"\u003c/code>/\u003ccode>aria-live=\"polite\"\u003c/code> for live-changing status; keep static category tags as plain spans\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Count / numeric badge\u003c/strong> — add \u003ccode>count?: number\u003c/code> + \u003ccode>max?: number\u003c/code> (default 99) with \u003ccode>99+\u003c/code> overflow, hidden at \u003ccode>count === 0\u003c/code>, bypassing the lowercase transform\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Tokenize dot size/gap + theme-correct tones\u003c/strong> — replace the hardcoded \u003ccode>5px\u003c/code> dot / \u003ccode>6px\u003c/code> gap with size tokens and fold the raw \u003ccode>rgba()\u003c/code> tone literals SS, Svelte 5 runes); extend the Vitest suite for every state added before marking done.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Wrap in \u003ccode>&lt;nav&gt;\u003c/code> with list semantics\u003c/strong> — change root to \u003ccode>&lt;nav aria-label=\"Sidebar\"&gt;\u003c/code> and render groups as \u003ccode>&lt;ul&gt;&lt;li&gt;\u003c/code> so AT hears item counts/hierarchy\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Real links instead of div-buttons\u003c/strong> — add optional \u003ccode>href\u003c/code> per item → \u003ccode>&lt;a aria-current&gt;\u003c/code> (drop the keydown); keep \u003ccode>onSelect\u003c/code> as the SPA fallback\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Collapsible rail (icon-only) mode\u003c/strong> — add \u003ccode>collapsed?\u003c/code> (+ \u003ccode>onToggleCollapsed\u003c/code>) hiding labels/section text and narrowing via a width token (\u003ccode>data-collapsed\u003c/code>)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Accessible name when collapsed\u003c/strong> — tooltip or \u003ccode>aria-label\u003c/code>/\u003ccode>title\u003c/code> on the link when collapsed; consider surfacing degraded/down in the name\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Section group labels\u003c/strong> — tie each group \u003ccode>&lt;ul&gt;\u003c/code> to its label via \u003ccode>aria-label\u003c/code>/\u003ccode>aria-labelledby\u003c/code> (label never a link)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Nested / expandable sub-items\u003c/strong> — add optional \u003ccode>children?: SideItem[]\u003c/code> rendered as a Disclosure (\u003ccode>aria-expanded\u003c/code>/\u003ccode>aria-controls\u003c/code>), one level deep, auto-expanded when active\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Per-item badge / count\u003c/strong> — add \u003ccode>badge?: string|number\u003c/code> rendered near the dot (token-driven, zero radius); include the count in the accessible name\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests extended in \u003ccode>test/unit/Sidebar.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0026-sidebar-best-in-class]] · Epic: [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Researched against Radix/shadcn, Carbon, Polaris, Primer, Material (+ data-viz/dashboard refs).\u003c/li>\n\u003c/ul>","acTotal":8,"acDone":0},{"id":"DS-0040","type":"task","title":"LogStream improvements","status":"done","priority":"high","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0027","epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Implement the researched improvements for \u003ccode>LogStream\u003c/code> (\u003ccode>src/lib/components/LogStream.svelte\u003c/code>).\u003c/p>\n\u003cp>Each acceptance-criteria line is one concrete prop / state / behaviour drawn from a best-in-class\u003c/p>\n\u003cp>comparison. Keep changes additive and token-driven (zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped\u003c/p>\n\u003cp>SCSS, Svelte 5 runes); extend the Vitest suite for every state added before marking done.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Accept real lines; make mock opt-in\u003c/strong> — promote \u003ccode>lines\u003c/code> to a controlled prop, type the level (\u003ccode>LogLevel\u003c/code>), gate the generator behind \u003ccode>demo?\u003c/code>, replace the hardcoded 30 with \u003ccode>maxLines?\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>role=\"log\"\u003c/code> live-region semantics\u003c/strong> — add \u003ccode>role=\"log\"\u003c/code> + \u003ccode>aria-label\u003c/code> and an \u003ccode>announce?: off|polite|assertive\u003c/code> prop mapping to \u003ccode>aria-live\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Follow-tail with pause-on-scroll-up\u003c/strong> — track \u003ccode>following\u003c/code>; auto-scroll only when near bottom, re-arm on scroll-back, with a \"Jump to bottom\" affordance\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Controls toolbar\u003c/strong> — optional header: per-level filter, text filter, wrap toggle, copy-to-clipboard, clear (toggles use \u003ccode>aria-pressed\u003c/code>)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Line-wrapping toggle\u003c/strong> — add \u003ccode>wrap?: boolean\u003c/code>; off → \u003ccode>white-space: pre\u003c/code> + horizontal scroll, on → \u003ccode>pre-wrap\u003c/code>, preserving whitespace alignment\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Empty + loading states\u003c/strong> — render \u003ccode>EmptyState\u003c/code>/\u003ccode>empty?\u003c/code> Snippet when no lines and a \u003ccode>loading?\u003c/code> connecting indicator\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Use tokens + scale with size\u003c/strong> — replace \u003ccode>#0a0a0a\u003c/code> with \u003ccode>--ss-code-bg\u003c/code>, prefer \u003ccode>--ss-code-*\u003c/code> level colours, derive gap/font from size tokens so \u003ccode>data-size-variant\u003c/code> works\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests extended in \u003ccode>test/unit/LogStream.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0027-log-stream-best-in-class]] · Epic: [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Researched against Radix/shadcn, Carbon, Polaris, Primer, Material (+ data-viz/dashboard refs).\u003c/li>\n\u003c/ul>","acTotal":8,"acDone":0},{"id":"DS-0041","type":"task","title":"Toaster improvements","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0028","epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Implement the researched improvements for \u003ccode>Toaster\u003c/code> (\u003ccode>src/lib/components/Toaster.svelte\u003c/code>).\u003c/p>\n\u003cp>Each acceptance-criteria line is one concrete prop / state / behaviour drawn from a best-in-class\u003c/p>\n\u003cp>comparison. Keep changes additive and token-driven (zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped\u003c/p>\n\u003cp>SCSS, Svelte 5 runes); extend the Vitest suite for every state added before marking done.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Pause auto-dismiss on hover/focus\u003c/strong> — move timing into a per-toast controller (remaining/startedAt) with pause()/resume() on pointerenter/leave + focusin/out\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Action button\u003c/strong> — extend \u003ccode>Toast\u003c/code>/\u003ccode>push\u003c/code> with \u003ccode>action?: {label, onClick}\u003c/code>; invoking dismisses unless the callback returns \u003ccode>false\u003c/code> (action toasts default to longer/sticky)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Per-toast duration incl. sticky\u003c/strong> — treat \u003ccode>timeout &lt;= 0\u003c/code>/\u003ccode>Infinity\u003c/code> as sticky (documented), with a longer default for \u003ccode>error\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Cap the stack with a queue\u003c/strong> — add \u003ccode>max\u003c/code> (default ~3) + a private queue; render \u003ccode>max\u003c/code>, promote from the queue on dismiss\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Configurable position\u003c/strong> — add a \u003ccode>position?\u003c/code> prop (six positions) as \u003ccode>data-position\u003c/code> reading \u003ccode>--ss-s-*\u003c/code>; reverse flex for bottom positions\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Promise / update-by-id\u003c/strong> — add \u003ccode>update(id, patch)\u003c/code> + \u003ccode>toast.promise(p, {loading,success,error})\u003c/code> and a \u003ccode>loading\u003c/code> kind (reduced-motion-guarded spinner)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Swipe + keyboard dismissal\u003c/strong> — pointer-drag swipe-to-dismiss (threshold, motion-guarded) + an \u003ccode>Escape\u003c/code> handler on the focused toast\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests extended in \u003ccode>test/unit/Toaster.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0028-toaster-best-in-class]] · Epic: [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Researched against Radix/shadcn, Carbon, Polaris, Primer, Material (+ data-viz/dashboard refs).\u003c/li>\n\u003c/ul>","acTotal":8,"acDone":0},{"id":"DS-0042","type":"task","title":"EmptyState improvements","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0029","epic":"DS-0016","created":"2026-06-08","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Implement the researched improvements for \u003ccode>EmptyState\u003c/code> (\u003ccode>src/lib/components/EmptyState.svelte\u003c/code>).\u003c/p>\n\u003cp>Each acceptance-criteria line is one concrete prop / state / behaviour drawn from a best-in-class\u003c/p>\n\u003cp>comparison. Keep changes additive and token-driven (zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped\u003c/p>\n\u003cp>SCSS, Svelte 5 runes); extend the Vitest suite for every state added before marking done.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Add a \u003ccode>no-results\u003c/code> variant\u003c/strong> — extend the union to \u003ccode>empty|error|no-results\u003c/code> (no \u003ccode>role=\"alert\"\u003c/code>, but politely announced — see next)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>role=\"status\"\u003c/code> for non-error states\u003c/strong> — give \u003ccode>no-results\u003c/code> (and empty-after-content) \u003ccode>role=\"status\"\u003c/code> so it announces without moving focus (WCAG 4.1.3)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>secondaryAction + footer snippets\u003c/strong> — add \u003ccode>secondaryAction?\u003c/code> beside primary in \u003ccode>.act\u003c/code> and a low-emphasis \u003ccode>footer?\u003c/code> Snippet for tertiary links\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Icon-or-snippet visual slot\u003c/strong> — add a \u003ccode>visual?\u003c/code> Snippet (drop in \u003ccode>&lt;Icon&gt;\u003c/code>/illustration), keep string \u003ccode>icon\u003c/code> as fallback, replace the hardcoded 40px with a token\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Compact / inline density\u003c/strong> — add \u003ccode>compact?\u003c/code> (or \u003ccode>density?\u003c/code>) dropping padding and title size so it fits inside Card/ServiceCard/table cells\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Constrain width + fullWidth override\u003c/strong> — cap \u003ccode>.ss-empty\u003c/code> width centered with \u003ccode>margin-inline:auto\u003c/code>; add \u003ccode>fullWidth?\u003c/code> escape hatch\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Opt-out heading semantics\u003c/strong> — allow \u003ccode>headingLevel: number|false\u003c/code> (false → plain \u003ccode>&lt;p&gt;\u003c/code>) so it doesn't pollute the outline inside an already-labelled region\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests extended in \u003ccode>test/unit/EmptyState.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0029-empty-state-best-in-class]] · Epic: [[DS-0016-components-improvements]].\u003c/li>\n\u003cli>Researched against Radix/shadcn, Carbon, Polaris, Primer, Material (+ data-viz/dashboard refs).\u003c/li>\n\u003c/ul>","acTotal":8,"acDone":0},{"id":"DS-0043","type":"epic","title":"New components from the passoca website","status":"done","priority":"high","tags":["ui","epic","components"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Promote the remaining \u003ccode>passoca\u003c/code>-website UI patterns that have \u003cstrong>no current dssoca equivalent\u003c/strong> into\u003c/p>\n\u003cp>first-class, token-driven components. An audit of the website (\u003ccode>/home/passoca/dev/passoca\u003c/code>, SvelteKit +\u003c/p>\n\u003cp>Svelte 5, ~26 components) against this design system (13 shipped) showed most pieces are already covered\u003c/p>\n\u003cp>(Header→\u003ccode>Topbar\u003c/code>, AppButton→\u003ccode>Button\u003c/code>, AppInput→\u003ccode>Input\u003c/code>, Hero/AppSVG→\u003ccode>Icon\u003c/code>, Post/ProjectCard composable\u003c/p>\n\u003cp>from \u003ccode>Card\u003c/code>/\u003ccode>Badge\u003c/code>). This epic groups the six genuinely-missing components, one \u003cstrong>story per component\u003c/strong>\u003c/p>\n\u003cp>(the user-facing need) and a single \u003cstrong>task per component\u003c/strong> whose acceptance criteria enumerate the concrete\u003c/p>\n\u003cp>props/states/behaviours to build.\u003c/p>\n\u003cp>Scope, in order: \u003cstrong>Dropdown / Menu\u003c/strong> (generalizes \u003ccode>ThemeMenu\u003c/code>/\u003ccode>LanguageMenu\u003c/code>/\u003ccode>FloatNavButton\u003c/code>),\u003c/p>\n\u003cp>\u003cstrong>Accordion\u003c/strong> (\u003ccode>AppExtension\u003c/code>), \u003cstrong>Link\u003c/strong> (\u003ccode>AppLink\u003c/code>), \u003cstrong>SegmentedControl\u003c/strong> (\u003ccode>LanguageSwitcher\u003c/code>),\u003c/p>\n\u003cp>\u003cstrong>BottomNav\u003c/strong> (\u003ccode>MobileBottomNav\u003c/code>), and \u003cstrong>Image\u003c/strong> (\u003ccode>AppImage\u003c/code>). Every component honours the house rules:\u003c/p>\n\u003cp>\u003cstrong>zero border-radius\u003c/strong>, \u003ccode>--ss-*\u003c/code> tokens (new chrome must rescale across sm/md/lg), \u003ccode>.ss-*\u003c/code> identity\u003c/p>\n\u003cp>prefix, scoped SCSS, Svelte 5 runes, and WCAG 2.2 AA.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All 6 component stories (DS-0044 → DS-0049) and their tasks (DS-0050 → DS-0055) created and triaged\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Each new component is additive (does not alter existing components/exports)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Per the testing RULE: every implemented task adds tests under \u003ccode>test/unit/\u003c/code> (+ harness) and keeps \u003ccode>pnpm test\u003c/code> green / \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Per the docs RULE: each component gets a docs page (\u003ccode>documentation/src/lib/component-docs/&lt;name&gt;.ts\u003c/code>) + \u003ccode>docs/tokens.md\u003c/code> updated for the new tokens; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Each is exported from \u003ccode>src/lib/index.ts\u003c/code> (with public types where applicable)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Board rebuilt (\u003ccode>node build.mjs\u003c/code>) as items move\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Scaffold landed\u003c/strong> (\u003ccode>feature/new-components-scaffold\u003c/code>): per-component token partials under\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>src/styles/components/\u003c/code> + a joiner, stub components wired into the barrel / \u003ccode>COMPONENT_NAMES\u003c/code> /\u003c/p>\n\u003cp>  docs assembler. This pre-slots every shared file so the six implementation PRs (DS-0050…0055) run\u003c/p>\n\u003cp>  in parallel without merge conflicts — each touches only files unique to its component.\u003c/p>\n\u003cul>\n\u003cli>Sibling epic [[DS-0016-components-improvements]] covered *improving existing* components; this one *adds new* ones.\u003c/li>\n\u003cli>Source components live in \u003ccode>/home/passoca/dev/passoca/src/lib/components/\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>Shipped in 0.7.0\u003c/strong> — all six implemented via parallel PRs (#49–#54) merged to \u003ccode>develop\u003c/code>: Menu\u003c/li>\n\u003c/ul>\n\u003cp>  [[ds-0050-dropdown-menu-implementation]], Accordion [[ds-0051-accordion-implementation]], Link\u003c/p>\n\u003cp>  [[ds-0052-link-implementation]], SegmentedControl [[ds-0053-segmented-control-implementation]],\u003c/p>\n\u003cp>  BottomNav [[ds-0054-bottom-nav-implementation]], Image [[ds-0055-image-implementation]].\u003c/p>","acTotal":6,"acDone":6},{"id":"DS-0044","type":"story","title":"Dropdown / Menu component","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>Dropdown / Menu\u003c/strong> primitive — a trigger button that opens a floating\u003c/p>\n\u003cp>panel of selectable items — so I can build theme pickers, language switchers, overflow menus, and\u003c/p>\n\u003cp>floating-nav menus without re-implementing popover, focus, and keyboard logic each time. The website\u003c/p>\n\u003cp>hand-rolls this same pattern three times (\u003ccode>ThemeMenu.svelte\u003c/code>, \u003ccode>LanguageMenu.svelte\u003c/code>, and the menu inside\u003c/p>\n\u003cp>\u003ccode>FloatNavButton.svelte\u003c/code>), each with its own click-outside, scale/fade animation, active-item checkmark,\u003c/p>\n\u003cp>and \u003ccode>aria-expanded\u003c/code> wiring — exactly the duplication a design-system primitive removes.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Menu\u003c/code> (Dropdown) component gains the behaviour tracked in [[ds-0050-dropdown-menu-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0050-dropdown-menu-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/ThemeMenu.svelte\u003c/code>, \u003ccode>LanguageMenu.svelte\u003c/code>, \u003ccode>FloatNavButton.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0045","type":"story","title":"Accordion component","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want an \u003cstrong>Accordion\u003c/strong> (collapsible disclosure) component — a header with a\u003c/p>\n\u003cp>rotating chevron that expands/collapses an animated content region — so I can present FAQs, grouped\u003c/p>\n\u003cp>settings, and progressive-disclosure content with correct semantics and keyboard support out of the box.\u003c/p>\n\u003cp>The website implements this as \u003ccode>AppExtension.svelte\u003c/code> (chevron rotates 180°, animated max-height + margin,\u003c/p>\n\u003cp>Enter/Space toggle, \u003ccode>open\u003c/code> event), but it is single-panel and app-specific; a design-system version should\u003c/p>\n\u003cp>generalize it.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Accordion\u003c/code> gains the behaviour tracked in [[ds-0051-accordion-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens (incl. motion duration) and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0051-accordion-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/AppExtension.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0046","type":"story","title":"Link component","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a styled \u003cstrong>Link\u003c/strong> component — an anchor with the design system's animated\u003c/p>\n\u003cp>underline (and an optional button-styled variant) — so inline and standalone links share one consistent,\u003c/p>\n\u003cp>accessible treatment instead of being styled ad hoc. The website's \u003ccode>AppLink.svelte\u003c/code> carries the signature\u003c/p>\n\u003cp>behaviour: a pseudo-element underline with a cubic-bezier reveal + glow (box-shadow), a \u003ccode>button\u003c/code> variant\u003c/p>\n\u003cp>(solid primary, no underline), and external-link handling (\u003ccode>target=\"_blank\"\u003c/code> + \u003ccode>rel=\"noopener noreferrer\"\u003c/code>).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Link\u003c/code> gains the behaviour tracked in [[ds-0052-link-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> tokens (color, motion) and respects zero border-radius; visible focus\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0052-link-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppLink.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0047","type":"story","title":"SegmentedControl component","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>SegmentedControl\u003c/strong> (toggle group) — a compact row of mutually-exclusive\u003c/p>\n\u003cp>options with a highlighted selection — so I can offer view/mode/locale toggles without a full Dropdown or\u003c/p>\n\u003cp>loose radio buttons. The website's \u003ccode>LanguageSwitcher.svelte\u003c/code> is the compact inline form of this (EN/PT\u003c/p>\n\u003cp>border buttons with an active state); a design-system version should generalize it to N options with\u003c/p>\n\u003cp>proper keyboard navigation and a bindable value.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>SegmentedControl\u003c/code> gains the behaviour tracked in [[ds-0053-segmented-control-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>WCAG 2.2 AA upheld (radiogroup/tablist semantics + arrow-key nav); \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0053-segmented-control-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/LanguageSwitcher.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0048","type":"story","title":"BottomNav component","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>BottomNav\u003c/strong> (mobile tab bar) — a fixed bottom row of icon+label tabs\u003c/p>\n\u003cp>with an active highlight — so app shells get a first-class mobile navigation surface to complement the\u003c/p>\n\u003cp>existing \u003ccode>Topbar\u003c/code>/\u003ccode>Sidebar\u003c/code>. The website's \u003ccode>MobileBottomNav.svelte\u003c/code> is the reference: a fixed grid of\u003c/p>\n\u003cp>icon+label items, semi-transparent blurred background, active-state highlight, and safe-area inset support\u003c/p>\n\u003cp>for notched devices.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>BottomNav\u003c/code> gains the behaviour tracked in [[ds-0054-bottom-nav-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens (and the shell height tokens) and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld (\u003ccode>aria-current\u003c/code>, hit-target sizing); \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0054-bottom-nav-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/MobileBottomNav.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0049","type":"story","title":"Image component","status":"done","priority":"low","tags":["ui","a11y","media"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want an \u003cstrong>Image\u003c/strong> component — a responsive \u003ccode>&lt;picture&gt;\u003c/code> with \u003ccode>srcset\u003c/code>, lazy\u003c/p>\n\u003cp>loading, an aspect-ratio box to prevent layout shift, a loading skeleton, and an optional lightbox — so\u003c/p>\n\u003cp>content images render performantly and consistently. The website's \u003ccode>AppImage.svelte\u003c/code> is the reference\u003c/p>\n\u003cp>(responsive sources, lazy load, aspect-ratio calc, skeleton loader, and a PhotoSwipe lightbox). The\u003c/p>\n\u003cp>design-system version must decide whether to depend on PhotoSwipe or ship a lighter built-in overlay\u003c/p>\n\u003cp>(see the task's acceptance criteria).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Image\u003c/code> gains the behaviour tracked in [[ds-0055-image-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Lightbox dependency decision (PhotoSwipe vs built-in overlay) made and documented\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> tokens; skeleton respects reduced-motion; respects zero border-radius\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>WCAG 2.2 AA upheld (alt text, dialog semantics for the lightbox); \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0055-image-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppImage.svelte\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>Decision:\u003c/strong> shipped a lightweight \u003cstrong>built-in\u003c/strong> lightbox (a \u003ccode>role=\"dialog\"\u003c/code> overlay with focus\u003c/li>\n\u003c/ul>\n\u003cp>  trap + Esc/backdrop close) rather than depending on PhotoSwipe — keeps dssoca zero-runtime-dep.\u003c/p>","acTotal":5,"acDone":5},{"id":"DS-0050","type":"task","title":"Dropdown / Menu implementation","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0044","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Menu\u003c/code> (Dropdown) component at \u003ccode>src/lib/components/Menu.svelte\u003c/code>, generalizing the three\u003c/p>\n\u003cp>hand-rolled popovers on the website (\u003ccode>ThemeMenu\u003c/code>, \u003ccode>LanguageMenu\u003c/code>, \u003ccode>FloatNavButton\u003c/code>). Keep it token-driven\u003c/p>\n\u003cp>(zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped SCSS, Svelte 5 runes). Each acceptance-criteria line is one\u003c/p>\n\u003cp>concrete prop/state/behaviour.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Trigger + panel\u003c/strong> — a trigger snippet/button toggles a floating panel; panel rendered with the popover shadow token (\u003ccode>--ss-shadow-pop\u003c/code>), zero radius\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Items model\u003c/strong> — \u003ccode>items: MenuItem[]\u003c/code> with \u003ccode>{ id, label, icon?, disabled?, selected?, onSelect }\u003c/code>; render a checkmark/active marker for \u003ccode>selected\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Open/close control\u003c/strong> — \u003ccode>open\u003c/code> bindable + uncontrolled fallback; close on item select, click-outside, and \u003ccode>Esc\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Keyboard nav\u003c/strong> — roving focus with \u003ccode>ArrowUp\u003c/code>/\u003ccode>ArrowDown\u003c/code>/\u003ccode>Home\u003c/code>/\u003ccode>End\u003c/code>, \u003ccode>Enter\u003c/code>/\u003ccode>Space\u003c/code> to activate; focus returns to trigger on close\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>ARIA\u003c/strong> — trigger \u003ccode>aria-haspopup=\"menu\"\u003c/code> + \u003ccode>aria-expanded\u003c/code>/\u003ccode>aria-controls\u003c/code>; panel \u003ccode>role=\"menu\"\u003c/code>, items \u003ccode>role=\"menuitem\"\u003c/code> (or \u003ccode>menuitemradio\u003c/code> when selectable)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Placement\u003c/strong> — \u003ccode>align\u003c/code> (start|end) and \u003ccode>side\u003c/code> (bottom|top); reads size tokens so it rescales across sm/md/lg\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('Menu', size)\u003c/code> (\u003ccode>src/lib/config.ts\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code> with \u003ccode>MenuItem\u003c/code> type\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests added in \u003ccode>test/unit/Menu.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Docs: \u003ccode>Menu\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code> (\u003ccode>COMPONENTS\u003c/code>); \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0044-dropdown-menu-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Sources: \u003ccode>passoca/src/lib/components/{ThemeMenu,LanguageMenu,FloatNavButton}.svelte\u003c/code>.\u003c/li>\n\u003cli>Consider whether \u003ccode>Topbar\u003c/code>'s existing command-menu affordance should later consume this primitive (follow-up, not this task).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":10},{"id":"DS-0051","type":"task","title":"Accordion implementation","status":"done","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0045","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Accordion\u003c/code> component at \u003ccode>src/lib/components/Accordion.svelte\u003c/code> (with item children), based on\u003c/p>\n\u003cp>the website's \u003ccode>AppExtension.svelte\u003c/code> but generalized to multiple panels. Keep it token-driven (zero radius,\u003c/p>\n\u003cp>\u003ccode>--ss-*\u003c/code> size + motion tokens, scoped SCSS, Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Header + content\u003c/strong> — each item has a clickable header (label + chevron) and an animated content region; chevron rotates 180° on open\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Animated reveal\u003c/strong> — expand/collapse uses a token-driven duration (\u003ccode>--ss-dur*\u003c/code>) and easing (\u003ccode>--ss-ease\u003c/code>); collapses to instant under \u003ccode>prefers-reduced-motion\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Single vs multi\u003c/strong> — \u003ccode>multiple?: boolean\u003c/code> (default single-open, where opening one closes the others)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\
