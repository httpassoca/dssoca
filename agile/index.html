<style>
:root{

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
a{color:inherit}
::selection{background:var(--primary);color:var(--on)}

.wrap{max-width:1200px;margin:0 auto;padding:24px 28px 80px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px;flex-wrap:wrap}
.head h1{font-family:var(--disp);font-weight:400;font-size:30px;letter-spacing:-.01em;margin:0;line-height:1}
.head h1 .accent{position:relative}
.head h1 .sep{color:var(--faint);margin:0 .2em}
.head h1 .accent::before{content:"";position:absolute;left:-2%;right:-6%;top:68%;height:22%;background:var(--primary);opacity:.9;z-index:-1}
.head .meta{font-size:11px;color:var(--faint);text-align:right;text-transform:lowercase;letter-spacing:.04em}
.metrics{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.metric{border:1px solid var(--line);background:var(--elev);padding:10px 14px;min-width:96px;cursor:pointer;transition:border-color .15s}
.metric:hover{border-color:var(--line2)}
.metric.on{border-color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}
.metric .v{font-family:var(--disp);font-size:26px;line-height:1;font-variant-numeric:tabular-nums}

.metric[data-s="done"] .v{color:var(--primary)} .metric[data-s="in-progress"] .v{color:var(--cyan)}
.metric[data-s="blocked"] .v{color:var(--red)} .metric[data-s="todo"] .v{color:var(--yellow)}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.bar input,.bar select{font-family:var(--mono);font-size:12px;background:transparent;color:var(--fg);border:1px solid var(--line);padding:7px 10px}
.bar input{min-width:200px;flex:1}

.detail .md-checks li .box{width:14px;height:14px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--primary);flex:none}
.detail .md-checks li.done{color:var(--fg)} .detail .md-checks li.done .box{border-color:var(--primary)}
.detail code{font-family:var(--mono);background:rgba(255,255,255,.06);padding:.1em .35em;font-size:.92em;color:#d6deeb}
.detail .kv{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:11px;color:var(--faint);margin-top:10px}
.detail .kv b{color:var(--muted);font-weight:400}
.tableview{width:100%;border-collapse:collapse;margin-top:8px}
.tableview th,.tableview td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);font-size:12px}
.tableview th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:400;cursor:pointer;user-select:none}
.tableview tbody tr{cursor:pointer} .tableview tbody tr:hover td{background:rgba(255,255,255,.03)}
.empty{padding:40px;text-align:center;color:var(--faint);border:1px solid var(--line);margin-top:16px}
.tagchip{font-size:10px;color:var(--blue);margin-right:6px}
.row.sel{background:rgba(102,239,115,.08);box-shadow:inset 2px 0 0 var(--primary)}
.tableview tbody tr.sel td{background:rgba(102,239,115,.08)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .18s;z-index:55}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(460px,94vw);background:var(--bg);border-left:1px solid var(--line2);box-shadow:-14px 0 44px rgba(0,0,0,.55);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .18s ease}
.drawer.open{transform:none}
.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg)}
.drawer-idrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.drawer-id{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.drawer-title{font-family:var(--disp);font-weight:400;font-size:18px;line-height:1.3;margin:0;color:var(--shine)}
.drawer-title .typ{color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:8px}
.drawer-x{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:13px;line-height:1;padding:6px 10px;cursor:pointer;flex:none}

.drawer-body{padding:8px 18px 32px;overflow-y:auto}

.foot{margin-top:28px;border-top:1px solid var(--line);padding-top:10px;font-size:10px;color:var(--faint);text-transform:lowercase;letter-spacing:.04em}
</style>

host / Disabled stories and live Controls (variant, type, disabled, label)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>A page for \u003cstrong>every\u003c/strong> component (14 total): Badge, Button, Card, EmptyState, Icon, Input, LogStream, MetricTile, PassocaMark, ServiceCard, Sidebar, Sparkline, Toaster, Topbar — each with multiple stories covering real variants/states\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stories live in \u003ccode>src/stories/\u003c/code> (not \u003ccode>src/lib/\u003c/code>) so \u003ccode>svelte-package\u003c/code> never publishes them — verified \u003ccode>pnpm pack\u003c/code> tarball contains no story/Storybook files\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green (121) and \u003ccode>pnpm pack\u003c/code> clean; full \u003ccode>pnpm build-storybook\u003c/code> succeeds\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Config: \u003ccode>.storybook/main.ts\u003c/code> (stories glob \u003ccode>src/**\u003c/code>, framework \u003ccode>@storybook/sveltekit\u003c/code>),\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>.storybook/preview.ts\u003c/code> (imports \u003ccode>theme.css\u003c/code>, axis toolbar globals + decorator).\u003c/p>\n\u003cul>\n\u003cli>Story: \u003ccode>src/stories/Button.stories.svelte\u003c/code> — \u003ccode>Button\u003c/code> takes its label as a child snippet,\u003c/li>\n\u003c/ul>\n\u003cp>  so a shared \u003ccode>template\u003c/code> snippet + \u003ccode>label\u003c/code> arg drives the text via Controls.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>pnpm-workspace.yaml\u003c/code> \u003ccode>allowBuilds: { esbuild: true }\u003c/code> lets pnpm 11 run esbuild's postinstall\u003c/li>\n\u003c/ul>\n\u003cp>  (Storybook/Vite need the native binary).\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>/storybook-static\u003c/code> gitignored. CI still runs \u003ccode>pnpm test\u003 pan>Color axis via \u003ccode>data-theme\u003c/code> (\u003ccode>dark\u003c/code> default · \u003ccode>light\u003c/code>) swaps surface/foreground tokens only\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Density axis via \u003ccode>data-density\u003c/code> (\u003ccode>comfy\u003c/code> default · \u003ccode>compact\u003c/code>) rescales chrome paddings/gaps/heights, not colors or content typography\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All four combinations (dark/comfy, dark/compact, light/comfy, light/compact) are valid and cascade from any ancestor (usually \u003ccode>&lt;html&gt;\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>applyDesignConfig({ theme, density })\u003c/code> merges over current config and writes to \u003ccode>&lt;html&gt;\u003c/code> at runtime\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>designAttributes({ ... })\u003c/code> returns SSR-safe attributes to spread in markup (no hydration flash)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius on every token (house rule, never overridden)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/theme.css\u003c/code> (exported as \u003ccode>dssoca/theme.css\u003c/code>) — token source of truth\u003c/li>\n\u003cli>\u003ccode>src/lib/config.ts\u003c/code> — \u003ccode>applyDesignConfig\u003c/code> / \u003ccode>designAttributes\u003c/code>, re-exported from package root\u003c/li>\n\u003cli>Content typography (\u003ccode>h1\u003c/code>–\u003ccode>h3\u003c/code>, \u003ccode>--hs-size-*\u003c/code>, \u003ccode>--hs-s-*\u003c/code>) is density-independent; only \u003ccode>--hs-leading\u003c/code> differs (1.5 comfy / 1.3 compact)\u003c/li>\n\u003cli>See \u003ccode>DESIGN.md\u003c/code> + \u003ccode>docs/themes.md\u003c/code> / \u003ccode>docs/tokens.md\u003c/code>\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0002","type":"story","title":"Reusable Svelte 5 component set (~14 components)","status":"done","priority":"high","tags":["ui"],"depends_on":["DS-0001"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I import ready-made Svelte 5 components from \u003ccode>dssoca\u003c/code> instead\u003c/p>\n\u003cp>of rebuilding primitives per project, so every app looks consistent and picks\u003c/p>\n\u003cp>up the active theme/density automatically.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>~14 components shipped: Badge, Button, Card, EmptyState, Icon, Input, LogStream, MetricTile, PassocaMark, ServiceCard, Sidebar, Sparkline, Toaster, Topbar\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All exported from the package root (\u003ccode>import { Button, Card } from 'dssoca'\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Components are unstyled wrappers over global \u003ccode>.hub-*\u003c/code> classes in \u003ccode>theme.css\u003c/code> — they inherit whatever theme/density is active on an ancestor\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Icon set includes a \u003ccode>book\u003c/code> glyph\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Built to \u003ccode>dist\u003c/code> via \u003ccode>svelte-package\u003c/code> for consumers\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Vitest + @testing-library/svelte suite covers the components\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/\u003c/code> — one \u003ccode>.svelte\u003c/code> file per component\u003c/li>\n\u003cli>\u003ccode>src/lib/index.ts\u003c/code> — package barrel export\u003c/li>\n\u003cli>Runner: \u003ccode>pnpm test\u003c/code> (Vitest, jsdom) — per the testing rule, extend on any change\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0003","type":"story","title":"Toast notifications (Toaster + toast API)","status":"done","priority":"low","tags":["ui"],"depends_on":["DS-0002"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I mount a single \u003ccode>&lt;Toaster /&gt;\u003c/code> and call an imperative \u003ccode>toast(...)\u003c/code>\u003c/p>\n\u003cp>from anywhere to surface transient feedback (success/error), so apps get consistent\u003c/p>\n\u003cp>notifications without wiring their own state.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>&lt;Toaster /&gt;\u003c/code> component renders the stack and is exported from the package root\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Imperative \u003ccode>toast\u003c/code> API enqueues notifications from any module (no prop drilling)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Toasts honor the active theme/density and the zero border-radius rule\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Used by apps as the standard channel for error/success feedback\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/Toaster.svelte\u003c/code> (component) + \u003ccode>src/lib/toast.svelte.ts\u003c/code> (reactive store + \u003ccode>toast\u003c/code> API)\u003c/li>\n\u003cli>Backs the project-wide error-handling rule (uniform toast feedback across apps)\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0004","type":"story","title":"EmptyState + consistent error/empty affordances","status":"done","priority":"low","tags":["ui"],"depends_on":["DS-0002"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I drop in an \u003ccode>EmptyState\u003c/code> for \"no data\" and \"something went wrong\"\u003c/p>\n\u003cp>cases, so empty lists and failed fetches render a consistent, on-theme affordance\u003c/p>\n\u003cp>instead of a blank screen in every app.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>EmptyState\u003c/code> component exported from the package root with title/message slots\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Renders on-theme (signal-green/near-black) and follows the zero border-radius rule\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Picks up active density (comfy/compact) like the rest of the set\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Used by apps for empty lists and degraded/error states (e.g. when a service is down)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/EmptyState.svelte\u003c/code>\u003c/li>\n\u003cli>Pairs with the Toaster (DS-0003) to satisfy the repo-wide error-handling rule\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0005","type":"task","title":"Rename --hs- tokens + hub-* classes to ss-","status":"done","priority":"low","tags":["ui","theme","breaking"],"depends_on":[],"parent":"DS-0001","epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The design system was extracted from the \u003ccode>hubssoca\u003c/code> monorepo as a lift-and-shift, keeping the\u003c/p>\n\u003cp>original \u003ccode>--hs-\u003c/code> CSS custom-property prefix and the global \u003ccode>hub-*\u003c/code> shell classes (e.g. \u003ccode>.ss-topbar\u003c/code>,\u003c/p>\n\u003cp>\u003ccode>.ss-panel\u003c/code>). For the standalone \u003ccode>dssoca\u003c/code> identity these were renamed to a neutral \u003ccode>ss-\u003c/code> prefix\u003c/p>\n\u003cp>(\u003ccode>--hs-\u003c/code> → \u003ccode>--ss-\u003c/code>, \u003ccode>hub-\u003c/code> → \u003ccode>ss-\u003c/code>).\u003c/p>\n\u003cp>This is a \u003cstrong>breaking change\u003c/strong> for any consumer that referenced the old tokens/classes directly. Done\u003c/p>\n\u003cp>in the working tree + committed; not yet published — the next npm release (≥ 0.2.0) ships it with a\u003c/p>\n\u003cp>migration note.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All \u003ccode>--hs-*\u003c/code> custom properties renamed to \u003ccode>--ss-*\u003c/code> in \u003ccode>src/lib/theme.css\u003c/code> and every component (472 refs)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All global \u003ccode>hub-*\u003c/code> classes renamed to \u003ccode>ss-*\u003c/code> in \u003ccode>theme.css\u003c/code> and component markup (166 refs)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests updated to the new names; \u003ccode>pnpm test\u003c/code> green (121/121)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>DESIGN.md / docs / README references updated to \u003ccode>--ss-\u003c/code> / \u003ccode>ss-\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Release notes flag the breaking rename when the next version is published (dssoca@0.2.0)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Prefix chosen: \u003ccode>ss-\u003c/code> (soca system), not \u003ccode>ds-\u003c/code> as originally scoped\u003c/li>\n\u003cli>Mechanical sweep: \u003ccode>--hs-\u003c/code> → \u003ccode>--ss-\u003c/code>, \u003ccode>hub-\u003c/code> → \u003ccode>ss-\u003c/code> across \u003ccode>src/ test/ docs/\u003c/code> + README/DESIGN; prose \"hub\" left intact\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0006","type":"task","title":"CI pipeline + git-flow + agent docs (CLAUDE.md)","status":"done","priority":"high","tags":["infra","ci","docs"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Set the repo up for collaborative/agent work: a CLAUDE.md operating guide, GitHub Actions CI on\u003c/p>\n\u003cp>every PR, and the git-flow branching model with protected branches.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>CLAUDE.md\u003c/code> — agent operating instructions (stack, layout, house rules, commands, git-flow, releasing)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>.github/workflows/ci.yml\u003c/code> — runs \u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm pack\u003c/code> on every PR and pushes to main/develop\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>packageManager\u003c/code> pinned in \u003ccode>package.json\u003c/code> (pnpm@11.1.3) for reproducible CI\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>git-flow: \u003ccode>develop\u003c/code> branch created off \u003ccode>main\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Branch protection on \u003ccode>main\u003c/code> + \u003ccode>develop\u003c/code>: require PR + green \u003ccode>test\u003c/code> check before merge\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>CI deliberately skips \u003ccode>pnpm check\u003c/code> (svelte-check) — pre-existing \u003ccode>$lib\u003c/code> alias error from the library template, not a real type bug\u003c/li>\n\u003cli>Solo-friendly protection: 0 required approvals (owner self-merges once CI is green)\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0008","type":"story","title":"Sass-based styling pipeline","status":"done","priority":"high","tags":["styling","sass","build","refactor"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I author the global styling in \u003cstrong>Sass\u003c/strong> instead of\u003c/p>\n\u003cp>hand-written CSS — split into partials, with nesting and mixins for the repeated rule patterns —\u003c/p>\n\u003cp>while keeping the published \u003ccode>dssoca/theme.css\u003c/code> output and the \u003ccode>--ss-*\u003c/code> token + \u003ccode>data-theme\u003c/code>/\u003c/p>\n\u003cp>\u003ccode>data-density\u003c/code> cascade model exactly as they are today. This also enables \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>\u003c/p>\n\u003cp>in components so the follow-up scoped-styles work (DS-0009) can use Sass from the start.\u003c/p>\n\u003cp>Foundational and \u003cstrong>non-breaking\u003c/strong>: the compiled CSS is functionally identical, so nothing\u003c/p>\n\u003cp>changes for consumers. Sequenced first so DS-0009 writes scoped SCSS directly rather than\u003c/p>\n\u003cp>rewriting every component twice (CSS then SCSS).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>sass\u003c/code> added as a devDependency; \u003ccode>vitePreprocess()\u003c/code> enabled via the \u003ccode>preprocess\u003c/code> field in \u003ccode>svelte.config.js\u003c/code> (uses the already-installed \u003ccode>@sveltejs/vite-plugin-svelte\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>src/lib/theme.css\u003c/code> reauthored as Sass partials under \u003ccode>src/styles/\u003c/code> (outside \u003ccode>src/lib\u003c/code>, so \u003ccode>svelte-package\u003c/code> never publishes them): \u003ccode>_tokens.scss\u003c/code>, \u003ccode>_base.scss\u003c/code>, \u003ccode>_layout.scss\u003c/code>, \u003ccode>_components.scss\u003c/code>, and a \u003ccode>theme.scss\u003c/code> entry that \u003ccode>@use\u003c/code>-s them\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>--ss-*\u003c/code> tokens remain \u003cstrong>explicit CSS custom properties\u003c/strong> (not Sass \u003ccode>$variables\u003c/code>, not generated from maps); Sass is used only for structure (partials/nesting/mixins). All four axis combinations (dark/light × comfy/compact) still recolor/rescale identically\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius and the \u003ccode>--ss-*\u003c/code> / \u003ccode>.ss-*\u003c/code> prefixes preserved (house rules)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>prepack\u003c/code> compiles \u003ccode>src/styles/theme.scss\u003c/code> → \u003ccode>dist/theme.css\u003c/code> via a \u003cstrong>Dart Sass CLI\u003c/strong> step run *after* \u003ccode>svelte-package\u003c/code>; the \u003ccode>./theme.css\u003c/code> → \u003ccode>./dist/theme.css\u003c/code> export is unchanged\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Component \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code> compiles through \u003ccode>svelte-package\u003c/code> once the preprocessor is set — no extra config (svelte-package preprocesses \u003ccode>.svelte\u003c/code>; only standalone \u003ccode>.scss\u003c/code> needs the separate CLI step)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Dev/showcase/Storybook imports updated to the \u003ccode>.scss\u003c/code> entry (Vite compiles on the fly): \u003ccode>src/routes/+page.svelte\u003c/code>, \u003ccode>.storybook/preview.ts\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm pack\u003c/code> tarball contains \u003ccode>dist/theme.css\u003c/code> and \u003cstrong>no\u003c/strong> \u003ccode>.scss\u003c/code>; \u003ccode>pnpm test\u003c/code> green (121); \u003ccode>pnpm dev\u003c/code> + \u003ccode>pnpm build-storybook\u003c/code> render identically to before\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>version\u003c/code> bumped to \u003cstrong>0.2.1\u003c/strong> (patch — non-breaking); agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Why a separate CLI step:\u003c/strong> \u003ccode>svelte-package@2.5.8\u003c/code> only preprocesses \u003ccode>.svelte\u003c/code>/\u003ccode>.ts\u003c/code>/\u003ccode>.js\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  and copies everything else verbatim (\u003ccode>node_modules/@sveltejs/package/src/index.js:258,285\u003c/code>),\u003c/p>\n\u003cp>  so a standalone \u003ccode>theme.scss\u003c/code> would ship un-compiled. The Dart Sass CLI step produces the\u003c/p>\n\u003cp>  published \u003ccode>dist/theme.css\u003c/code>.\u003c/p>\n\u003cul>\n\u003cli>Keep token blocks hand-written/explicit (they are the documented source of truth in\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>docs/tokens.md\u003c/code>); don't DRY them into Sass maps/loops at the cost of readability.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>_components.scss\u003c/code> is a staging home for the current \u003ccode>.ss-*\u003c/code> component rules — DS-0009 lifts\u003c/li>\n\u003c/ul>\n\u003cp>  each block out into its component, leaving this partial empty/removed. See [[DS-0009-scoped-component-styles]].\u003c/p>\n\u003cul>\n\u003cli>Follows the same \"source lives outside the published \u003ccode>src/lib\u003c/code>\" pattern used for \u003ccode>src/stories/\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  in [[DS-0007-storybook-component-explorer]].\u003c/p>","acTotal":9,"acDone":9},{"id":"DS-0009","type":"story","title":"Scoped component styles","status":"done","priority":"high","tags":["styling","refactor","breaking"],"depends_on":["DS-0008"],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, each component owns its styling in a scoped\u003c/p>\n\u003cp>\u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code> block instead of relying on global \u003ccode>.ss-*\u003c/code> rules, so styles live next to\u003c/p>\n\u003cp>the markup they style and can't leak. The global stylesheet shrinks to what genuinely must be\u003c/p>\n\u003cp>global — \u003ccode>--ss-*\u003c/code> tokens, base/element styles, and app-shell/layout.\u003c/p>\n\u003cp>\u003cstrong>Breaking\u003c/strong> (→ \u003ccode>0.3.0\u003c/code>): the global \u003ccode>.ss-*\u003c/code> *component* rules are removed from the published\u003c/p>\n\u003cp>\u003ccode>theme.css\u003c/code>. Components still render correctly (they apply their own classes and consume tokens\u003c/p>\n\u003cp>via \u003ccode>var(--ss-*)\u003c/code>, which cascade through Svelte's scoped boundary). Only consumers who hand-wrote\u003c/p>\n\u003cp>raw \u003ccode>&lt;button class=\"ss-btn\"&gt;\u003c/code> against \u003ccode>theme.css\u003c/code> — instead of using the components — are\u003c/p>\n\u003cp>affected. Depends on [[DS-0008-sass-styling-pipeline]].\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Component-owned rules moved from the global \u003ccode>_components\u003c/code> partial into each component's \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>: Badge, Button, Card, Input, LogStream, MetricTile, ServiceCard, Sparkline, Topbar, Sidebar; EmptyState + Toaster normalized to the same convention. Icon and PassocaMark (SVG utilities) need little/no change\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Naming rule\u003c/strong> applied: \u003ccode>ss-\u003c/code> is reserved for component identity / non-generic design-system classes. Component roots keep their \u003ccode>.ss-*\u003c/code> name (\u003ccode>.ss-btn\u003c/code>, \u003ccode>.ss-badge\u003c/code>, \u003ccode>.ss-panel\u003c/code>, \u003ccode>.ss-input\u003c/code>, \u003ccode>.ss-field\u003c/code>, \u003ccode>.ss-metric\u003c/code>, \u003ccode>.ss-svc\u003c/code>, \u003ccode>.ss-spark\u003c/code>, \u003ccode>.ss-logs\u003c/code>, \u003ccode>.ss-topbar\u003c/code>, \u003ccode>.ss-side\u003c/code>, \u003ccode>.ss-toast(er)\u003c/code>, \u003ccode>.ss-empty\u003c/code>); generic internal sub-elements use plain scoped names (\u003ccode>.dot\u003c/code>, \u003ccode>.title\u003c/code>, \u003ccode>.head\u003c/code>, \u003ccode>.body\u003c/code>, \u003ccode>.msg\u003c/code>, \u003ccode>.icon\u003c/code>, \u003ccode>.bar\u003c/code>…)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>.ss-panel-head\u003c/code> / \u003ccode>.ss-panel-body\u003c/code> (the only ss-prefixed *sub-element* classes) renamed to local \u003ccode>.head\u003c/code> / \u003ccode>.body\u003c/code>; Card's ~4 test assertions updated. All other \u003ccode>.ss-*\u003c/code> root selectors unchanged, so the rest of the suite is untouched\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>theme.css\u003c/code> retains only: \u003ccode>--ss-*\u003c/code> tokens, base/element resets + \u003ccode>.hs-*\u003c/code> typography, app-shell/layout classes (\u003ccode>.ss-app\u003c/code>, \u003ccode>.ss-main\u003c/code>, \u003ccode>.ss-pageHead\u003c/code>, \u003ccode>.ss-metrics\u003c/code>, \u003ccode>.ss-grid-2\u003c/code>, \u003ccode>.ss-svc-grid\u003c/code>, \u003ccode>.ss-footer\u003c/code>), and generic utilities (\u003ccode>.ss-line\u003c/code>). The migrated component rules are deleted from the global CSS\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Components consume \u003ccode>--ss-*\u003c/code> via \u003ccode>var()\u003c/code> inside scoped blocks; all four axis combinations recolor/rescale correctly; zero border-radius preserved\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>:global()\u003c/code> used where a component styles projected \u003ccode>{@render children()}\u003c/code> / snippet content — \u003cstrong>verified none needed\u003c/strong>: every component's CSS targets only its own wrapper elements (Card styles \u003ccode>.ss-panel\u003c/code>/\u003ccode>.head\u003c/code>/\u003ccode>.body\u003c/code>, not the projected body content), and the Storybook build reports zero \"Unused CSS selector\" warnings\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Internal raw \u003ccode>.ss-\u003c/code> usages fixed: Toaster and Input stories use the real components; the bogus \u003ccode>.ss-btn--primary\u003c/code> class (never matched the real \u003ccode>.ss-btn.primary\u003c/code>) removed\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>DESIGN.md\u003c/code> + \u003ccode>CLAUDE.md\u003c/code> updated: replace the \"components are thin wrappers over global \u003ccode>.ss-*\u003c/code> classes\" framing with the scoped model + the \u003ccode>ss-\u003c/code>-for-identity naming rule + what stays global; reconcile \u003ccode>docs/themes.md\u003c/code> / \u003ccode>docs/tokens.md\u003c/code> if they reference the old model\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green (only Card selectors changed); \u003ccode>pnpm pack\u003c/code> clean; showcase + Storybook render identically\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>version\u003c/code> bumped to \u003cstrong>0.3.0\u003c/strong> (breaking) with a short migration note (raw \u003ccode>.ss-*\u003c/code> component classes removed — use the components); agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Why tests barely move:\u003c/strong> Svelte keeps the original class names in the DOM (adding a hash),\u003c/li>\n\u003c/ul>\n\u003cp>  so \u003ccode>querySelector('.ss-btn')\u003c/code> etc. still match as long as the class stays in markup. The only\u003c/p>\n\u003cp>  renames are the two \u003ccode>.ss-panel-*\u003c/code> sub-element classes.\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Cascade is safe:\u003c/strong> CSS custom properties inherit through Svelte's scoped-style boundary\u003c/li>\n\u003c/ul>\n\u003cp>  (no shadow DOM) — already proven by the existing \u003ccode>EmptyState.svelte\u003c/code> scoped block.\u003c/p>\n\u003cul>\n\u003cli>Builds directly on [[DS-0008-sass-styling-pipeline]]: lift each block out of \u003ccode>_components.scss\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  into its component's \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>, then delete the staging partial.\u003c/p>\n\u003cul>\n\u003cli>Out of scope: renaming the legacy \u003ccode>.hs-*\u003c/code> typography prefix (stays global in base).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":10},{"id":"DS-0010","type":"story","title":"Custom documentation site (shadcn-style)","status":"done","priority":"high","tags":["docs","tooling","dx"],"depends_on":["DS-0011","DS-0012","DS-0013"],"parent":null,"epic":null,"created":"2026-06-07","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I want a \u003cstrong>custom documentation site\u003c/strong> — in the spirit of\u003c/p>\n\u003cp>\u003ca href=\"https://ui.shadcn.com/\" rel=\"noreferrer\">ui.shadcn.com\u003c/a> but for dssoca — that \u003cstrong>dogfoods the design system\u003c/strong> for\u003c/p>\n\u003cp>its own UI, covers only the content that exists today, and \u003cstrong>connects to Storybook\u003c/strong> by embedding\u003c/p>\n\u003cp>the live stories. Storybook stays the interactive playground; this site is the narrative + reference\u003c/p>\n\u003cp>home. Sequenced last so it documents the final config, size, and a11y state.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Docs site built in this repo with \u003cstrong>SvelteKit + mdsvex\u003c/strong>; pages authored in \u003ccode>.svx\u003c/code> (Markdown + Svelte); the site's own chrome is built from dssoca components/tokens (dogfooding) — lives in a standalone \u003ccode>documentation/\u003c/code> app (workspace package importing the dssoca source)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>shadcn-style structure: landing + left-nav with \u003cstrong>Introduction\u003c/strong>, \u003cstrong>Installation / Getting Started\u003c/strong>, \u003cstrong>Theming &amp; config\u003c/strong> (the theme axis + size system + \u003ccode>dssoca.config.ts\u003c/code>), \u003cstrong>Tokens\u003c/strong> (a live swatch/scale gallery rendered from the real \u003ccode>--ss-*\u003c/code> vars), and \u003cstrong>a page per component\u003c/strong>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Each component page \u003cstrong>embeds its Storybook story inline\u003c/strong> (iframe) for a live interactive demo, plus usage/code and an \"Open in Storybook\" link\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Content limited to \u003cstrong>what exists today\u003c/strong> (the 14 components, the theme axis, the size system, tokens) — no speculative/future content\u003c/li>\n\u003c/ul>\n\u003cul>\n\u003cli>[~] ~~Deployed to GitHub Pages~~ — \u003cstrong>deferred (out of scope): local-only per request.\u003c/strong> Build uses \u003ccode>adapter-static\u003c/code> so \u003ccode>pnpm docs:build\u003c/code> produces a static site; Storybook embeds default to \u003ccode>http://localhost:6006\u003c/code> (override via \u003ccode>VITE_STORYBOOK_URL\u003c/code>). No CI/deploy workflow added.\u003c/li>\n\u003c/ul>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Add \u003ccode>CHANGELOG.md\u003c/code> (Keep a Changelog; backfill 0.1.0 → current), \u003ccode>CONTRIBUTING.md\u003c/code>, and README version/CI badges\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Docs site builds locally (\u003ccode>pnpm docs:build\u003c/code>); the docs app is \u003cstrong>not\u003c/strong> shipped in the npm tarball (\u003ccode>pnpm pack\u003c/code> stays clean); \u003ccode>pnpm test\u003c/code> green; agile + board rebuilt\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Build choice confirmed: SvelteKit + mdsvex, dogfood dssoca, \u003cstrong>embed Storybook stories inline\u003c/strong>\u003c/li>\n\u003c/ul>\n\u003cp>  (iframe) rather than only linking out. Keep embeds pointed at the deployed Storybook URL so they\u003c/p>\n\u003cp>  stay in sync.\u003c/p>\n\u003cul>\n\u003cli>mdsvex integrates as a Svelte preprocessor (\u003ccode>.svx\u003c/code>); the project already uses \u003ccode>vitePreprocess\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  for SCSS — confirm the two compose, or add the mdsvex preprocessor alongside.\u003c/p>\n\u003cul>\n\u003cli>GitHub Pages base-path: SvelteKit \u003ccode>paths.base\u003c/code> likely needs the repo name; the inline Storybook\u003c/li>\n\u003c/ul>\n\u003cp>  iframes must use the deployed Storybook path.\u003c/p>\n\u003cul>\n\u003cli>Depends on the other three so the docs reflect the final API: theme axis + \u003ccode>dssoca.config.ts\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  ([[DS-0011-design-system-config-file]]), the size system ([[DS-0012-config-driven-size-system]]),\u003c/p>\n\u003cp>  and the a11y notes ([[DS-0013-accessibility-pass]]).\u003c/p>\n\u003cul>\n\u003cli>Research: ui.shadcn.com structure, mdsvex, Storybook embedding/composition, Keep a Changelog.\u003c/li>\n\u003cli>Effort: largest of the four — it's a small site, CI deploy, and per-component pages.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Implementation notes (delivered)\u003c/h4>\n\u003cul>\n\u003cli>Built as a \u003cstrong>standalone SvelteKit + mdsvex app\u003c/strong> under \u003ccode>documentation/\u003c/code> (its own \u003ccode>package.json\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  added to the pnpm workspace), rather than evolving \u003ccode>src/routes\u003c/code>. It dogfoods dssoca by importing\u003c/p>\n\u003cp>  the library \u003cstrong>source\u003c/strong> (\u003ccode>../src/lib\u003c/code>, \u003ccode>../src/styles\u003c/code>) via \u003ccode>kit.alias\u003c/code> — no build step needed.\u003c/p>\n\u003cul>\n\u003cli>The old hub-dashboard showcase (\u003ccode>src/routes/+page.svelte\u003c/code>) was \u003cstrong>removed\u003c/strong> and replaced with a\u003c/li>\n\u003c/ul>\n\u003cp>  stub landing; Storybook + the docs site are now the live previews.\u003c/p>\n\u003cul>\n\u003cli>Per-component pages are a single config-driven dynamic route (\u003ccode>components/[slug]\u003c/code>) fed by\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>documentation/src/lib/docs.config.ts\u003c/code> (the nav + per-component metadata + Storybook story ids).\u003c/p>\n\u003cul>\n\u003cli>Tokens page renders live from the real \u003ccode>--ss-*\u003c/code> vars and updates when the theme/size axes flip.\u003c/li>\n\u003cli>Run locally: \u003ccode>pnpm docs:dev\u003c/code> (+ \u003ccode>pnpm storybook\u003c/code> for the embeds). Build: \u003ccode>pnpm docs:build\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>Deploy + CI\u003c/strong> (GitHub Pages, Storybook co-deploy) intentionally deferred per request.\u003c/li>\n\u003cli>\u003cstrong>Syntax highlighting:\u003c/strong> Prism (shared singleton in \u003ccode>prism-setup.js\u003c/code>) for both \u003ccode>.svx\u003c/code> fences and\u003c/li>\n\u003c/ul>\n\u003cp>  the \u003ccode>CodeBlock\u003c/code> component; token colours mapped to \u003ccode>--ss-code-*\u003c/code> in \u003ccode>styles/code.css\u003c/code> so\u003c/p>\n\u003cp>  highlighting follows the theme axis. Monospace accents use a new \u003ccode>--ss-lime\u003c/code> token (not cyan).\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Tests:\u003c/strong> minimal Vitest suite (\u003ccode>documentation/test/\u003c/code>) covering the \u003ccode>docs.config\u003c/code> invariants and\u003c/li>\n\u003c/ul>\n\u003cp>  the highlighter — \u003ccode>pnpm docs:test\u003c/code>.\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Context:\u003c/strong> \u003ccode>documentation/CLAUDE.md\u003c/code> documents the docs-app architecture and house rules.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0011","type":"story","title":"Design-system config file (typed TS manifest)","status":"done","priority":"high","tags":["config","dx","api"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-07","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I want a single typed \u003cstrong>config file\u003c/strong> (\u003ccode>dssoca.config.ts\u003c/code>) that\u003c/p>\n\u003cp>declares *how the design system works* — the available theming + density and their defaults — so\u003c/p>\n\u003cp>there's one extensible source of truth that grows as the system gains more configuration. Today\u003c/p>\n\u003cp>the defaults live implicitly in \u003ccode>src/lib/config.ts\u003c/code> (\u003ccode>defaultDesignConfig\u003c/code>) and the \u003ccode>ColorTheme\u003c/code> /\u003c/p>\n\u003cp>\u003ccode>Density\u003c/code> unions are hand-written; this story lifts those into a manifest the rest of the code\u003c/p>\n\u003cp>derives from.\u003c/p>\n\u003cp>Foundational and \u003cstrong>non-breaking\u003c/strong> (additive). Sequenced first so [[DS-0012-config-driven-size-system]]\u003c/p>\n\u003cp>can extend it with the size system.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New \u003ccode>src/lib/dssoca.config.ts\u003c/code> exports a typed manifest declaring: available color themes (\u003ccode>dark\u003c/code> = default, \u003ccode>light\u003c/code>), available densities (\u003ccode>comfy\u003c/code> = default, \u003ccode>compact\u003c/code>), and the default config — structured so future options slot in without breaking the shape\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>src/lib/config.ts\u003c/code> derives \u003ccode>defaultDesignConfig\u003c/code> and the \u003ccode>ColorTheme\u003c/code> / \u003ccode>Density\u003c/code> types from the manifest (single source of truth; no duplicated literals)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>The manifest is re-exported from the package root (\u003ccode>src/lib/index.ts\u003c/code>); add an \u003ccode>exports\u003c/code> entry if a separate import path is wanted (e.g. \u003ccode>dssoca/config\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Token \u003cstrong>values\u003c/strong> stay in \u003ccode>src/styles/\u003c/code> SCSS — the manifest references theme/density names + defaults, not full token tables\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>applyDesignConfig\u003c/code> / \u003ccode>designAttributes\u003c/code> / \u003ccode>getDesignConfig\u003c/code> behaviour unchanged; all four theme×density combinations still resolve identically\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Vitest coverage for the manifest (defaults, that config derives from it); \u003ccode>pnpm test\u003c/code> green\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm pack\u003c/code> clean (publint); \u003ccode>DESIGN.md\u003c/code> / \u003ccode>docs/themes.md\u003c/code> note the config file\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Non-breaking → patch/minor bump; agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Keep the manifest declarative and serialisable-ish (no side effects) so it can later back a JSON\u003c/li>\n\u003c/ul>\n\u003cp>  export or tooling if needed.\u003c/p>\n\u003cul>\n\u003cli>The owner's intent: \"a json or a ts file to configure how the ds works … in the future the\u003c/li>\n\u003c/ul>\n\u003cp>  design system will have more configurations.\" TS chosen for type-safety + zero parsing.\u003c/p>\n\u003cul>\n\u003cli>This is the home that [[DS-0012-config-driven-size-system]] extends with \u003ccode>sizeVariant\u003c/code> (global\u003c/li>\n\u003c/ul>\n\u003cp>  default size) and a \u003ccode>ComponentsSize\u003c/code> map (per-component default sizes).\u003c/p>\n\u003cul>\n\u003cli>Mirrors the \"config is the source of truth\" idea from \u003ccode>config.ts\u003c/code> today; see also \u003ccode>DESIGN.md\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":8,"acDone":8},{"id":"DS-0012","type":"story","title":"Config-driven size system (rename density → sizeVariant)","status":"done","priority":"high","tags":["styling","api","breaking"],"depends_on":["DS-0011"],"parent":null,"epic":null,"created":"2026-06-07","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a consumer, I want components to come in \u003cstrong>sizes\u003c/strong> (\u003ccode>sm | md | lg\u003c/code>) driven by a global config\u003c/p>\n\u003cp>with per-component and per-instance overrides, so I can scale the whole UI or individual\u003c/p>\n\u003cp>components consistently. This reframes the existing \u003cstrong>density axis as a size system\u003c/strong>: the current\u003c/p>\n\u003cp>\u003ccode>comfy\u003c/code>/\u003ccode>compact\u003c/code> density maps onto \u003ccode>md\u003c/code>/\u003ccode>sm\u003c/code>, a new \u003ccode>lg\u003c/code> step is added, and a global config sets\u003c/p>\n\u003cp>defaults that any component can override.\u003c/p>\n\u003cp>\u003cstrong>Breaking → \u003ccode>0.4.0\u003c/code>\u003c/strong>: the public density API (\u003ccode>data-density\u003c/code>, \u003ccode>applyDesignConfig({ density })\u003c/code>,\u003c/p>\n\u003cp>the \u003ccode>Density\u003c/code> type) is renamed to the size axis. Builds on [[DS-0011-design-system-config-file]].\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Density axis renamed to a \u003cstrong>size\u003c/strong> axis: scale \u003ccode>sm | md | lg\u003c/code> (default \u003ccode>md\u003c/code>); remap the\u003c/li>\n\u003c/ul>\n\u003cp>      existing token blocks \u003cstrong>\u003ccode>comfy\u003c/code> → \u003ccode>md\u003c/code>, \u003ccode>compact\u003c/code> → \u003ccode>sm\u003c/code>\u003c/strong> in \u003ccode>src/styles/_tokens.scss\u003c/code> and\u003c/p>\n\u003cp>      add a new \u003cstrong>\u003ccode>lg\u003c/code>\u003c/strong> token set (larger control padding/font/etc.)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Attribute \u003ccode>data-density\u003c/code> → \u003ccode>data-size\u003c/code> (or \u003ccode>data-size-variant\u003c/code>); \u003ccode>applyDesignConfig\u003c/code> /\u003c/li>\n\u003c/ul>\n\u003cp>      \u003ccode>designAttributes\u003c/code> / \u003ccode>getDesignConfig\u003c/code> and the \u003ccode>Density\u003c/code> type updated to the size axis\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>dssoca.config.ts\u003c/code> extended with \u003cstrong>\u003ccode>sizeVariant\u003c/code>\u003c/strong> (global default size for all components)\u003c/li>\n\u003c/ul>\n\u003cp>      and a \u003cstrong>\u003ccode>ComponentsSize\u003c/code>\u003c/strong> map (per-component default size overrides)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Every component\u003c/strong> gets a \u003ccode>size?: 'sm' | 'md' | 'lg'\u003c/code> prop, resolving\u003c/li>\n\u003c/ul>\n\u003cp>      \u003ccode>prop ?? ComponentsSize[component] ?? sizeVariant ?? 'md'\u003c/code>; non-global sizes applied via\u003c/p>\n\u003cp>      **local \u003ccode>--ss-*\u003c/code> overrides** on the instance so the scoped component CSS is unchanged\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Icon &amp; PassocaMark: numeric \u003ccode>size\u003c/code> prop \u003cstrong>renamed to \u003ccode>px\u003c/code>\u003c/strong> (frees \u003ccode>size\u003c/code> for the scale);\u003c/li>\n\u003c/ul>\n\u003cp>      update internal usages (\u003ccode>Sidebar\u003c/code> \u003ccode>&lt;Icon px=…&gt;\u003c/code>, \u003ccode>Topbar\u003c/code> \u003ccode>&lt;PassocaMark px=…&gt;\u003c/code>)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Storybook: density toolbar global → size; component stories expose the \u003ccode>size\u003c/code> control;\u003c/li>\n\u003c/ul>\n\u003cp>      stories + Vitest tests updated (including the renamed Icon/PassocaMark prop)\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius + \u003ccode>ss-\u003c/code>-identity rules preserved; all theme × size combinations render correctly\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green; \u003ccode>pnpm pack\u003c/code> clean; \u003ccode>version\u003c/code> → \u003cstrong>0.4.0\u003c/strong> with a migration note\u003c/li>\n\u003c/ul>\n\u003cp>      (density API → size); \u003ccode>DESIGN.md\u003c/code> / \u003ccode>CLAUDE.md\u003c/code> / \u003ccode>docs/\u003c/code> updated; agile + board rebuilt\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Owner's model: a global config controls all component sizes (default \u003ccode>md\u003c/code>); \u003ccode>ComponentsSize\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  sets per-component defaults; each component's \u003ccode>size\u003c/code> prop overrides per instance; **compact→sm,\u003c/p>\n\u003cp>  comfy→md, lg new**; config \u003ccode>sizeVariant\u003c/code> sets the global default. Density is renamed entirely\u003c/p>\n\u003cp>  into this system (chosen over keeping density as a separate parallel axis).\u003c/p>\n\u003cul>\n\u003cli>Per-instance/per-component sizes use local CSS custom-property overrides (Svelte supports\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>--ss-control-py\u003c/code> overrides on a component), so the cascade keeps working and component \u003ccode>&lt;style&gt;\u003c/code>\u003c/p>\n\u003cp>  blocks stay untouched — consistent with how the axis tokens already work.\u003c/p>\n\u003cul>\n\u003cli>Research: EightShapes \"Size in Design Systems\" (≤3 stops, md default), Radix Themes (\u003ccode>size\u003c/code> vs\u003c/li>\n\u003c/ul>\n\u003cp>  global \u003ccode>scaling\u003c/code>), Carbon/shadcn size scales.\u003c/p>\n\u003cul>\n\u003cli>Decide the exact \u003ccode>lg\u003c/code> token values + the attribute name (\u003ccode>data-size\u003c/code> vs \u003ccode>data-size-variant\u003c/code>) at\u003c/li>\n\u003c/ul>\n\u003cp>  implementation; migration note must spell out the density→size rename for consumers.\u003c/p>\n\u003cul>\n\u003cli>Depends on [[DS-0011-design-system-config-file]]; precedes the docs site\u003c/li>\n\u003c/ul>\n\u003cp>  [[DS-0010-custom-docs-site]] (which documents the final size API).\u003c/p>","acTotal":8,"acDone":8},{"id":"DS-0013","type":"story","title":"Accessibility pass (WCAG 2.2 AA, Tier 2)","status":"done","priority":"high","tags":["a11y","quality","testing"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-07","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a consumer, I want the components to meet \u003cstrong>WCAG 2.2 AA\u003c/strong> so the design system is usable with a\u003c/p>\n\u003cp>keyboard and assistive tech. This is a \"Tier 2\" pass: fix the concrete per-component gaps, add the\u003c/p>\n\u003cp>system-wide wins (reduced motion, a failing contrast token), and wire automated a11y testing —\u003c/p>\n\u003cp>without the riskier structural rewrites (converting \u003ccode>role=\"button\"\u003c/code> divs to native buttons and a\u003c/p>\n\u003cp>blocking CI gate are deferred to a possible Tier 3). Non-breaking.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Keyboard:\u003c/strong> \u003ccode>role=\"button\"\u003c/code> \u003ccode>&lt;div&gt;\u003c/code>s (\u003ccode>Sidebar\u003c/code>, \u003ccode>ServiceCard\u003c/code>) handle \u003cstrong>Space and Enter\u003c/strong> (with \u003ccode>preventDefault\u003c/code>); \u003ccode>aria-current=\"page\"\u003c/code> on the active sidebar item + topbar tab. Topbar's \u003ccode>⌘K\u003c/code>/shortcut number are decorative (no action) → marked \u003ccode>aria-hidden\u003c/code> rather than faked as interactive; user-email left as plain text. (Converting these to real, actioned controls is deferred.)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Live regions:\u003c/strong> \u003ccode>Toaster\u003c/code> uses a stable \u003ccode>role=\"status\"\u003c/code> container with \u003ccode>role=\"alert\"\u003c/code> for the \u003ccode>error\u003c/code> kind; resolve the \u003ccode>role=\"region\"\u003c/code> + \u003ccode>aria-live\u003c/code> + \u003ccode>&lt;output&gt;\u003c/code> nesting so messages announce once\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Icons / decorative:\u003c/strong> \u003ccode>Icon\u003c/code> is \u003ccode>aria-hidden\u003c/code> by default with an optional \u003ccode>title\u003c/code>/label for standalone use; \u003ccode>aria-hidden\u003c/code> on decorative bits (Badge/Sidebar status dots, Sparkline bars, MetricTile delta arrows, EmptyState emoji)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Forms:\u003c/strong> \u003ccode>Input\u003c/code> requires or auto-generates an \u003ccode>id\u003c/code> when a label is present (so \u003ccode>for\u003c/code>/\u003ccode>id\u003c/code> always links) and supports \u003ccode>aria-describedby\u003c/code> / \u003ccode>aria-invalid\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Semantics:\u003c/strong> Card / EmptyState titles use heading semantics (or a configurable level); expand the \u003ccode>deg\u003c/code> badge label to \"degraded\" (or add a \u003ccode>title\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Reduced motion:\u003c/strong> \u003ccode>@media (prefers-reduced-motion: reduce)\u003c/code> collapses \u003ccode>--ss-dur-*\u003c/code> in \u003ccode>_tokens.scss\u003c/code>, and Toaster's \u003ccode>fly\u003c/code> transition is guarded via Svelte 5 \u003ccode>prefersReducedMotion\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Contrast:\u003c/strong> darken \u003ccode>--ss-fg-faint\u003c/code> (#6f6f6f → ~#8a8a8a) so it clears 4.5:1 AA on bg and bg-elev (it currently fails at 3.8:1 / 3.3:1)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Tooling:\u003c/strong> added \u003ccode>vitest-axe\u003c/code> (\u003ccode>toHaveNoViolations\u003c/code>, wired in \u003ccode>test/setup.ts\u003c/code>) with a \u003ccode>test/unit/a11y.test.ts\u003c/code> axe suite over the key components; added \u003ccode>@storybook/addon-a11y\u003c/code>. Svelte compiler a11y warnings surface in the dev/Storybook build. CI a11y gate is \u003cstrong>soft\u003c/strong> (axe tests run but a dedicated blocking gate is deferred to Tier 3)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Target \u003cstrong>WCAG 2.2 AA\u003c/strong>; non-breaking; \u003ccode>pnpm test\u003c/code> green; \u003ccode>pnpm pack\u003c/code> clean; agile + board rebuilt\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Audit findings (current state): native \u003ccode>&lt;button&gt;\u003c/code> in Button/Toaster-dismiss, global\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>:focus-visible\u003c/code>, labelled Input, Toaster live region already exist — good baseline. Gaps are\u003c/p>\n\u003cp>  the Space key on div-buttons, no reduced-motion anywhere, the failing \u003ccode>--ss-fg-faint\u003c/code> contrast,\u003c/p>\n\u003cp>  and no automated a11y tests.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>vitest-axe\u003c/code> runs in jsdom and \u003cstrong>cannot check color contrast\u003c/strong> (no layout) — it catches\u003c/li>\n\u003c/ul>\n\u003cp>  structural/ARIA issues; \u003ccode>@storybook/addon-a11y\u003c/code> runs axe in a real browser for contrast/full rules.\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Deferred to Tier 3\u003c/strong> (not this story): converting \u003ccode>role=\"button\"\u003c/code> divs to native \u003ccode>&lt;button&gt;\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  a proper Topbar \u003ccode>tablist\u003c/code> keyboard pattern, and making a11y a blocking CI gate.\u003c/p>\n\u003cul>\n\u003cli>Darkening \u003ccode>--ss-fg-faint\u003c/code> is a small visual change — flag for design review.\u003c/li>\n\u003cli>Independent of the others, but best done after [[DS-0012-config-driven-size-system]] so the a11y\u003c/li>\n\u003c/ul>\n\u003cp>  pass covers the final component shapes; documented by [[DS-0010-custom-docs-site]].\u003c/p>\n\u003cul>\n\u003cli>Research: WCAG 2.2, WAI-ARIA APG keyboard/button, Sara Soueidan on ARIA live regions,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>prefers-reduced-motion\u003c/code> (MDN/web.dev), \u003ccode>vitest-axe\u003c/code>, \u003ccode>@storybook/addon-a11y\u003c/code>.\u003c/p>\n\u003ch4 class=\"md-h\">Follow-up — light-theme contrast (2026-06-07)\u003c/h4>\n\u003cp>The \u003cstrong>light\u003c/strong> theme previously only overrode surfaces + foreground, so the neon dark-mode brand /\u003c/p>\n\u003cp>status / code colours bled through onto a near-white page and failed contrast. Fixed in\u003c/p>\n\u003cp>\u003ccode>_tokens.scss\u003c/code>:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>--ss-bg\u003c/code> softened to \u003ccode>#f0f0f0\u003c/code> (was \u003ccode>#fefefe\u003c/code>); \u003ccode>--ss-line(-strong)\u003c/code> strengthened.\u003c/li>\n\u003cli>Foregrounds retuned for AA on \u003ccode>#f0f0f0\u003c/code> + \u003ccode>#ffffff\u003c/code> (\u003ccode>--ss-fg-muted\u003c/code>/\u003ccode>--ss-fg-faint\u003c/code>).\u003c/li>\n\u003cli>Light-mode overrides added for the \u003cstrong>brand\u003c/strong> (\u003ccode>--ss-primary\u003c/code> → deep green \u003ccode>#157f3b\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  white \u003ccode>--ss-fg-on-primary\u003c/code>), \u003cstrong>status\u003c/strong>, \u003cstrong>lime\u003c/strong>, and \u003cstrong>code\u003c/strong> (\u003ccode>--ss-code-*\u003c/code>) palettes.\u003c/p>\n\u003cul>\n\u003cli>New theme-aware \u003ccode>--ss-hover\u003c/code> + \u003ccode>--ss-primary-hover\u003c/code> tokens replace hardcoded \u003ccode>rgba(255,255,255,…)\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  / \u003ccode>#7df089\u003c/code> hovers (Button, Sidebar, Topbar, \u003ccode>_layout\u003c/code> table) that were invisible/over-bright on\u003c/p>\n\u003cp>  light surfaces.\u003c/p>","acTotal":9,"acDone":9},{"id":"DS-0014","type":"story","title":"Docs polish + remove PassocaMark; passoca-logo favicon","status":"done","priority":"low","tags":["docs","cleanup","breaking"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-08","updated":"2026-06-08","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>A small batch of documentation-site polish plus the removal of the \u003ccode>PassocaMark\u003c/code> brand-mark\u003c/p>\n\u003cp>component from the library. The docs site adopts the \u003cstrong>passoca logo\u003c/strong> (\u003ccode>static/passoca-logo.svg\u003c/code>) as\u003c/p>\n\u003cp>its favicon and brand glyph in place of \u003ccode>PassocaMark\u003c/code>. \u003cstrong>Breaking\u003c/strong> for the library: \u003ccode>PassocaMark\u003c/code> is\u003c/p>\n\u003cp>no longer exported.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Centered article\u003c/strong> — guide (\u003ccode>Prose\u003c/code>) and component (\u003ccode>ComponentPage\u003c/code>) articles get\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>margin-inline: auto\u003c/code> so the content column sits centered in the main area instead of hugging the\u003c/p>\n\u003cp>  sidebar edge.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Smooth axis flips (docs only)\u003c/strong> — \u003ccode>ThemeControls\u003c/code> arms a transient \u003ccode>html.axis-anim\u003c/code> class\u003c/li>\n\u003c/ul>\n\u003cp>  around each theme/size toggle (forcing a reflow so the change animates rather than snapping);\u003c/p>\n\u003cp>  \u003ccode>+layout.svelte\u003c/code> defines a one-window global transition\u003c/p>\n\u003cp>  (color/background/border/fill/padding/font-size/dimensions) eased over \u003ccode>--ss-dur\u003c/code>. The selector\u003c/p>\n\u003cp>  covers the \u003cstrong>root \u003ccode>html\u003c/code>\u003c/strong> (which carries the page \u003ccode>background\u003c/code>/\u003ccode>color\u003c/code> in \u003ccode>_base.scss\u003c/code>) \u003cstrong>and\u003c/strong> all\u003c/p>\n\u003cp>  descendants, so the dominant page background fades too. Uses the motion tokens, so it collapses to\u003c/p>\n\u003cp>  0ms under \u003ccode>prefers-reduced-motion\u003c/code> for free.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Remove \u003ccode>PassocaMark\u003c/code> entirely\u003c/strong> — deleted the component, its Storybook story, its \u003ccode>dssoca\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  export, its \u003ccode>COMPONENT_NAMES\u003c/code> entry, its docs \u003ccode>COMPONENTS\u003c/code> page entry, and its unit test. \u003ccode>Topbar\u003c/code>\u003c/p>\n\u003cp>  (which embedded it for the \u003ccode>hubssoca\u003c/code> brand) now inlines the mark SVG (\u003ccode>fill: var(--ss-primary)\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Passoca logo on favicon\u003c/strong> — \u003ccode>documentation/static/passoca-logo.svg\u003c/code> is the favicon\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>app.html\u003c/code>) and the docs brand mark (top bar + landing hero, via \u003ccode>&lt;img&gt;\u003c/code>); the old Svelte-logo\u003c/p>\n\u003cp>  \u003ccode>favicon.svg\u003c/code> was removed.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Syntax highlighting on guide code blocks was investigated — already working (Prism + \u003ccode>code.css\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  token theme, same path as component \u003ccode>CodeBlock\u003c/code>); no change needed.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green; \u003ccode>pnpm docs:test\u003c/code> green; \u003ccode>pnpm docs:build\u003c/code> clean; \u003ccode>pnpm pack\u003c/code> clean (publint);\u003c/li>\n\u003c/ul>\n\u003cp>  agile + board rebuilt.\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Breaking change:\u003c/strong> dropping the \u003ccode>PassocaMark\u003c/code> export is a public-API removal — bump accordingly at\u003c/li>\n\u003c/ul>\n\u003cp>  the next release. Historical references in past stories ([[DS-0002-reusable-component-set]],\u003c/p>\n\u003cp>  [[DS-0007-storybook-component-explorer]], [[DS-0009-scoped-component-styles]],\u003c/p>\n\u003cp>  [[DS-0012-config-driven-size-system]]) and the \u003ccode>DESIGN.md\u003c/code> 0.4.0 changelog note are left intact as\u003c/p>\n\u003cp>  records of what existed then.\u003c/p>\n\u003cul>\n\u003cli>The passoca logo is a fixed-green (\u003ccode>#66ef73\u003c/code>) SVG, so the docs brand stays brand-green across\u003c/li>\n\u003c/ul>\n\u003cp>  themes (favicons are theme-agnostic anyway); \u003ccode>Topbar\u003c/code>'s inlined mark still tracks \u003ccode>--ss-primary\u003c/code>.\u003c/p>\n\u003cul>\n\u003cli>Builds on [[DS-0010-custom-docs-site]].\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6}]}</script>
<script>
const RAW = JSON.parse(document.getElementById('agile-data').textContent);
const ITEMS = RAW.items, SCOPE = RAW.scope;
const STATUSES = ["backlog","todo","in-progress","blocked","done"];
const PRIORITIES = ["high","low"];
const GROUP_KEYS = ['project','status','type','priority'];
// Single-project boards default to grouping by status (one project group is redundant);
// the global hub board defaults to grouping by project.
const state = { view: 'grouped', groupBy: SCOPE === 'global' ? 'project' : 'status', status: '', sortKey: 'id', sortDir: 1 };

function uniq(arr){ return [...new Set(arr)].sort(); }
function opt(sel, vals, label){ const e=document.getElementById(sel); e.innerHTML='<option value="">'+label+'</option>'+vals.map(v=>'<option>'+v+'</option>').join(''); }
opt('f-type', uniq(ITEMS.map(i=>i.type)), 'type: all');
opt('f-status', STATUSES.filter(s=>ITEMS.some(i=>i.status===s)), 'status: all');
opt('f-priority', uniq(ITEMS.map(i=>i.priority)), 'priority: all');
opt('f-tag', uniq(ITEMS.flatMap(i=>i.tags)), 'tag: all');
if (SCOPE === 'global'){ const e=document.getElementById('f-project'); e.hidden=false; opt('f-project', uniq(ITEMS.map(i=>i.project)), 'project: all'); }
const gbSel=document.getElementById('f-groupby');
gbSel.innerHTML=GROUP_KEYS.map(v=>'<option value="'+v+'"'+(v===state.groupBy?' selected':'')+'>group: '+v+'</option>').join('');

function filtered(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  const fp = document.getElementById('f-project').value;
  const ft = document.getElementById('f-type').value;
  const fs = state.status || document.getElementById('f-status').value;
  const fpr = document.getElementById('f-priority').value;
  const ftag = document.getElementById('f-tag').value;
  return ITEMS.filter(i=>{
    if (fp && i.project!==fp) return false;
    if (ft && i.type!==ft) return false;
    if (fs && i.status!==fs) return false;
    if (fpr && i.priority!==fpr) return false;
    if (ftag && !i.tags.includes(ftag)) return false;
    if (q && !(i.id.toLowerCase().includes(q)||i.title.toLowerCase().includes(q)||i.tags.join(' ').toLowerCase().includes(q))) return false;
    return true;
  });
}
function badge(s){ return '<span class="badge '+s+'"><span class="dot"></span>'+s+'</span>'; }
function acStr(i){ return i.acTotal ? i.acDone+'/'+i.acTotal : ''; }
function detail(i){
  const deps = (i.depends_on&&i.depends_on.length)?'<b>depends on</b> '+i.depends_on.join(', '):'';
  const par = i.parent?'<b>parent</b> '+i.parent:'';
  const ep = i.epic?'<b>epic</b> '+i.epic:'';
  const tags = i.tags.length?'<b>tags</b> '+i.tags.join(', '):'';
  const kv = [par,ep,deps,tags,'<b>created</b> '+i.created,'<b>updated</b> '+i.updated].filter(Boolean).join('<span style="opacity:.4">·</span> ');
  return '<div class="detail">'+(i.bodyHtml||'<p style="color:var(--faint)">no description</p>')+'<div class="kv">'+kv+'</div></div>';
}
function renderMetrics(){
  const m = document.getElementById('metrics'); const all = ITEMS;
  const cards = STATUSES.map(s=>{ const n=all.filter(i=>i.status===s).length; return '<div class="metric'+(state.status===s?' on':'')+'" data-s="'+s+'" data-pick="'+s+'"><div class="v">'+n+'</div><div class="l">'+s+'</div></div>'; });
  cards.unshift('<div class="metric'+(state.status===''?' on':'')+'" data-pick=""><div class="v">'+all.length+'</div><div class="l">all</div></div>');
  m.innerHTML = cards.join('');
  m.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{ state.status = el.dataset.pick; document.getElementById('f-status').value=''; render(); });
}
function groupOrder(gb, keys){
  if(gb==='status') return keys.slice().sort((a,b)=>(STATUSES.indexOf(a)+1||99)-(STATUSES.indexOf(b)+1||99));
  if(gb==='priority') return keys.slice().sort((a,b)=>(PRIORITIES.indexOf(a)+1||99)-(PRIORITIES.indexOf(b)+1||99));
  return keys.slice().sort();
}
function renderGrouped(list){
  if(!list.length) return '<div class="empty">no items match</div>';
  const gb = state.groupBy;
  const groups = {};
  list.forEach(i=>{ const k=i[gb]||'—'; (groups[k]=groups[k]||[]).push(i); });
  return groupOrder(gb, Object.keys(groups)).map(p=>{
    const rows = groups[p].map(i=>(
      '<div class="row" data-id="'+i.id+'">'
      +'<span class="id">'+i.id+'</span>'
      +'<span class="ti"><span class="typ">'+i.type+'</span>'+i.title+'</span>'
      +'<span class="ac">'+acStr(i)+'</span>'
      +badge(i.status)
      +'<span class="pri '+i.priority+'">'+i.priority+'</span>'
      +'</div>'
    )).join('');
    return '<div class="group"><div class="gh"><span class="n">'+p+'</span><span class="c">'+groups[p].length+'</span></div>'+rows+'</div>';
  }).join('');
}
function renderTable(list){
  if(!list.length) return '<div class="empty">no items match</div>';
  const cols = [['id','id'],['title','title'],['project','project'],['type','type'],['status','status'],['priority','pri']];
  const sorted = [...list].sort((a,b)=>{ const k=state.sortKey; return String(a[k]).localeCompare(String(b[k]))*state.sortDir || a.id.localeCompare(b.id); });
  const head = '<tr>'+cols.map(c=>'<th data-sort="'+c[0]+'">'+c[0]+(state.sortKey===c[0]?(state.sortDir>0?' ▲':' ▼'):'')+'</th>').join('')+'</tr>';
  const body = sorted.map(i=>(
    '<tr data-id="'+i.id+'"><td class="id">'+i.id+'</td><td>'+i.title+'</td><td>'+i.project+'</td><td>'+i.type+'</td><td>'+badge(i.status)+'</td><td><span class="pri '+i.priority+'">'+i.priority+'</span></td></tr>'
  )).join('');
  return '<table class="tableview"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
}
let openId = null;
const drawer = document.getElementById('drawer');
const backdrop = document.getElementById('drawer-backdrop');
function markSel(){
  document.querySelectorAll('.row.sel,.tableview tbody tr.sel').forEach(el=>el.classList.remove('sel'));
  if(openId){ const el=document.querySelector('[data-id="'+openId+'"]'); if(el) el.classList.add('sel'); }
}
function closeDrawer(){ openId=null; drawer.classList.remove('open'); backdrop.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); markSel(); }
function openItem(id){
  if(id===openId){ closeDrawer(); return; }
  const i=ITEMS.find(x=>x.id===id); if(!i) return;
  openId=id;
  document.getElementById('d-id').textContent=i.id;
  document.getElementById('d-badge').innerHTML=badge(i.status);
  document.getElementById('d-pri').innerHTML='<span class="pri '+i.priority+'">'+i.priority+'</span>';
  document.getElementById('d-title').innerHTML='<span class="typ">'+i.type+'</span>'+i.title;
  document.getElementById('drawer-body').innerHTML=detail(i);
  drawer.classList.add('open'); backdrop.classList.add('open'); drawer.setAttribute('aria-hidden','false');
  markSel();
}
document.getElementById('drawer-close').onclick=closeDrawer;
backdrop.onclick=closeDrawer;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });
function render(){
  renderMetrics();
  gbSel.style.display = state.view==='grouped' ? '' : 'none';
  const list = filtered();
  document.getElementById('count').textContent = list.length+' / '+ITEMS.length+' items';
  const board = document.getElementById('board');
  board.innerHTML = state.view==='grouped' ? renderGrouped(list) : renderTable(list);
  board.querySelectorAll('[data-id]').forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest('[data-sort]')) return; openItem(el.dataset.id); };
  });
  if(state.view==='table'){
    board.querySelectorAll('[data-sort]').forEach(th=>th.onclick=()=>{ const k=th.dataset.sort; if(state.sortKey===k)state.sortDir*=-1; else {state.sortKey=k;state.sortDir=1;} render(); });
  }
  markSel();
}
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.toggle button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state.view=b.dataset.view; render(); });
['q','f-project','f-type','f-status','f-priority','f-tag'].forEach(id=>{ const el=document.getElementById(id); el.addEventListener('input',()=>{ if(id==='f-status')state.status=''; render(); }); });
gbSel.addEventListener('change',()=>{ state.groupBy=gbSel.value; render(); });
render();
</script>
</body>
</html>
