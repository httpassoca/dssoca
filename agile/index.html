span>Docs: \u003ccode>BottomNav\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0048-bottom-nav-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/MobileBottomNav.svelte\u003c/code>.\u003c/li>\n\u003cli>Complements existing shell components \u003ccode>Topbar\u003c/code>/\u003ccode>Sidebar\u003c/code>; reuse \u003ccode>Icon.svelte\u003c/code> and any shared shell tokens (\u003ccode>--ss-shell-*\u003c/code>).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":0},{"id":"DS-0055","type":"task","title":"Image implementation","status":"done","priority":"low","tags":["ui","a11y","media"],"depends_on":[],"parent":"DS-0049","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Image\u003c/code> component at \u003ccode>src/lib/components/Image.svelte\u003c/code>, based on the website's \u003ccode>AppImage.svelte\u003c/code>\u003c/p>\n\u003cp>but decoupled from its bespoke image API. Keep it token-driven (zero radius, \u003ccode>--ss-*\u003c/code> tokens, scoped SCSS,\u003c/p>\n\u003cp>Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Responsive sources\u003c/strong> — accepts \u003ccode>src\u003c/code> + optional \u003ccode>srcset\u003c/code>/\u003ccode>sizes\u003c/code> (or a \u003ccode>sources[]\u003c/code> for \u003ccode>&lt;picture&gt;\u003c/code>); renders semantic markup with required \u003ccode>alt\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>No layout shift\u003c/strong> — aspect-ratio box from \u003ccode>width\u003c/code>/\u003ccode>height\u003c/code> or an explicit \u003ccode>ratio\u003c/code> prop reserves space before load\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Lazy + decode\u003c/strong> — \u003ccode>loading=\"lazy\"\u003c/code> + \u003ccode>decoding=\"async\"\u003c/code> by default (overridable via \u003ccode>eager\u003c/code> for above-the-fold)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Loading skeleton\u003c/strong> — token-driven placeholder shown until load/error; respects \u003ccode>prefers-reduced-motion\u003c/code>; error fallback state\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Lightbox (optional)\u003c/strong> — \u003ccode>lightbox?: boolean\u003c/code>; \u003cstrong>dependency decision documented\u003c/strong>: shipped a lightweight \u003cstrong>built-in\u003c/strong> dialog overlay (no PhotoSwipe dep → zero-runtime-dep). Lightbox uses \u003ccode>role=\"dialog\"\u003c/code> + \u003ccode>aria-modal\u003c/code>, focus trap, \u003ccode>Esc\u003c/code>/backdrop close, restores focus to the trigger\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('Image', size)\u003c/code> where size affects skeleton/chrome (not intrinsic image dims)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code> (was already wired in the scaffold)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests added in \u003ccode>test/unit/Image.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Docs: \u003ccode>Image\u003c/code> page fleshed out in \u003ccode>documentation/src/lib/component-docs/image.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0049-image-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppImage.svelte\u003c/code> (fetches variants from an API + PhotoSwipe — stripped the API coupling; kept the responsive/lightbox UX).\u003c/li>\n\u003cli>Heaviest of the six; the lightbox dependency decision should be resolved before starting (keep dssoca's zero-runtime-dep posture in mind).\u003c/li>\n\u003cli>\u003cstrong>Decision (PhotoSwipe vs built-in):\u003c/strong> chose a \u003cstrong>built-in\u003c/strong> dialog overlay. PhotoSwipe would add a\u003c/li>\n\u003c/ul>\n\u003cp>  runtime dependency + its own CSS, conflicting with dssoca's zero-runtime-dep, token-driven posture.\u003c/p>\n\u003cp>  The built-in overlay is ~40 lines, reads \u003ccode>--ss-*\u003c/code> tokens, and meets the WCAG dialog requirements.\u003c/p>\n\u003cul>\n\u003cli>**New \u003ccode>--ss-*\u003c/code> tokens** (in \u003ccode>src/styles/components/_image.scss\u003c/code>): \u003ccode>--ss-image-frame-bg\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>--ss-image-shimmer\u003c/code>, \u003ccode>--ss-image-shimmer-dur\u003c/code>, \u003ccode>--ss-image-focus-w\u003c/code>, \u003ccode>--ss-image-caption-gap\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>--ss-image-backdrop\u003c/code>, \u003ccode>--ss-image-lightbox-z\u003c/code>, \u003ccode>--ss-image-lightbox-pad\u003c/code>, and the size-axis\u003c/p>\n\u003cp>  chrome metrics \u003ccode>--ss-image-glyph\u003c/code> / \u003ccode>--ss-image-fallback-min\u003c/code> / \u003ccode>--ss-image-close\u003c/code>.\u003c/p>","acTotal":9,"acDone":9},{"id":"DS-0056","type":"story","title":"Storybook deployment on Vercel","status":"done","priority":"low","tags":["storybook","infra","deploy"],"depends_on":["DS-0015"],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Deploy the dssoca \u003cstrong>Storybook\u003c/strong> to Vercel as its own static project, alongside the\u003c/p>\n\u003cp>already-deployed docs site (\u003ccode>DS-0015\u003c/code>). This unblocks the docs' live per-component\u003c/p>\n\u003cp>embeds on the deployed site (they iframe Storybook stories via \u003ccode>VITE_STORYBOOK_URL\u003c/code>,\u003c/p>\n\u003cp>which \u003ccode>DS-0015\u003c/code> left out of scope).\u003c/p>\n\u003cp>The constraint that drives the design: Vercel reads a **single repo-root\u003c/p>\n\u003cp>\u003ccode>vercel.json\u003c/code>** per repo (a \u003ccode>documentation/vercel.json\u003c/code> is ignored — confirmed in\u003c/p>\n\u003cp>\u003ccode>DS-0015\u003c/code>). So two projects from one repo can't each own a config file. Instead the\u003c/p>\n\u003cp>one root \u003ccode>vercel.json\u003c/code> **branches its \u003ccode>buildCommand\u003c/code> on a \u003ccode>VERCEL_DEPLOY_TARGET\u003c/code> env\u003c/p>\n\u003cp>var**, leaving the docs build path untouched.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Root \u003ccode>vercel.json\u003c/code> \u003ccode>buildCommand\u003c/code> branches on \u003ccode>$VERCEL_DEPLOY_TARGET\u003c/code>:\u003c/li>\n\u003c/ul>\n\u003cp>  - \u003ccode>storybook\u003c/code> → \u003ccode>pnpm -w run prepare &amp;&amp; pnpm exec storybook build --output-dir build\u003c/code>\u003c/p>\n\u003cp>  - else (docs) → \u003ccode>pnpm -w run prepare &amp;&amp; pnpm build\u003c/code> (\u003cstrong>byte-identical to before\u003c/strong>;\u003c/p>\n\u003cp>    docs deploy unchanged).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm exec storybook build --output-dir build\u003c/code> chosen over\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pnpm build-storybook -- …\u003c/code> because pnpm forwards the literal \u003ccode>--\u003c/code> into Storybook's\u003c/p>\n\u003cp>  \u003ccode>build\u003c/code> subcommand (\u003ccode>too many arguments\u003c/code>); \u003ccode>pnpm exec\u003c/code> invokes the binary directly.\u003c/p>\n\u003cp>  Validated locally: emits \u003ccode>index.html\u003c/code> + \u003ccode>iframe.html\u003c/code> + \u003ccode>index.json\u003c/code> (story ids like\u003c/p>\n\u003cp>  \u003ccode>components-button--primary\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>outputDirectory: build\u003c/code> is shared and correct for both — it resolves relative to\u003c/li>\n\u003c/ul>\n\u003cp>  \u003cstrong>each project's\u003c/strong> Root Directory (docs = \u003ccode>documentation/build\u003c/code>, storybook = repo-root\u003c/p>\n\u003cp>  \u003ccode>build\u003c/code>). \u003ccode>framework: null\u003c/code> and \u003ccode>trailingSlash: true\u003c/code> unchanged.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Docs updated: \u003ccode>documentation/CLAUDE.md\u003c/code> (new *Storybook deployment* subsection +\u003c/li>\n\u003c/ul>\n\u003cp>  the dashboard setup + the \u003ccode>VITE_STORYBOOK_URL\u003c/code> wiring) and repo-root \u003ccode>CLAUDE.md\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>No change to the local workflow: \u003ccode>pnpm storybook\u003c/code> / \u003ccode>pnpm build-storybook\u003c/code> /\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pnpm docs:*\u003c/code> are untouched (the output-dir override lives only in the Vercel command).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm docs:test\u003c/code> green; \u003ccode>pnpm pack\u003c/code> clean (vercel.json + *.md aren't\u003c/li>\n\u003c/ul>\n\u003cp>  published).\u003c/p>\n\u003ch4 class=\"md-h\">One-time Vercel dashboard setup (outside the repo — flagged for the user)\u003c/h4>\n\u003cul>\n\u003cli>New Project → import this repo → Root Directory = repo root (default), Framework = \"Other\".\u003c/li>\n\u003cli>Env var \u003cstrong>\u003ccode>VERCEL_DEPLOY_TARGET=storybook\u003c/code>\u003c/strong> (Production + Preview) on that project.\u003c/li>\n\u003cli>On the \u003cstrong>docs\u003c/strong> project, set \u003cstrong>\u003ccode>VITE_STORYBOOK_URL\u003c/code>\u003c/strong> = the Storybook deploy URL, then\u003c/li>\n\u003c/ul>\n\u003cp>  redeploy the docs so the per-component embeds resolve.\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>trailingSlash: true\u003c/code> is shared. Storybook serves \u003ccode>iframe.html\u003c/code> (file with extension,\u003c/li>\n\u003c/ul>\n\u003cp>  unaffected) and routes by query/hash, so trailing-slash redirects don't bite — verify\u003c/p>\n\u003cp>  the first deploy's embeds load and revisit if needed.\u003c/p>\n\u003cul>\n\u003cli>Builds on [[DS-0015-vercel-docs-deployment]].\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0057","type":"story","title":"Remove the personal name 'Passoca' from product-facing surfaces","status":"done","priority":"high","tags":["branding","cleanup","docs"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The design system is self-branded (\u003cstrong>dssoca\u003c/strong>) and should not carry the author's\u003c/p>\n\u003cp>personal name. Per \"keep my things, but not my name\", scrub the personal name\u003c/p>\n\u003cp>\u003cstrong>Passoca\u003c/strong> from every product-facing / branding / live-source surface, while\u003c/p>\n\u003cp>preserving infrastructure and legal ownership.\u003c/p>\n\u003ch4 class=\"md-h\">Scrubbed (this PR)\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Brand logo renamed\u003c/strong> \u003ccode>documentation/static/passoca-logo.svg\u003c/code> →\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>dssoca-logo.svg\u003c/code> (artwork kept — it's the dssoca mark now); refs updated in\u003c/p>\n\u003cp>  \u003ccode>app.html\u003c/code> (favicon), \u003ccode>+layout.svelte\u003c/code> (top bar), \u003ccode>+page.svelte\u003c/code> (hero).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Live source/doc prose\u003c/strong> that named the author's personal site reworded to\u003c/li>\n\u003c/ul>\n\u003cp>  neutral wording (\"the source website\", a generic pattern): \u003ccode>src/styles/theme.scss\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>src/styles/components/_index.scss\u003c/code>, \u003ccode>src/lib/index.ts\u003c/code>, \u003ccode>docs/tokens.md\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>documentation/CLAUDE.md\u003c/code>, \u003ccode>documentation/src/lib/component-docs/index.ts\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>documentation/src/lib/component-docs/bottom-nav.ts\u003c/code> (user-facing description),\u003c/p>\n\u003cp>  \u003ccode>DESIGN.md\u003c/code> (intro line + the 0.4.0 changelog line that named the removed\u003c/p>\n\u003cp>  \u003ccode>PassocaMark\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>First name too\u003c/strong> (\"not my name\"): the author's first name \u003ccode>rafael\u003c/code> shipped\u003c/li>\n\u003c/ul>\n\u003cp>  as sample/default data — scrubbed to a neutral \u003ccode>admin\u003c/code>: the published \u003ccode>Topbar\u003c/code>\u003c/p>\n\u003cp>  \u003ccode>user\u003c/code> default (\u003ccode>admin@hub.home\u003c/code>), the \u003ccode>LogStream\u003c/code> demo line (\u003ccode>user=admin\u003c/code>), the\u003c/p>\n\u003cp>  Storybook stories (Topbar/Input/LogStream), the \u003ccode>Input\u003c/code> docs placeholder, and the\u003c/p>\n\u003cp>  two unit tests that assert those literals. The homelab flavour (\u003ccode>hub.home\u003c/code>,\u003c/p>\n\u003cp>  service names) is impersonal and kept.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Regression guard: \u003ccode>documentation/test/branding.test.ts\u003c/code> (chrome never\u003c/li>\n\u003c/ul>\n\u003cp>  references \u003ccode>passoca-logo\u003c/code>; the \u003ccode>dssoca-logo.svg\u003c/code> asset exists).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> (496) + \u003ccode>pnpm docs:test\u003c/code> green; \u003ccode>pnpm docs:build\u003c/code> clean (logo resolves).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Intentionally KEPT (with reasons — see follow-up for the decision)\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>GitHub URLs\u003c/strong> containing \u003ccode>httpassoca\u003c/code> (repo / homepage / bugs / repository) —\u003c/li>\n\u003c/ul>\n\u003cp>  real infrastructure; renaming them 404s every link. = \"my things\".\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Legal / ownership attribution\u003c/strong> — \u003ccode>LICENSE\u003c/code> copyright holder, \u003ccode>package.json\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>author\u003c/code>, the \u003ccode>README\u003c/code> license footer all still read \u003cstrong>\"Rafael Passoca\"\u003c/strong>.\u003c/p>\n\u003cp>  Changing a copyright holder is a deliberate legal act and *preserving* it is the\u003c/p>\n\u003cp>  literal embodiment of \"keep my things\". Left unchanged and flagged for the user\u003c/p>\n\u003cp>  (pre-written diffs in the follow-up task) — a 3-line change if full removal is\u003c/p>\n\u003cp>  wanted.\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Historical agile records\u003c/strong> (19 \u003ccode>agile/*.md\u003c/code> story/epic/task files) — an audit\u003c/li>\n\u003c/ul>\n\u003cp>  trail of what was done (the \u003ccode>DS-0043\u003c/code> epic, \u003ccode>PassocaMark\u003c/code> removal in \u003ccode>DS-0014\u003c/code>,\u003c/p>\n\u003cp>  etc.), like git history. \u003ccode>DS-0014\u003c/code> set the precedent to leave historical records\u003c/p>\n\u003cp>  intact. Not rewritten; flagged so the user can request a deeper scrub.\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>The \u003ccode>dssoca\u003c/code> package name and the \u003ccode>ss-\u003c/code>/\u003ccode>--ss-*\u003c/code> prefixes are the system's own\u003c/li>\n\u003c/ul>\n\u003cp>  identity (not the personal name) — untouched.\u003c/p>","acTotal":5,"acDone":5},{"id":"DS-0058","type":"story","title":"Sidebar fills its container height","status":"done","priority":"low","tags":["ui","sidebar","layout"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The \u003ccode>Sidebar\u003c/code> rail only grew as tall as its items, so its right border and\u003c/p>\n\u003cp>background stopped partway down the screen, leaving a bare gap below the last\u003c/p>\n\u003cp>item. It should fill the full height of its host container (screen / column).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>.ss-side\u003c/code> gets \u003ccode>min-height: 100%\u003c/code> so the rail stretches to the host's\u003c/li>\n\u003c/ul>\n\u003cp>  height — the border-right and background span the full column. \u003ccode>min-height\u003c/code>\u003c/p>\n\u003cp>  (not \u003ccode>height\u003c/code>) keeps it growing past the viewport when the nav is long (the\u003c/p>\n\u003cp>  host scrolls), and it resolves to \u003ccode>auto\u003c/code> when the parent has no definite\u003c/p>\n\u003cp>  height, so a bare/standalone Sidebar is unaffected.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Relies on the global \u003ccode>box-sizing: border-box\u003c/code> base reset (already in\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>_base.scss\u003c/code>), so padding + border stay inside the 100%.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Sidebar.svelte.test.ts\u003c/code> extended with a source style-contract assertion\u003c/li>\n\u003c/ul>\n\u003cp>  (jsdom can't measure layout height).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Sidebar docs note updated (\u003ccode>component-docs/sidebar.ts\u003c/code>).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green; \u003ccode>pnpm docs:test\u003c/code> green; \u003ccode>pnpm pack\u003c/code> clean.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Library change (affects every consumer): the published \u003ccode>Sidebar\u003c/code> now fills its\u003c/li>\n\u003c/ul>\n\u003cp>  container by default. In the docs shell its host (\u003ccode>.nav\u003c/code>) already carries a\u003c/p>\n\u003cp>  viewport-minus-topbar height, so the rail now spans the full viewport.\u003c/p>","acTotal":5,"acDone":5},{"id":"DS-0059","type":"story","title":"Disabled button — no hover glow / brighten","status":"done","priority":"low","tags":["ui","button","polish"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>A disabled \u003ccode>Button\u003c/code> should read as inert. Previously every variant's hover\u003c/p>\n\u003cp>affordance (\u003ccode>&amp;:hover\u003c/code>) fired even when the control was disabled — browsers still\u003c/p>\n\u003cp>match \u003ccode>:hover\u003c/code> on a disabled \u003ccode>&lt;button&gt;\u003c/code> — so a disabled \u003cstrong>primary\u003c/strong> button lit up\u003c/p>\n\u003cp>with \u003ccode>--ss-shadow-glow\u003c/code> and brightened under the pointer. This story gates the\u003c/p>\n\u003cp>hover styles so disabled buttons stay dim and flat.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Every hover affordance in \u003ccode>Button.svelte\u003c/code> is gated on \u003ccode>:not(:disabled)\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>&amp;:not(:disabled):hover\u003c/code>), so the base brighten, the primary glow/fill, the\u003c/p>\n\u003cp>  danger fill, and the ghost fill no longer apply while disabled.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>&amp;:disabled\u003c/code> explicitly resets \u003ccode>box-shadow: none\u003c/code> as a belt-and-suspenders\u003c/li>\n\u003c/ul>\n\u003cp>  guard against any future glow rule.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>No token or public-API change — purely the disabled visual contract.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Button.svelte.test.ts\u003c/code> extended with a style-contract block (jsdom can't\u003c/li>\n\u003c/ul>\n\u003cp>  apply scoped CSS / simulate \u003ccode>:hover\u003c/code>, so the guard is asserted at the source:\u003c/p>\n\u003cp>  no bare \u003ccode>&amp;:hover\u003c/code>, glow gated behind \u003ccode>:not(:disabled):hover\u003c/code>, \u003ccode>:disabled\u003c/code> resets\u003c/p>\n\u003cp>  \u003ccode>box-shadow\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green; \u003ccode>pnpm pack\u003c/code> clean.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Loading buttons keep their existing treatment (soft-disable: focusable, dimmed\u003c/li>\n\u003c/ul>\n\u003cp>  to \u003ccode>opacity: 0.8\u003c/code>, \u003ccode>cursor: progress\u003c/code>); this story scopes only the native\u003c/p>\n\u003cp>  \u003ccode>:disabled\u003c/code> state the user flagged.\u003c/p>","acTotal":5,"acDone":5},{"id":"DS-0060","type":"story","title":"Docs homepage redesign — centred hero over a live component hub","status":"done","priority":"high","tags":["docs","landing","motion"],"depends_on":["DS-0062"],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Replace the docs landing with a centred brand hero — **logo + DSSOCA + description\u003c/p>\n\u003cp>+ both CTAs\u003cstrong> — sitting over a full-viewport \u003c/strong>\"workstation\"**: a tiled field of\u003c/p>\n\u003cp>every component, dimmed, where each card lifts to full opacity on hover (its own\u003c/p>\n\u003cp>card only) and continuously mutates its own props.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Hero\u003c/strong>: inline brand mark (SVG, \u003ccode>fill: var(--ss-primary)\u003c/code> + glow), the\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>DSSOCA\u003c/code> wordmark, the description, and the two buttons (\u003cstrong>Get started\u003c/strong> →\u003c/p>\n\u003cp>  \u003ccode>/introduction\u003c/code>, \u003cstrong>Browse components\u003c/strong> → \u003ccode>/components\u003c/code>), centred, dark-first.\u003c/p>\n\u003cp>  The mark is inlined (no logo file ref) so the hero is independent of the\u003c/p>\n\u003cp>  logo-rename work and never names the author.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Hub field\u003c/strong> (\u003ccode>Hub.svelte\u003c/code>): a grid of fixed-size, overflow-clipped tiles,\u003c/li>\n\u003c/ul>\n\u003cp>  each a live component at \u003ccode>opacity: .26\u003c/code>, lifting to \u003ccode>1\u003c/code> on hover with a smooth\u003c/p>\n\u003cp>  transition — \u003cstrong>per card only\u003c/strong>. A \u003ccode>transform\u003c/code> on each tile contains any\u003c/p>\n\u003cp>  \u003ccode>position:fixed\u003c/code>/popover child (BottomNav, Menu) so it can't escape its cell.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Constant change without layout shift\u003c/strong>: each tile cycles its props on an\u003c/li>\n\u003c/ul>\n\u003cp>  \u003cstrong>independent random 1–4s timer\u003c/strong> (\u003ccode>setTimeout\u003c/code> reschedule). Pools change\u003c/p>\n\u003cp>  content/colour/variant only and keep lengths similar; the tile box is fixed, so\u003c/p>\n\u003cp>  the field never reflows. \u003ccode>LogStream\u003c/code> self-animates via \u003ccode>demo\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Reduced motion\u003c/strong>: the cycler \u003ccode>$effect\u003c/code> early-returns under\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>prefersReducedMotion\u003c/code>, so the field renders a static first frame (no timers).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>SSR-safe\u003c/strong>: the hub renders client-only (\u003ccode>{#if browser}\u003c/code>); the hero is the\u003c/li>\n\u003c/ul>\n\u003cp>  prerendered content. Tile data lives in \u003ccode>$lib/hub-data.ts\u003c/code> and is unit-tested\u003c/p>\n\u003cp>  (\u003ccode>hub-data.test.ts\u003c/code>: every tile is a real component slug; every component shown).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm docs:test\u003c/code> green; \u003ccode>pnpm docs:build\u003c/code> clean.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>The old axes/component-grid sections are dropped — the new \u003ccode>/components\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  overview ([[DS-0062-docs-components-overview]]) is the catalog the **Browse\u003c/p>\n\u003cp>  components\u003cstrong> button points to. This story therefore \u003c/strong>depends on DS-0062** (the\u003c/p>\n\u003cp>  \u003ccode>/components\u003c/code> route must exist for prerender), and was stacked on it.\u003c/p>\n\u003cul>\n\u003cli>Theme-responsive (dark by default); not hard-locked to dark, so the topbar\u003c/li>\n\u003c/ul>\n\u003cp>  theme toggle still works on the landing.\u003c/p>","acTotal":6,"acDone":6},{"id":"DS-0061","type":"story","title":"Docs sidebar — components listed alphabetically","status":"done","priority":"low","tags":["docs","nav"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The docs left-nav listed components in \u003ccode>COMPONENTS\u003c/code> source/insertion order (Icon,\u003c/p>\n\u003cp>Badge, Button, …, then the DS-0043 batch). That's not scannable. Sort the\u003c/p>\n\u003cp>\u003cstrong>components\u003c/strong> nav section alphabetically by name.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>The \u003ccode>components\u003c/code> group in \u003ccode>NAV\u003c/code> (\u003ccode>docs.config.ts\u003c/code>) sorts a copy of\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>COMPONENTS\u003c/code> by \u003ccode>name.localeCompare\u003c/code> before mapping to links. \u003ccode>COMPONENTS\u003c/code>\u003c/p>\n\u003cp>  itself keeps source order (drives the per-component \u003ccode>entries()\u003c/code> prerender +\u003c/p>\n\u003cp>  homepage grid, unchanged).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Result: Accordion, Badge, BottomNav, Button, Card, EmptyState, Icon, Image,\u003c/li>\n\u003c/ul>\n\u003cp>  Input, Link, LogStream, Menu, MetricTile, SegmentedControl, ServiceCard,\u003c/p>\n\u003cp>  Sidebar, Sparkline, Toaster, Topbar.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>docs.config.test.ts\u003c/code> extended: the components nav equals its sorted copy\u003c/li>\n\u003c/ul>\n\u003cp>  and starts with \u003ccode>Accordion\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm docs:test\u003c/code> green.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Only the sidebar order changes; slugs/hrefs and the per-component pages are\u003c/li>\n\u003c/ul>\n\u003cp>  untouched. Isolated to the \u003ccode>components\u003c/code> nav group, so it composes cleanly with\u003c/p>\n\u003cp>  the components-overview page nav entry ([[DS-0062-docs-components-overview]]).\u003c/p>","acTotal":4,"acDone":4},{"id":"DS-0062","type":"story","title":"Docs components overview page (/components)","status":"done","priority":"high","tags":["docs","components","nav"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>A single catalog page at \u003cstrong>\u003ccode>/components\u003c/code>\u003c/strong> showing every component with a live\u003c/p>\n\u003cp>preview, in a \u003cstrong>3-per-line grid grouped by category\u003c/strong>. The homepage's \"Browse\u003c/p>\n\u003cp>components\" button points here.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>New route \u003ccode>documentation/src/routes/components/+page.svelte\u003c/code> → \u003ccode>/components\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  (static route, auto-prerendered; coexists with \u003ccode>components/[slug]\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Categories\u003c/strong> are a single source of truth: \u003ccode>documentation/src/lib/categories.ts\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  (Forms &amp; controls · Navigation · Layout · Data display · Feedback · Media). A\u003c/p>\n\u003cp>  \u003ccode>categories.test.ts\u003c/code> invariant proves every component is covered exactly once.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Grid is \u003cstrong>3 per line\u003c/strong> (→ 2 / 1 on narrower viewports), each cell a card\u003c/li>\n\u003c/ul>\n\u003cp>  that links to the component's full page; category section headers between groups.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Live previews\u003c/strong>, rendered with representative props from each component's\u003c/li>\n\u003c/ul>\n\u003cp>  canonical usage. Rendered \u003cstrong>client-only\u003c/strong> (\u003ccode>{#if browser}\u003c/code>) so 19 components never\u003c/p>\n\u003cp>  run through SSR/prerender (the static build can't break on a DOM-touching render);\u003c/p>\n\u003cp>  the SSR shell still ships the categories, names, taglines, and links.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Previews are \u003cstrong>non-interactive\u003c/strong>: the whole card is the link, stages are\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>pointer-events:none\u003c/code>, and a \u003ccode>transform\u003c/code> makes each stage the containing block so\u003c/p>\n\u003cp>  \u003ccode>position:fixed\u003c/code>/popover components (BottomNav, Menu) can't escape their card.\u003c/p>\n\u003cp>  Toaster (global store + fixed host) uses a faithful static stand-in.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Nav entry \"All components\" added to the guide group; the homepage **Browse\u003c/li>\n\u003c/ul>\n\u003cp>  components** button now targets \u003ccode>/components\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm docs:test\u003c/code> green (categories invariants); \u003ccode>pnpm docs:build\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>/components/index.html\u003c/code> prerendered, all \u003ccode>[slug]\u003c/code> pages intact).\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Self-contained: no Storybook dependency (unlike the per-component pages' live\u003c/li>\n\u003c/ul>\n\u003cp>  embeds), so the catalog renders immediately.\u003c/p>\n\u003cul>\n\u003cli>The homepage redesign ([[DS-0060-docs-home-redesign]]) rewrites \u003ccode>+page.svelte\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  and keeps the same Browse → \u003ccode>/components\u003c/code> target.\u003c/p>","acTotal":7,"acDone":7},{"id":"DS-0063","type":"story","title":"Landing polish — full-screen, screen-filling field, adapted chrome","status":"done","priority":"low","tags":["docs","landing","motion"],"depends_on":["DS-0060"],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Follow-up adjustments to the landing ([[DS-0060-docs-home-redesign]]).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Full screen\u003c/strong> — the \u003ccode>/\u003c/code> route renders \u003cstrong>without the docs shell\u003c/strong> (no top bar\u003c/li>\n\u003c/ul>\n\u003cp>  / sidebar): \u003ccode>+layout.svelte\u003c/code> branches on \u003ccode>isLanding\u003c/code> and renders the page bare;\u003c/p>\n\u003cp>  \u003ccode>.landing\u003c/code> is \u003ccode>position: fixed; inset: 0\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>~5 tiles per row at 1920px\u003c/strong> — grid \u003ccode>minmax(360px, 1fr)\u003c/code>.\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Field fills the screen, randomly, with repeats\u003c/strong> — \u003ccode>buildTilePool(n)\u003c/code> builds a\u003c/li>\n\u003c/ul>\n\u003cp>  shuffled pool (every component at least once, then random repeats); the Hub measures\u003c/p>\n\u003cp>  the viewport and renders just enough tiles (\u003ccode>cols × rows\u003c/code>, capped at 64) to fill it.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Adapted chrome\u003c/strong> — sidebar fills its cell as a full nav panel (width+height\u003c/li>\n\u003c/ul>\n\u003cp>  override), topbar pins to the top edge full-width, log-stream fills, bottom-nav sits\u003c/p>\n\u003cp>  at the bottom (\u003ccode>data-slug\u003c/code> selectors; the component may shrink to fit).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Hero\u003c/strong> — logo + \u003ccode>DSSOCA\u003c/code> \u003cstrong>side by side\u003c/strong> (\u003ccode>.brand\u003c/code> row); clear spacing\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>--ss-s-8\u003c/code>) between the description and the buttons; a \u003ccode>text-shadow\u003c/code> halo on the\u003c/p>\n\u003cp>  description so it stays legible over a bright hovered tile.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Background\u003c/strong> — \u003ccode>radial-gradient(circle, rgba(0,0,0,.83) 0%, rgba(0,0,0,.4) 100%)\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  behind the dimmed tiles, so a hovered tile becomes opaque and \u003cstrong>pops to full\u003c/strong> (no\u003c/p>\n\u003cp>  scrim over it). \u003ccode>data-theme\u003c/code> pinned dark on the landing.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Cadence\u003c/strong> — prop cycling is now \u003cstrong>0.5–2s\u003c/strong> (\u003ccode>CYCLE_MIN\u003c/code>/\u003ccode>CYCLE_MAX\u003c/code>).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Mobile\u003c/strong> — the component field is hidden below 640px (hero only).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm docs:test\u003c/code> green; \u003ccode>pnpm docs:build\u003c/code> clean.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>The field stays client-only + \u003ccode>inert\u003c/code> + reduced-motion-frozen (carried from DS-0060).\u003c/li>\n\u003c/ul>","acTotal":9,"acDone":9},{"id":"DS-0064","type":"story","title":"Landing field fixes — independent cycling, crossfade, photos, gradient","status":"done","priority":"high","tags":["docs","landing","motion","bugfix"],"depends_on":["DS-0063"],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Fixes for the landing field reported after [[DS-0063-landing-polish]].\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Values cycle again, independently\u003c/strong> — the cycler is refactored from one\u003c/li>\n\u003c/ul>\n\u003cp>  shared \u003ccode>$effect\u003c/code> (which read the resize-measured \u003ccode>count\u003c/code>, so it tore itself down\u003c/p>\n\u003cp>  and re-armed every measure/resize) into a per-tile component \u003cstrong>\u003ccode>HubTile\u003c/code>\u003c/strong>, each\u003c/p>\n\u003cp>  owning a local \u003ccode>vi = $state(0)\u003c/code> + its own random 0.5–2s timeout. Each tile now\u003c/p>\n\u003cp>  changes \u003cstrong>independently\u003c/strong> — no two show the same value — and is immune to the\u003c/p>\n\u003cp>  parent's layout/resize churn.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Smooth value transitions\u003c/strong> — every (non-chrome) value change \u003cstrong>crossfades\u003c/strong>\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>{#key vi}\u003c/code> + \u003ccode>in/out:fade\u003c/code>), so the field \"breathes\"; chrome tiles update in\u003c/p>\n\u003cp>  place via their own transitions.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Smooth hover\u003c/strong> — tile dim→full is a clean opacity-only transition (no\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>filter\u003c/code> transition); no longer disabled under reduced motion.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Darker centre\u003c/strong> — the page radial gradient centre is now \u003ccode>rgba(0,0,0,.95)\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  (was \u003ccode>.83\u003c/code>), edges unchanged at \u003ccode>.4\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Real photos\u003c/strong> — Image tiles use \u003cstrong>random internet images\u003c/strong> (Lorem Picsum,\u003c/li>\n\u003c/ul>\n\u003cp>  seeded for caching) at \u003cstrong>lower opacity\u003c/strong> (\u003ccode>.6\u003c/code>), filling their cell.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Reduced motion still freezes the field (cycler + crossfade), and tiles stay\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>inert\u003c/code> + \u003ccode>aria-hidden\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm docs:test\u003c/code> green (HubTile cycler/crossfade/reduced-motion + Picsum\u003c/li>\n\u003c/ul>\n\u003cp>  contracts); \u003ccode>pnpm docs:build\u003c/code> clean.\u003c/p>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>The field is intentionally \u003cstrong>frozen under \u003ccode>prefers-reduced-motion\u003c/code>\u003c/strong> (WCAG 2.2.2);\u003c/li>\n\u003c/ul>\n\u003cp>  with that OS setting on, the components won't cycle by design.\u003c/p>","acTotal":7,"acDone":7},{"id":"DS-0065","type":"story","title":"Landing field refinements — opacity, scrim, no image, entrance, types","status":"done","priority":"high","tags":["docs","landing","motion","typescript"],"depends_on":["DS-0064"],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Follow-up refinements to the landing field ([[DS-0064-landing-field-fixes]]).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Tile default opacity \u003ccode>0.20\u003c/code>\u003c/strong> (was \u003ccode>0.28\u003c/code>).\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Gradient spans the whole screen\u003c/strong> as a dedicated full-screen scrim layer\u003c/li>\n\u003c/ul>\n\u003cp>  (\u003ccode>.scrim\u003c/code>, \u003ccode>position:absolute; inset:0\u003c/code>) centred on the hero, \u003cstrong>over\u003c/strong> the dimmed\u003c/p>\n\u003cp>  field >, \u003ccode>BottomNavItem\u003c/code>, \u003ccode>MenuItem\u003c/code>, …). Fixed a real bug: the\u003c/p>\n\u003cp>  \u003ccode>BottomNav\u003c/code> default item used an invalid icon \u003ccode>'flex'\u003c/code> → \u003ccode>'database'\u003c/code> (lib + story\u003c/p>\n\u003cp>  + test). Added \u003ccode>@types/node\u003c/code> to the docs workspace (its tsconfig referenced \u003ccode>node\u003c/code>\u003c/p>\n\u003cp>  types that weren't installed) — \u003ccode>svelte-check\u003c/code> on the docs dropped 18→7 errors / 3→0\u003c/p>\n\u003cp>  warnings; the 7 remaining are a \u003cstrong>pre-existing\u003c/strong> repo-wide rune-types quirk on\u003c/p>\n\u003cp>  \u003ccode>Image.svelte\u003c/code> \u003ccode>$state&lt;T&gt;()\u003c/code> (correct code; the library \u003ccode>pnpm check\u003c/code> flags it too;\u003c/p>\n\u003cp>  CI doesn't run the check).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm docs:test\u003c/code> (32) + \u003ccode>pnpm test\u003c/code> (502) green; \u003ccode>pnpm docs:build\u003c/code> clean.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Debug \u003ccode>console.log\u003c/code>s left in \u003ccode>HubTile\u003c/code> during testing were removed.\u003c/li>\n\u003cli>The field still freezes + stays \u003ccode>inert\u003c/code> under reduced motion.\u003c/li>\n\u003c/ul>","acTotal":7,"acDone":7},{"id":"DS-0066","type":"epic","title":"Quality & consistency pass — full codebase scan (June 2026)","status":"done","priority":"high","tags":["quality","a11y","tokens","tests","ci","docs"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>A full parallel scan of the repo (library, styles/tokens, tests, docs site, Storybook,\u003c/p>\n\u003cp>build/CI) surfaced ~70 findings. This epic groups the resulting improvement backlog:\u003c/p>\n\u003cp>SSR safety, token/theming correctness, size-variant rescaling, test coverage, docs\u003c/p>\n\u003cp>accuracy, Storybook controls, CI hardening, svelte-check fix, release automation, and\u003c/p>\n\u003cp>component API consistency.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All child stories (DS-0067 … DS-0078) are done or explicitly descoped.\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Scan ran 2026-06-11 with six parallel read-only agents over the whole repo.\u003c/li>\n\u003c/ul>","acTotal":1,"acDone":1},{"id":"DS-0067","type":"story","title":"SSR safety pass — guard window/document access, stable IDs","status":"done","priority":"high","tags":["ssr","components","bug"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a SvelteKit user I can server-render any dssoca component without crashes.\u003c/p>\n\u003cp>Some components touch \u003ccode>window\u003c/code>/\u003ccode>document\u003c/code> in effects without environment guards,\u003c/p>\n\u003cp>and Accordion generates IDs with \u003ccode>Math.random()\u003c/code> (unstable across server/client).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Topbar.svelte\u003c/code> (~L67-70): \u003ccode>window.addEventListener\u003c/code>/\u003ccode>removeEventListener\u003c/code> wrapped\u003c/li>\n\u003c/ul>\n\u003cp>  in a \u003ccode>typeof window !== 'undefined'\u003c/code> guard (match the pattern in \u003ccode>toast.svelte.ts:48\u003c/code>).\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Menu.svelte\u003c/code> (~L181-182): \u003ccode>document\u003c/code> listeners guarded the same way; \u003ccode>onDocPointerDown\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  null-checks \u003ccode>panelEl\u003c/code> before \u003ccode>.contains()\u003c/code>.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Accordion.svelte\u003c/code> (~L62): \u003ccode>idBase\u003c/code> derived from \u003ccode>$props.id()\u003c/code> instead of \u003ccode>Math.random()\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  so server- and client-rendered IDs match.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Unit tests cover the SSR-sensitive paths (render in a no-window-ish harness or assert\u003c/li>\n\u003c/ul>\n\u003cp>  guards), \u003ccode>pnpm test\u003c/code> green.\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Documentation updated (docs.config.ts component notes if behavior is user-visible).\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Found in the June 2026 quality scan; effects normally don't run on the server, but the\u003c/li>\n\u003c/ul>\n\u003cp>  guard pattern is the house convention and protects against eager evaluation.\u003c/p>\n\u003cul>\n\u003cli>Implementation (2026-06-12): Topbar/Menu use the \u003ccode>hasWindow\u003c/code>/\u003ccode>hasDocument\u003c/code> const guard\u003c/li>\n\u003c/ul>\n\u003cp>  (toast.svelte.ts pattern); Accordion's default \u003ccode>idBase\u003c/code> is now \u003ccode>ss-acc-${$props.id()}\u003c/code>\u003c/p>\n\u003cp>  (per-instance stable, unique across instances — covered by a Math.random spy test).\u003c/p>\n\u003cp>  Tests assert listener lifecycle via spies plus the guard pattern itself (jsdom always\u003c/p>\n\u003cp>  has window/document, so the no-window branch is asserted at source level, as the AC\u003c/p>\n\u003cp>  allows). Docs: \u003ccode>accordion.ts\u003c/code> idBase prop description updated.\u003c/p>","acTotal":5,"acDone":5},{"id":"DS-0068","type":"story","title":"Tokenize hardcoded chrome — px values that don't rescale with size variants","status":"done","priority":"high","tags":["tokens","scss","size-variants"],"depends_on":[],"parent":null,"epic":"DS-0066","created":"2026-06-11","updated":"2026-06-12","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a user flipping \u003ccode>data-size-variant\u003c/code>, every piece of component chrome rescales.\u003c/p>\n\u003cp>Several components hardcode px values, violating the \"new chrome reads size tokens\" rule,\u003c/p>\n\u003cp>so they stay fixed at sm/lg.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>BottomNav.svelte\u003c/code> (~L190-196): badge positioning/sizing (\u003ccode>top: -6px\u003c/code>,\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>left: calc(50% + 6px)\u003c/code>, \u003ccode>min-width: 14px\u003c/code>, \u003ccode>height: 14px\u003c/code>, \u003ccode>font-size: 9px\u003c/code>,\u003c/p>\n\u003cp>  \u003ccode>padding: 0 3px\u003c/code>) moved to size-aware \u003ccode>--ss-bottom-nav-badge-*\u003c/code> tokens.\u003c/p>\n\u003cp>  *(Done: \u003ccode>--ss-bottom-nav-badge-{top,dx,min-w,h,fs,px}\u003c/code> in\u003c/p>\n\u003cp>  \u003ccode>src/styles/components/_bottom-nav.scss\u003c/code> with sm/md/lg blocks; md mirrors the\u003c/p>\n\u003cp>  previous px exactly. The component carries md fallbacks + local per-size\u003c/p>\n\u003cp>  overrides so it stays self-contained.)*\u003c/p>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>LogStream.svelte\u003c/code>: \u003ccode>max-height: 240px\u003c/code> / \u003ccode>min-height: 160px\u003c/code> (~L341-342) and column\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>min-width: 58px/38px\u
