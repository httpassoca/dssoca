<style>
:root{

  --fg:#e0e0e0; --shine:#fff; --muted:#aaa; --faint:#6f6f6f; --on:#100f10;
  --primary:#66ef73; --red:#ff5c5c; --yellow:#e0c36a; --cyan:#66d9ef; --blue:#9aa4ff; --purple:#b98cff;

}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
a{color:inherit}
::selection{background:var(--primary);color:var(--on)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line2)}
.wrap{max-width:1200px;margin:0 auto;padding:24px 28px 80px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px;flex-wrap:wrap}
.head h1{font-family:var(--disp);font-weight:400;font-size:30px;letter-spacing:-.01em;margin:0;line-height:1}
.head h1 .accent{position:relative}
.head h1 .sep{color:var(--faint);margin:0 .2em}
.head h1 .accent::before{content:"";position:absolute;left:-2%;right:-6%;top:68%;height:22%;background:var(--primary);opacity:.9;z-index:-1}
.head .meta{font-size:11px;color:var(--faint);text-align:right;text-transform:lowercase;letter-spacing:.04em}
.metrics{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.metric{border:1px solid var(--line);background:var(--elev);padding:10px 14px;min-width:96px;cursor:pointer;transition:border-color .15s}
.metric:hover{border-color:var(--line2)}
.metric.on{border-color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}
.metric .v{font-family:var(--disp);font-size:26px;line-height:1;font-variant-numeric:tabular-nums}
.metric .l{font-size:10px;color:var(--faint);text-transform:lowercase;letter-spacing:.05em;margin-top:4px}
.metric[data-s="done"] .v{color:var(--primary)} .metric[data-s="in-progress"] .v{color:var(--cyan)}
.metric[data-s="blocked"] .v{color:var(--red)} .metric[data-s="todo"] .v{color:var(--yellow)}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.bar input,.bar select{font-family:var(--mono);font-size:12px;background:transparent;color:var(--fg);border:1px solid var(--line);padding:7px 10px}
.bar input{min-width:200px;flex:1}
.bar input:focus,.bar select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(102,239,115,.18)}
.bar input::placeholder{font-style:italic;color:var(--faint)}
.toggle{display:flex;border:1px solid var(--line)}
.toggle button{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:transparent;color:var(--muted);border:0;padding:7px 12px;cursor:pointer}
.toggle button.on{background:rgba(102,239,115,.1);color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}
.count{font-size:11px;color:var(--faint);margin-left:auto}
.group{margin-top:18px}
.group .gh{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:2px}
.group .gh .n{color:var(--shine)} .group .gh .c{margin-left:auto}
.row{display:grid;grid-template-columns:130px 1fr auto auto;gap:12px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer}
.row:hover{background:rgba(255,255,255,.03)}
.row .id{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.row .ti{color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .ti .typ{color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:8px}
.row .ac{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
.badge{font-size:10px;letter-spacing:.05em;text-transform:lowercase;padding:3px 8px;border:1px solid var(--line);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.badge .dot{width:5px;height:5px;background:currentColor;display:inline-block}
.badge.done{color:var(--primary);border-color:rgba(102,239,115,.4);background:rgba(102,239,115,.1)}
.badge.in-progress{color:var(--cyan);border-color:rgba(102,217,239,.4);background:rgba(102,217,239,.1)}
.badge.blocked{color:var(--red);border-color:rgba(255,92,92,.4);background:rgba(255,92,92,.1)}
.badge.todo{color:var(--yellow);border-color:rgba(224,195,106,.4);background:rgba(224,195,106,.1)}
.badge.backlog{color:var(--muted);border-color:var(--line)}
.pri{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.pri.high{color:var(--shine)}
.detail{grid-column:1/-1;padding:6px 10px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.015)}
.detail .md-h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:12px 0 4px}
.detail p{margin:4px 0;color:var(--muted)}
.detail ul{margin:4px 0;padding-left:18px} .detail li{color:var(--muted)}
.detail .md-checks{list-style:none;padding-left:0}
.detail .md-checks li{display:flex;gap:8px;align-items:baseline}
.detail .md-checks li .box{width:14px;height:14px;border:1px solid var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--primary);flex:none}
.detail .md-checks li.done{color:var(--fg)} .detail .md-checks li.done .box{border-color:var(--primary)}
.detail code{font-family:var(--mono);background:rgba(255,255,255,.06);padding:.1em .35em;font-size:.92em;color:#d6deeb}
.detail .kv{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:11px;color:var(--faint);margin-top:10px}
.detail .kv b{color:var(--muted);font-weight:400}
.tableview{width:100%;border-collapse:collapse;margin-top:8px}
.tableview th,.tableview td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);font-size:12px}
.tableview th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:400;cursor:pointer;user-select:none}
.tableview tbody tr{cursor:pointer} .tableview tbody tr:hover td{background:rgba(255,255,255,.03)}
.empty{padding:40px;text-align:center;color:var(--faint);border:1px solid var(--line);margin-top:16px}
.tagchip{font-size:10px;color:var(--blue);margin-right:6px}
.row.sel{background:rgba(102,239,115,.08);box-shadow:inset 2px 0 0 var(--primary)}
.tableview tbody tr.sel td{background:rgba(102,239,115,.08)}
.drawer-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .18s;z-index:55}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100vh;width:min(460px,94vw);background:var(--bg);border-left:1px solid var(--line2);box-shadow:-14px 0 44px rgba(0,0,0,.55);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .18s ease}
.drawer.open{transform:none}
.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg)}
.drawer-idrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.drawer-id{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.drawer-title{font-family:var(--disp);font-weight:400;font-size:18px;line-height:1.3;margin:0;color:var(--shine)}
.drawer-title .typ{color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:8px}
.drawer-x{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:13px;line-height:1;padding:6px 10px;cursor:pointer;flex:none}
.drawer-x:hover{border-color:var(--line2);color:var(--fg)}
.drawer-body{padding:8px 18px 32px;overflow-y:auto}
.drawer-body .detail{grid-column:auto;padding:0;border:0;background:none}
.foot{margin-top:28px;border-top:1px solid var(--line);padding-top:10px;font-size:10px;color:var(--faint);text-transform:lowercase;letter-spacing:.04em}
</style>

ized to the same convention. Icon and PassocaMark (SVG utilities) need little/no change\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Naming rule\u003c/strong> applied: \u003ccode>ss-\u003c/code> is reserved for component identity / non-generic design-system classes. Component roots keep their \u003ccode>.ss-*\u003c/code> name (\u003ccode>.ss-btn\u003c/code>, \u003ccode>.ss-badge\u003c/code>, \u003ccode>.ss-panel\u003c/code>, \u003ccode>.ss-input\u003c/code>, \u003ccode>.ss-field\u003c/code>, \u003ccode>.ss-metric\u003c/code>, \u003ccode>.ss-svc\u003c/code>, \u003ccode>.ss-spark\u003c/code>, \u003ccode>.ss-logs\u003c/code>, \u003ccode>.ss-topbar\u003c/code>, \u003ccode>.ss-side\u003c/code>, \u003ccode>.ss-toast(er)\u003c/code>, \u003ccode>.ss-empty\u003c/code>); generic internal sub-elements use plain scoped names (\u003ccode>.dot\u003c/code>, \u003ccode>.title\u003c/code>, \u003ccode>.head\u003c/code>, \u003ccode>.body\u003c/code>, \u003ccode>.msg\u003c/code>, \u003ccode>.icon\u003c/code>, \u003ccode>.bar\u003c/code>…)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>.ss-panel-head\u003c/code> / \u003ccode>.ss-panel-body\u003c/code> (the only ss-prefixed *sub-element* classes) renamed to local \u003ccode>.head\u003c/code> / \u003ccode>.body\u003c/code>; Card's ~4 test assertions updated. All other \u003ccode>.ss-*\u003c/code> root selectors unchanged, so the rest of the suite is untouched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>theme.css\u003c/code> retains only: \u003ccode>--ss-*\u003c/code> tokens, base/element resets + \u003ccode>.hs-*\u003c/code> typography, app-shell/layout classes (\u003ccode>.ss-app\u003c/code>, \u003ccode>.ss-main\u003c/code>, \u003ccode>.ss-pageHead\u003c/code>, \u003ccode>.ss-metrics\u003c/code>, \u003ccode>.ss-grid-2\u003c/code>, \u003ccode>.ss-svc-grid\u003c/code>, \u003ccode>.ss-footer\u003c/code>), and generic utilities (\u003ccode>.ss-line\u003c/code>). The migrated component rules are deleted from the global CSS\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Components consume \u003ccode>--ss-*\u003c/code> via \u003ccode>var()\u003c/code> inside scoped blocks; all four axis combinations recolor/rescale correctly; zero border-radius preserved\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>:global()\u003c/code> used where a component styles projected \u003ccode>{@render children()}\u003c/code> / snippet content (scoped styles don't reach rendered children) — verify Card body and any similar cases\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Internal raw \u003ccode>.ss-\u003c/code> usages fixed: Toaster and Input stories use the real components; the bogus \u003ccode>.ss-btn--primary\u003c/code> class (never matched the real \u003ccode>.ss-btn.primary\u003c/code>) removed\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>DESIGN.md\u003c/code> + \u003ccode>CLAUDE.md\u003c/code> updated: replace the \"components are thin wrappers over global \u003ccode>.ss-*\u003c/code> classes\" framing with the scoped model + the \u003ccode>ss-\u003c/code>-for-identity naming rule + what stays global; reconcile \u003ccode>docs/themes.md\u003c/code> / \u003ccode>docs/tokens.md\u003c/code> if they reference the old model\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>pnpm test\u003c/code> green (only Card selectors changed); \u003ccode>pnpm pack\u003c/code> clean; showcase + Storybook render identically\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>version\u003c/code> bumped to \u003cstrong>0.3.0\u003c/strong> (breaking) with a short migration note (raw \u003ccode>.ss-*\u003c/code> component classes removed — use the components); agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Why tests barely move:\u003c/strong> Svelte keeps the original class names in the DOM (adding a hash),\u003c/li>\n\u003c/ul>\n\u003cp>  so \u003ccode>querySelector('.ss-btn')\u003c/code> etc. still match as long as the class stays in markup. The only\u003c/p>\n\u003cp>  renames are the two \u003ccode>.ss-panel-*\u003c/code> sub-element classes.\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Cascade is safe:\u003c/strong> CSS custom properties inherit through Svelte's scoped-style boundary\u003c/li>\n\u003c/ul>\n\u003cp>  (no shadow DOM) — already proven by the existing \u003ccode>EmptyState.svelte\u003c/code> scoped block.\u003c/p>\n\u003cul>\n\u003cli>Builds directly on [[DS-0008-sass-styling-pipeline]]: lift each block out of \u003ccode>_components.scss\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  into its component's \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>, then delete the staging partial.\u003c/p>\n\u003cul>\n\u003cli>Out of scope: renaming the legacy \u003ccode>.hs-*\u003c/code> typography prefix (stays global in base).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":0},{"id":"DS-0007","type":"story","title":"Interactive component explorer (Storybook)","status":"in-progress","priority":"high","tags":["tooling","docs","dx"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I can browse and exercise components in isolation in a\u003c/p>\n\u003cp>Storybook, toggling the two design axes (color \u003ccode>dark\u003c/code>/\u003ccode>light\u003c/code>, density \u003ccode>comfy\u003c/code>/\u003ccode>compact\u003c/code>)\u003c/p>\n\u003cp>from the toolbar, so I can develop, document, and visually review components without wiring\u003c/p>\n\u003cp>them into the showcase app. Covers all 14 components.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Storybook (v10, \u003ccode>@storybook/sveltekit\u003c/code>) runs against the existing Vite/SvelteKit + Svelte 5 setup\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm storybook\u003c/code> (dev) and \u003ccode>pnpm build-storybook\u003c/code> (static) scripts exist; static build succeeds\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stories authored in Svelte CSF (\u003ccode>@storybook/addon-svelte-csf\u003c/code>) + autodocs (\u003ccode>@storybook/addon-docs\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Toolbar globals for both axes apply \u003ccode>data-theme\u003c/code>/\u003ccode>data-density\u003c/code> to \u003ccode>&lt;html&gt;\u003c/code> so stories recolor/rescale via the real cascade\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Button\u003c/code> page with Primary / Secondary / Ghost / Disabled stories and live Controls (variant, type, disabled, label)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>A page for \u003cstrong>every\u003c/strong> component (14 total): Badge, Button, Card, EmptyState, Icon, Input, LogStream, MetricTile, PassocaMark, ServiceCard, Sidebar, Sparkline, Toaster, Topbar — each with multiple stories covering real variants/states\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stories live in \u003ccode>src/stories/\u003c/code> (not \u003ccode>src/lib/\u003c/code>) so \u003ccode>svelte-package\u003c/code> never publishes them — verified \u003ccode>pnpm pack\u003c/code> tarball contains no story/Storybook files\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green (121) and \u003ccode>pnpm pack\u003c/code> clean; full \u003ccode>pnpm build-storybook\u003c/code> succeeds\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Config: \u003ccode>.storybook/main.ts\u003c/code> (stories glob \u003ccode>src/**\u003c/code>, framework \u003ccode>@storybook/sveltekit\u003c/code>),\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>.storybook/preview.ts\u003c/code> (imports \u003ccode>theme.css\u003c/code>, axis toolbar globals + decorator).\u003c/p>\n\u003cul>\n\u003cli>Story: \u003ccode>src/stories/Button.stories.svelte\u003c/code> — \u003ccode>Button\u003c/code> takes its label as a child snippet,\u003c/li>\n\u003c/ul>\n\u003cp>  so a shared \u003ccode>template\u003c/code> snippet + \u003ccode>label\u003c/code> arg drives the text via Controls.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>pnpm-workspace.yaml\u003c/code> \u003ccode>allowBuilds: { esbuild: true }\u003c/code> lets pnpm 11 run esbuild's postinstall\u003c/li>\n\u003c/ul>\n\u003cp>  (Storybook/Vite need the native binary).\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>/storybook-static\u003c/code> gitignored. CI still runs \u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm pack\u003c/code> only; Storybook build\u003c/li>\n\u003c/ul>\n\u003cp>  is not wired into CI yet (follow-up if desired).\u003c/p>\n\u003cul>\n\u003cli>Interactive notes: \u003ccode>Input\u003c/code> value is \u003ccode>$bindable\u003c/code> (typed one-way per story; the binding falls\u003c/li>\n\u003c/ul>\n\u003cp>  back to the child). \u003ccode>Sidebar\u003c/code>/\u003ccode>Topbar\u003c/code> are controlled (parent owns \u003ccode>active\u003c/code>) — each story sets\u003c/p>\n\u003cp>  its own active item and forwards the callback to the actions panel. \u003ccode>Toaster\u003c/code> reads the\u003c/p>\n\u003cp>  module-singleton store, so its Playground story fires the \u003ccode>toast\u003c/code> API from trigger buttons.\u003c/p>\n\u003cul>\n\u003cli>Avoid \u003ccode>$state()\u003c/code> inside \u003ccode>{@const}\u003c/code> in story markup — the Svelte CSF static indexer can't parse\u003c/li>\n\u003c/ul>\n\u003cp>  it (SB_SVELTE_CSF_PARSER_EXTRACT_SVELTE_0009); use plain controlled props instead.\u003c/p>","acTotal":8,"acDone":8},{"id":"DS-0001","type":"story","title":"Themeable design system: color + density axes","status":"done","priority":"high","tags":["ui","theme"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I import one \u003ccode>theme.css\u003c/code> and get a coherent look (signal green on\u003c/p>\n\u003cp>near-black, monospace-forward) configured along two orthogonal axes — color\u003c/p>\n\u003cp>(\u003ccode>dark\u003c/code>/\u003ccode>light\u003c/code>) and density (\u003ccode>comfy\u003c/code>/\u003ccode>compact\u003c/code>) — so a content app and the dense\u003c/p>\n\u003cp>hub dashboard share tokens without forking styles.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Color axis via \u003ccode>data-theme\u003c/code> (\u003ccode>dark\u003c/code> default · \u003ccode>light\u003c/code>) swaps surface/foreground tokens only\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Density axis via \u003ccode>data-density\u003c/code> (\u003ccode>comfy\u003c/code> default · \u003ccode>compact\u003c/code>) rescales chrome paddings/gaps/heights, not colors or content typography\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All four combinations (dark/comfy, dark/compact, light/comfy, light/compact) are valid and cascade from any ancestor (usually \u003ccode>&lt;html&gt;\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>applyDesignConfig({ theme, density })\u003c/code> merges over current config and writes to \u003ccode>&lt;html&gt;\u003c/code> at runtime\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>designAttributes({ ... })\u003c/code> returns SSR-safe attributes to spread in markup (no hydration flash)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius on every token (house rule, never overridden)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/theme.css\u003c/code> (exported as \u003ccode>dssoca/theme.css\u003c/code>) — token source of truth\u003c/li>\n\u003cli>\u003ccode>src/lib/config.ts\u003c/code> — \u003ccode>applyDesignConfig\u003c/code> / \u003ccode>designAttributes\u003c/code>, re-exported from package root\u003c/li>\n\u003cli>Content typography (\u003ccode>h1\u003c/code>–\u003ccode>h3\u003c/code>, \u003ccode>--hs-size-*\u003c/code>, \u003ccode>--hs-s-*\u003c/code>) is density-independent; only \u003ccode>--hs-leading\u003c/code> differs (1.5 comfy / 1.3 compact)\u003c/li>\n\u003cli>See \u003ccode>DESIGN.md\u003c/code> + \u003ccode>docs/themes.md\u003c/code> / \u003ccode>docs/tokens.md\u003c/code>\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0002","type":"story","title":"Reusable Svelte 5 component set (~14 components)","status":"done","priority":"high","tags":["ui"],"depends_on":["DS-0001"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I import ready-made Svelte 5 components from \u003ccode>dssoca\u003c/code> instead\u003c/p>\n\u003cp>of rebuilding primitives per project, so every app looks consistent and picks\u003c/p>\n\u003cp>up the active theme/density automatically.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>~14 components shipped: Badge, Button, Card, EmptyState, Icon, Input, LogStream, MetricTile, PassocaMark, ServiceCard, Sidebar, Sparkline, Toaster, Topbar\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All exported from the package root (\u003ccode>import { Button, Card } from 'dssoca'\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Components are unstyled wrappers over global \u003ccode>.hub-*\u003c/code> classes in \u003ccode>theme.css\u003c/code> — they inherit whatever theme/density is active on an ancestor\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Icon set includes a \u003ccode>book\u003c/code> glyph\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Built to \u003ccode>dist\u003c/code> via \u003ccode>svelte-package\u003c/code> for consumers\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Vitest + @testing-library/svelte suite covers the components\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/\u003c/code> — one \u003ccode>.svelte\u003c/code> file per component\u003c/li>\n\u003cli>\u003ccode>src/lib/index.ts\u003c/code> — package barrel export\u003c/li>\n\u003cli>Runner: \u003ccode>pnpm test\u003c/code> (Vitest, jsdom) — per the testing rule, extend on any change\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0003","type":"story","title":"Toast notifications (Toaster + toast API)","status":"done","priority":"low","tags":["ui"],"depends_on":["DS-0002"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I mount a single \u003ccode>&lt;Toaster /&gt;\u003c/code> and call an imperative \u003ccode>toast(...)\u003c/code>\u003c/p>\n\u003cp>from anywhere to surface transient feedback (success/error), so apps get consistent\u003c/p>\n\u003cp>notifications without wiring their own state.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>&lt;Toaster /&gt;\u003c/code> component renders the stack and is exported from the package root\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Imperative \u003ccode>toast\u003c/code> API enqueues notifications from any module (no prop drilling)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Toasts honor the active theme/density and the zero border-radius rule\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Used by apps as the standard channel for error/success feedback\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/Toaster.svelte\u003c/code> (component) + \u003ccode>src/lib/toast.svelte.ts\u003c/code> (reactive store + \u003ccode>toast\u003c/code> API)\u003c/li>\n\u003cli>Backs the project-wide error-handling rule (uniform toast feedback across apps)\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0004","type":"story","title":"EmptyState + consistent error/empty affordances","status":"done","priority":"low","tags":["ui"],"depends_on":["DS-0002"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I drop in an \u003ccode>EmptyState\u003c/code> for \"no data\" and \"something went wrong\"\u003c/p>\n\u003cp>cases, so empty lists and failed fetches render a consistent, on-theme affordance\u003c/p>\n\u003cp>instead of a blank screen in every app.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>EmptyState\u003c/code> component exported from the package root with title/message slots\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Renders on-theme (signal-green/near-black) and follows the zero border-radius rule\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Picks up active density (comfy/compact) like the rest of the set\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Used by apps for empty lists and degraded/error states (e.g. when a service is down)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/EmptyState.svelte\u003c/code>\u003c/li>\n\u003cli>Pairs with the Toaster (DS-0003) to satisfy the repo-wide error-handling rule\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0005","type":"task","title":"Rename --hs- tokens + hub-* classes to ss-","status":"done","priority":"low","tags":["ui","theme","breaking"],"depends_on":[],"parent":"DS-0001","epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The design system was extracted from the \u003ccode>hubssoca\u003c/code> monorepo as a lift-and-shift, keeping the\u003c/p>\n\u003cp>original \u003ccode>--hs-\u003c/code> CSS custom-property prefix and the global \u003ccode>hub-*\u003c/code> shell classes (e.g. \u003ccode>.ss-topbar\u003c/code>,\u003c/p>\n\u003cp>\u003ccode>.ss-panel\u003c/code>). For the standalone \u003ccode>dssoca\u003c/code> identity these were renamed to a neutral \u003ccode>ss-\u003c/code> prefix\u003c/p>\n\u003cp>(\u003ccode>--hs-\u003c/code> → \u003ccode>--ss-\u003c/code>, \u003ccode>hub-\u003c/code> → \u003ccode>ss-\u003c/code>).\u003c/p>\n\u003cp>This is a \u003cstrong>breaking change\u003c/strong> for any consumer that referenced the old tokens/classes directly. Done\u003c/p>\n\u003cp>in the working tree + committed; not yet published — the next npm release (≥ 0.2.0) ships it with a\u003c/p>\n\u003cp>migration note.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All \u003ccode>--hs-*\u003c/code> custom properties renamed to \u003ccode>--ss-*\u003c/code> in \u003ccode>src/lib/theme.css\u003c/code> and every component (472 refs)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All global \u003ccode>hub-*\u003c/code> classes renamed to \u003ccode>ss-*\u003c/code> in \u003ccode>theme.css\u003c/code> and component markup (166 refs)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests updated to the new names; \u003ccode>pnpm test\u003c/code> green (121/121)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>DESIGN.md / docs / README references updated to \u003ccode>--ss-\u003c/code> / \u003ccode>ss-\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Release notes flag the breaking rename when the next version is published (dssoca@0.2.0)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Prefix chosen: \u003ccode>ss-\u003c/code> (soca system), not \u003ccode>ds-\u003c/code> as originally scoped\u003c/li>\n\u003cli>Mechanical sweep: \u003ccode>--hs-\u003c/code> → \u003ccode>--ss-\u003c/code>, \u003ccode>hub-\u003c/code> → \u003ccode>ss-\u003c/code> across \u003ccode>src/ test/ docs/\u003c/code> + README/DESIGN; prose \"hub\" left intact\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0006","type":"task","title":"CI pipeline + git-flow + agent docs (CLAUDE.md)","status":"done","priority":"high","tags":["infra","ci","docs"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Set the repo up for collaborative/agent work: a CLAUDE.md operating guide, GitHub Actions CI on\u003c/p>\n\u003cp>every PR, and the git-flow branching model with protected branches.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>CLAUDE.md\u003c/code> — agent operating instructions (stack, layout, house rules, commands, git-flow, releasing)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>.github/workflows/ci.yml\u003c/code> — runs \u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm pack\u003c/code> on every PR and pushes to main/develop\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>packageManager\u003c/code> pinned in \u003ccode>package.json\u003c/code> (pnpm@11.1.3) for reproducible CI\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>git-flow: \u003ccode>develop\u003c/code> branch created off \u003ccode>main\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Branch protection on \u003ccode>main\u003c/code> + \u003ccode>develop\u003c/code>: require PR + green \u003ccode>test\u003c/code> check before merge\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>CI deliberately skips \u003ccode>pnpm check\u003c/code> (svelte-check) — pre-existing \u003ccode>$lib\u003c/code> alias error from the library template, not a real type bug\u003c/li>\n\u003cli>Solo-friendly protection: 0 required approvals (owner self-merges once CI is green)\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0008","type":"story","title":"Sass-based styling pipeline","status":"done","priority":"high","tags":["styling","sass","build","refactor"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I author the global styling in \u003cstrong>Sass\u003c/strong> instead of\u003c/p>\n\u003cp>hand-written CSS — split into partials, with nesting and mixins for the repeated rule patterns —\u003c/p>\n\u003cp>while keeping the published \u003ccode>dssoca/theme.css\u003c/code> output and the \u003ccode>--ss-*\u003c/code> token + \u003ccode>data-theme\u003c/code>/\u003c/p>\n\u003cp>\u003ccode>data-density\u003c/code> cascade model exactly as they are today. This also enables \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>\u003c/p>\n\u003cp>in components so the follow-up scoped-styles work (DS-0009) can use Sass from the start.\u003c/p>\n\u003cp>Foundational and \u003cstrong>non-breaking\u003c/strong>: the compiled CSS is functionally identical, so nothing\u003c/p>\n\u003cp>changes for consumers. Sequenced first so DS-0009 writes scoped SCSS directly rather than\u003c/p>\n\u003cp>rewriting every component twice (CSS then SCSS).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>sass\u003c/code> added as a devDependency; \u003ccode>vitePreprocess()\u003c/code> enabled via the \u003ccode>preprocess\u003c/code> field in \u003ccode>svelte.config.js\u003c/code> (uses the already-installed \u003ccode>@sveltejs/vite-plugin-svelte\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>src/lib/theme.css\u003c/code> reauthored as Sass partials under \u003ccode>src/styles/\u003c/code> (outside \u003ccode>src/lib\u003c/code>, so \u003ccode>svelte-package\u003c/code> never publishes them): \u003ccode>_tokens.scss\u003c/code>, \u003ccode>_base.scss\u003c/code>, \u003ccode>_layout.scss\u003c/code>, \u003ccode>_components.scss\u003c/code>, and a \u003ccode>theme.scss\u003c/code> entry that \u003ccode>@use\u003c/code>-s them\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>--ss-*\u003c/code> tokens remain \u003cstrong>explicit CSS custom properties\u003c/strong> (not Sass \u003ccode>$variables\u003c/code>, not generated from maps); Sass is used only for structure (partials/nesting/mixins). All four axis combinations (dark/light × comfy/compact) still recolor/rescale identically\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius and the \u003ccode>--ss-*\u003c/code> / \u003ccode>.ss-*\u003c/code> prefixes preserved (house rules)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>prepack\u003c/code> compiles \u003ccode>src/styles/theme.scss\u003c/code> → \u003ccode>dist/theme.css\u003c/code> via a \u003cstrong>Dart Sass CLI\u003c/strong> step run *after* \u003ccode>svelte-package\u003c/code>; the \u003ccode>./theme.css\u003c/code> → \u003ccode>./dist/theme.css\u003c/code> export is unchanged\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Component \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code> compiles through \u003ccode>svelte-package\u003c/code> once the preprocessor is set — no extra config (svelte-package preprocesses \u003ccode>.svelte\u003c/code>; only standalone \u003ccode>.scss\u003c/code> needs the separate CLI step)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Dev/showcase/Storybook imports updated to the \u003ccode>.scss\u003c/code> entry (Vite compiles on the fly): \u003ccode>src/routes/+page.svelte\u003c/code>, \u003ccode>.storybook/preview.ts\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm pack\u003c/code> tarball contains \u003ccode>dist/theme.css\u003c/code> and \u003cstrong>no\u003c/strong> \u003ccode>.scss\u003c/code>; \u003ccode>pnpm test\u003c/code> green (121); \u003ccode>pnpm dev\u003c/code> + \u003ccode>pnpm build-storybook\u003c/code> render identically to before\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>version\u003c/code> bumped to \u003cstrong>0.2.1\u003c/strong> (patch — non-breaking); agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Why a separate CLI step:\u003c/strong> \u003ccode>svelte-package@2.5.8\u003c/code> only preprocesses \u003ccode>.svelte\u003c/code>/\u003ccode>.ts\u003c/code>/\u003ccode>.js\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  and copies everything else verbatim (\u003ccode>node_modules/@sveltejs/package/src/index.js:258,285\u003c/code>),\u003c/p>\n\u003cp>  so a standalone \u003ccode>theme.scss\u003c/code> would ship un-compiled. The Dart Sass CLI step produces the\u003c/p>\n\u003cp>  published \u003ccode>dist/theme.css\u003c/code>.\u003c/p>\n\u003cul>\n\u003cli>Keep token blocks hand-written/explicit (they are the documented source of truth in\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>docs/tokens.md\u003c/code>); don't DRY them into Sass maps/loops at the cost of readability.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>_components.scss\u003c/code> is a staging home for the current \u003ccode>.ss-*\u003c/code> component rules — DS-0009 lifts\u003c/li>\n\u003c/ul>\n\u003cp>  each block out into its component, leaving this partial empty/removed. See [[DS-0009-scoped-component-styles]].\u003c/p>\n\u003cul>\n\u003cli>Follows the same \"source lives outside the published \u003ccode>src/lib\u003c/code>\" pattern used for \u003ccode>src/stories/\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  in [[DS-0007-storybook-component-explorer]].\u003c/p>","acTotal":9,"acDone":9}]}</script>
<script>
const RAW = JSON.parse(document.getElementById('agile-data').textContent);
const ITEMS = RAW.items, SCOPE = RAW.scope;
const STATUSES = ["backlog","todo","in-progress","blocked","done"];
const PRIORITIES = ["high","low"];
const GROUP_KEYS = ['project','status','type','priority'];
// Single-project boards default to grouping by status (one project group is redundant);
// the global hub board defaults to grouping by project.
const state = { view: 'grouped', groupBy: SCOPE === 'global' ? 'project' : 'status', status: '', sortKey: 'id', sortDir: 1 };

function uniq(arr){ return [...new Set(arr)].sort(); }
function opt(sel, vals, label){ const e=document.getElementById(sel); e.innerHTML='<option value="">'+label+'</option>'+vals.map(v=>'<option>'+v+'</option>').join(''); }
opt('f-type', uniq(ITEMS.map(i=>i.type)), 'type: all');
opt('f-status', STATUSES.filter(s=>ITEMS.some(i=>i.status===s)), 'status: all');
opt('f-priority', uniq(ITEMS.map(i=>i.priority)), 'priority: all');
opt('f-tag', uniq(ITEMS.flatMap(i=>i.tags)), 'tag: all');
if (SCOPE === 'global'){ const e=document.getElementById('f-project'); e.hidden=false; opt('f-project', uniq(ITEMS.map(i=>i.project)), 'project: all'); }
const gbSel=document.getElementById('f-groupby');
gbSel.innerHTML=GROUP_KEYS.map(v=>'<option value="'+v+'"'+(v===state.groupBy?' selected':'')+'>group: '+v+'</option>').join('');

function filtered(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  const fp = document.getElementById('f-project').value;
  const ft = document.getElementById('f-type').value;
  const fs = state.status || document.getElementById('f-status').value;
  const fpr = document.getElementById('f-priority').value;
  const ftag = document.getElementById('f-tag').value;
  return ITEMS.filter(i=>{
    if (fp && i.project!==fp) return false;
    if (ft && i.type!==ft) return false;
    if (fs && i.status!==fs) return false;
    if (fpr && i.priority!==fpr) return false;
    if (ftag && !i.tags.includes(ftag)) return false;
    if (q && !(i.id.toLowerCase().includes(q)||i.title.toLowerCase().includes(q)||i.tags.join(' ').toLowerCase().includes(q))) return false;
    return true;
  });
}
function badge(s){ return '<span class="badge '+s+'"><span class="dot"></span>'+s+'</span>'; }
function acStr(i){ return i.acTotal ? i.acDone+'/'+i.acTotal : ''; }
function detail(i){
  const deps = (i.depends_on&&i.depends_on.length)?'<b>depends on</b> '+i.depends_on.join(', '):'';
  const par = i.parent?'<b>parent</b> '+i.parent:'';
  const ep = i.epic?'<b>epic</b> '+i.epic:'';
  const tags = i.tags.length?'<b>tags</b> '+i.tags.join(', '):'';
  const kv = [par,ep,deps,tags,'<b>created</b> '+i.created,'<b>updated</b> '+i.updated].filter(Boolean).join('<span style="opacity:.4">·</span> ');
  return '<div class="detail">'+(i.bodyHtml||'<p style="color:var(--faint)">no description</p>')+'<div class="kv">'+kv+'</div></div>';
}
function renderMetrics(){
  const m = document.getElementById('metrics'); const all = ITEMS;
  const cards = STATUSES.map(s=>{ const n=all.filter(i=>i.status===s).length; return '<div class="metric'+(state.status===s?' on':'')+'" data-s="'+s+'" data-pick="'+s+'"><div class="v">'+n+'</div><div class="l">'+s+'</div></div>'; });
  cards.unshift('<div class="metric'+(state.status===''?' on':'')+'" data-pick=""><div class="v">'+all.length+'</div><div class="l">all</div></div>');
  m.innerHTML = cards.join('');
  m.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{ state.status = el.dataset.pick; document.getElementById('f-status').value=''; render(); });
}
function groupOrder(gb, keys){
  if(gb==='status') return keys.slice().sort((a,b)=>(STATUSES.indexOf(a)+1||99)-(STATUSES.indexOf(b)+1||99));
  if(gb==='priority') return keys.slice().sort((a,b)=>(PRIORITIES.indexOf(a)+1||99)-(PRIORITIES.indexOf(b)+1||99));
  return keys.slice().sort();
}
function renderGrouped(list){
  if(!list.length) return '<div class="empty">no items match</div>';
  const gb = state.groupBy;
  const groups = {};
  list.forEach(i=>{ const k=i[gb]||'—'; (groups[k]=groups[k]||[]).push(i); });
  return groupOrder(gb, Object.keys(groups)).map(p=>{
    const rows = groups[p].map(i=>(
      '<div class="row" data-id="'+i.id+'">'
      +'<span class="id">'+i.id+'</span>'
      +'<span class="ti"><span class="typ">'+i.type+'</span>'+i.title+'</span>'
      +'<span class="ac">'+acStr(i)+'</span>'
      +badge(i.status)
      +'<span class="pri '+i.priority+'">'+i.priority+'</span>'
      +'</div>'
    )).join('');
    return '<div class="group"><div class="gh"><span class="n">'+p+'</span><span class="c">'+groups[p].length+'</span></div>'+rows+'</div>';
  }).join('');
}
function renderTable(list){
  if(!list.length) return '<div class="empty">no items match</div>';
  const cols = [['id','id'],['title','title'],['project','project'],['type','type'],['status','status'],['priority','pri']];
  const sorted = [...list].sort((a,b)=>{ const k=state.sortKey; return String(a[k]).localeCompare(String(b[k]))*state.sortDir || a.id.localeCompare(b.id); });
  const head = '<tr>'+cols.map(c=>'<th data-sort="'+c[0]+'">'+c[0]+(state.sortKey===c[0]?(state.sortDir>0?' ▲':' ▼'):'')+'</th>').join('')+'</tr>';
  const body = sorted.map(i=>(
    '<tr data-id="'+i.id+'"><td class="id">'+i.id+'</td><td>'+i.title+'</td><td>'+i.project+'</td><td>'+i.type+'</td><td>'+badge(i.status)+'</td><td><span class="pri '+i.priority+'">'+i.priority+'</span></td></tr>'
  )).join('');
  return '<table class="tableview"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
}
let openId = null;
const drawer = document.getElementById('drawer');
const backdrop = document.getElementById('drawer-backdrop');
function markSel(){
  document.querySelectorAll('.row.sel,.tableview tbody tr.sel').forEach(el=>el.classList.remove('sel'));
  if(openId){ const el=document.querySelector('[data-id="'+openId+'"]'); if(el) el.classList.add('sel'); }
}
function closeDrawer(){ openId=null; drawer.classList.remove('open'); backdrop.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); markSel(); }
function openItem(id){
  if(id===openId){ closeDrawer(); return; }
  const i=ITEMS.find(x=>x.id===id); if(!i) return;
  openId=id;
  document.getElementById('d-id').textContent=i.id;
  document.getElementById('d-badge').innerHTML=badge(i.status);
  document.getElementById('d-pri').innerHTML='<span class="pri '+i.priority+'">'+i.priority+'</span>';
  document.getElementById('d-title').innerHTML='<span class="typ">'+i.type+'</span>'+i.title;
  document.getElementById('drawer-body').innerHTML=detail(i);
  drawer.classList.add('open'); backdrop.classList.add('open'); drawer.setAttribute('aria-hidden','false');
  markSel();
}
document.getElementById('drawer-close').onclick=closeDrawer;
backdrop.onclick=closeDrawer;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });
function render(){
  renderMetrics();
  gbSel.style.display = state.view==='grouped' ? '' : 'none';
  const list = filtered();
  document.getElementById('count').textContent = list.length+' / '+ITEMS.length+' items';
  const board = document.getElementById('board');
  board.innerHTML = state.view==='grouped' ? renderGrouped(list) : renderTable(list);
  board.querySelectorAll('[data-id]').forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest('[data-sort]')) return; openItem(el.dataset.id); };
  });
  if(state.view==='table'){
    board.querySelectorAll('[data-sort]').forEach(th=>th.onclick=()=>{ const k=th.dataset.sort; if(state.sortKey===k)state.sortDir*=-1; else {state.sortKey=k;state.sortDir=1;} render(); });
  }
  markSel();
}
document.querySelectorAll('.toggle button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.toggle button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); state.view=b.dataset.view; render(); });
['q','f-project','f-type','f-status','f-priority','f-tag'].forEach(id=>{ const el=document.getElementById(id); el.addEventListener('input',()=>{ if(id==='f-status')state.status=''; render(); }); });
gbSel.addEventListener('change',()=>{ state.groupBy=gbSel.value; render(); });
render();
</script>
</body>
</html>
