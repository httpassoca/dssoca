<style>
:root{
  --bg:#100f10; --elev:#1e1e1e; --line:rgba(255,255,255,.12); --line2:rgba(255,255,255,.22);
  --fg:#e0e0e0; --shine:#fff; --muted:#aaa; --faint:#6f6f6f; --on:#100f10;
  --primary:#66ef73; --red:#ff5c5c; --yellow:#e0c36a; --cyan:#66d9ef; --blue:#9aa4ff; --purple:#b98cff;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --disp:"Electrolize","Space Grotesk",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
a{color:inherit}
::selection{background:var(--primary);color:var(--on)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line2)}
.wrap{max-width:1200px;margin:0 auto;padding:24px 28px 80px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px;flex-wrap:wrap}
.head h1{font-family:var(--disp);font-weight:400;font-size:30px;letter-spacing:-.01em;margin:0;line-height:1}
.head h1 .accent{position:relative}
.head h1 .sep{color:var(--faint);margin:0 .2em}
.head h1 .accent::before{content:"";position:absolute;left:-2%;right:-6%;top:68%;height:22%;background:var(--primary);opacity:.9;z-index:-1}
.head .meta{font-size:11px;color:var(--faint);text-align:right;text-transform:lowercase;letter-spacing:.04em}
.metrics{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.metric{border:1px solid var(--line);background:var(--elev);padding:10px 14px;min-width:96px;cursor:pointer;transition:border-color .15s}
.metric:hover{border-color:var(--line2)}
.metric.on{border-color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}
.metric .v{font-family:var(--disp);font-size:26px;line-height:1;font-variant-numeric:tabular-nums}
.metric .l{font-size:10px;color:var(--faint);text-transform:lowercase;letter-spacing:.05em;margin-top:4px}
.metric[data-s="done"] .v{color:var(--primary)} .metric[data-s="in-progress"] .v{color:var(--cyan)}
.metric[data-s="blocked"] .v{color:var(--red)} .metric[data-s="todo"] .v{color:var(--yellow)}
.bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px}
.bar input,.bar select{font-family:var(--mono);font-size:12px;background:transparent;color:var(--fg);border:1px solid var(--line);padding:7px 10px}
.bar input{min-width:200px;flex:1}
.bar input:focus,.bar select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(102,239,115,.18)}
.bar input::placeholder{font-style:italic;color:var(--faint)}
.toggle{display:flex;border:1px solid var(--line)}
.toggle button{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;background:transparent;color:var(--muted);border:0;padding:7px 12px;cursor:pointer}
.toggle button.on{background:rgba(102,239,115,.1);color:var(--primary);box-shadow:inset 0 -2px 0 var(--primary)}
.count{font-size:11px;color:var(--faint);margin-left:auto}
.group{margin-top:18px}
.group .gh{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding-bottom:6px;border-bottom:1px solid var(--line);margin-bottom:2px}
.group .gh .n{color:var(--shine)} .group .gh .c{margin-left:auto}
.row{display:grid;grid-template-columns:130px 1fr auto auto;gap:12px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--line);cursor:pointer}
.row:hover{background:rgba(255,255,255,.03)}
.row .id{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.row .ti{color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .ti .typ{color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:8px}
.row .ac{font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
.badge{font-size:10px;letter-spacing:.05em;text-transform:lowercase;padding:3px 8px;border:1px solid var(--line);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.badge .dot{width:5px;height:5px;background:currentColor;display:inline-block}
.badge.done{color:var(--primary);border-color:rgba(102,239,115,.4);background:rgba(102,239,115,.1)}
.badge.in-progress{color:var(--cyan);border-color:rgba(102,217,239,.4);background:rgba(102,217,239,.1)}
.badge.blocked{color:var(--red);border-color:rgba(255,92,92,.4);background:rgba(255,92,92,.1)}
.badge.todo{color:var(--yellow);border-color:rgba(224,195,106,.4);background:rgba(224,195,106,.1)}
.badge.backlog{color:var(--muted);border-color:var(--line)}
.pri{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.pri.high{color:var(--shine)}
.detail{grid-column:1/-1;padding:6px 10px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.015)}
.detail .md-h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:12px 0 4px}
.detail p{margin:4px 0;color:var(--muted)}
.detail ul{margin:4px 0;padding-left:18px} .detail li{color:var(--muted)}
.detail .md-checks{list-style:none;padding-left:0}
.detail .md-checks li{position:relative;padding-left:22px;margin:2px 0}
.detail .md-checks li .box{position:absolute;left:0;top:1px;width:14px;height:14px;border:1px solid var(--line);display:inline-block;text-align:center;line-height:13px;font-size:10px;color:var(--primary)}
.detail .md-checks li.done{color:var(--fg)} .detail .md-checks li.done .box{border-color:var(--primary)}
.detail code{font-family:var(--mono);background:rgba(255,255,255,.06);padding:.1em .35em;font-size:.92em;color:#d6deeb}
.detail .kv{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:11px;color:var(--faint);margin-top:10px}
.detail .kv b{color:var(--muted);font-weight:400}
.tableview{width:100%;border-collapse:collapse;margin-top:8px}
.tableview th,.tableview td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line);font-size:12px}
.tableview th{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:400;cursor:pointer;user-select:none}
.tableview tbody tr{cursor:pointer} .tableview tbody tr:hover td{background:rgba(255,255,255,.03)}
.empty{padding:40px;text-align:center;color:var(--faint);border:1px solid var(--line);margin-top:16px}
.tagchip{font-size:10px;color:var(--blue);margin-right:6px}
.row.sel{background:rgba(102,239,115,.08);box-shadow:inset 2px 0 0 var(--primary)}
.tableview tbody tr.sel td{background:rgba(102,239,115,.08)}
.drawer{position:fixed;top:0;right:0;height:100vh;width:var(--drawer-w,800px);min-width:320px;max-width:96vw;background:var(--bg);border-left:1px solid var(--line2);box-shadow:-14px 0 44px rgba(0,0,0,.55);z-index:60;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .18s ease}
.drawer.open{transform:none}
.drawer-grip{position:absolute;left:0;top:0;width:7px;height:100%;cursor:ew-resize;z-index:2;transition:background .15s}
.drawer-grip:hover,.drawer-grip.drag{background:var(--primary);opacity:.5}
.drawer-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg)}
.drawer-idrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.drawer-id{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.drawer-title{font-family:var(--disp);font-weight:400;font-size:18px;line-height:1.3;margin:0;color:var(--shine)}
.drawer-title .typ{color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:8px}
.drawer-x{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:13px;line-height:1;padding:6px 10px;cursor:pointer;flex:none}
.drawer-x:hover{border-color:var(--line2);color:var(--fg)}
.drawer-body{padding:8px 18px 32px;overflow-y:auto}
.drawer-body .detail{grid-column:auto;padding:0;border:0;background:none}
.foot{margin-top:28px;border-top:1px solid var(--line);padding-top:10px;font-size:10px;color:var(--faint);text-transform:lowercase;letter-spacing:.04em}
</style>
</head>

003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0050-dropdown-menu-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/ThemeMenu.svelte\u003c/code>, \u003ccode>LanguageMenu.svelte\u003c/code>, \u003ccode>FloatNavButton.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0045","type":"story","title":"Accordion component","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want an \u003cstrong>Accordion\u003c/strong> (collapsible disclosure) component — a header with a\u003c/p>\n\u003cp>rotating chevron that expands/collapses an animated content region — so I can present FAQs, grouped\u003c/p>\n\u003cp>settings, and progressive-disclosure content with correct semantics and keyboard support out of the box.\u003c/p>\n\u003cp>The website implements this as \u003ccode>AppExtension.svelte\u003c/code> (chevron rotates 180°, animated max-height + margin,\u003c/p>\n\u003cp>Enter/Space toggle, \u003ccode>open\u003c/code> event), but it is single-panel and app-specific; a design-system version should\u003c/p>\n\u003cp>generalize it.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Accordion\u003c/code> gains the behaviour tracked in [[ds-0051-accordion-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens (incl. motion duration) and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0051-accordion-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/AppExtension.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0046","type":"story","title":"Link component","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a styled \u003cstrong>Link\u003c/strong> component — an anchor with the design system's animated\u003c/p>\n\u003cp>underline (and an optional button-styled variant) — so inline and standalone links share one consistent,\u003c/p>\n\u003cp>accessible treatment instead of being styled ad hoc. The website's \u003ccode>AppLink.svelte\u003c/code> carries the signature\u003c/p>\n\u003cp>behaviour: a pseudo-element underline with a cubic-bezier reveal + glow (box-shadow), a \u003ccode>button\u003c/code> variant\u003c/p>\n\u003cp>(solid primary, no underline), and external-link handling (\u003ccode>target=\"_blank\"\u003c/code> + \u003ccode>rel=\"noopener noreferrer\"\u003c/code>).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Link\u003c/code> gains the behaviour tracked in [[ds-0052-link-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> tokens (color, motion) and respects zero border-radius; visible focus\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld; \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0052-link-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppLink.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0047","type":"story","title":"SegmentedControl component","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>SegmentedControl\u003c/strong> (toggle group) — a compact row of mutually-exclusive\u003c/p>\n\u003cp>options with a highlighted selection — so I can offer view/mode/locale toggles without a full Dropdown or\u003c/p>\n\u003cp>loose radio buttons. The website's \u003ccode>LanguageSwitcher.svelte\u003c/code> is the compact inline form of this (EN/PT\u003c/p>\n\u003cp>border buttons with an active state); a design-system version should generalize it to N options with\u003c/p>\n\u003cp>proper keyboard navigation and a bindable value.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>SegmentedControl\u003c/code> gains the behaviour tracked in [[ds-0053-segmented-control-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld (radiogroup/tablist semantics + arrow-key nav); \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0053-segmented-control-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/LanguageSwitcher.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0048","type":"story","title":"BottomNav component","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want a \u003cstrong>BottomNav\u003c/strong> (mobile tab bar) — a fixed bottom row of icon+label tabs\u003c/p>\n\u003cp>with an active highlight — so app shells get a first-class mobile navigation surface to complement the\u003c/p>\n\u003cp>existing \u003ccode>Topbar\u003c/code>/\u003ccode>Sidebar\u003c/code>. The website's \u003ccode>MobileBottomNav.svelte\u003c/code> is the reference: a fixed grid of\u003c/p>\n\u003cp>icon+label items, semi-transparent blurred background, active-state highlight, and safe-area inset support\u003c/p>\n\u003cp>for notched devices.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>BottomNav\u003c/code> gains the behaviour tracked in [[ds-0054-bottom-nav-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> size tokens (and the shell height tokens) and respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld (\u003ccode>aria-current\u003c/code>, hit-target sizing); \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0054-bottom-nav-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/MobileBottomNav.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":0},{"id":"DS-0049","type":"story","title":"Image component","status":"backlog","priority":"low","tags":["ui","a11y","media"],"depends_on":[],"parent":null,"epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As a \u003ccode>dssoca\u003c/code> consumer, I want an \u003cstrong>Image\u003c/strong> component — a responsive \u003ccode>&lt;picture&gt;\u003c/code> with \u003ccode>srcset\u003c/code>, lazy\u003c/p>\n\u003cp>loading, an aspect-ratio box to prevent layout shift, a loading skeleton, and an optional lightbox — so\u003c/p>\n\u003cp>content images render performantly and consistently. The website's \u003ccode>AppImage.svelte\u003c/code> is the reference\u003c/p>\n\u003cp>(responsive sources, lazy load, aspect-ratio calc, skeleton loader, and a PhotoSwipe lightbox). The\u003c/p>\n\u003cp>design-system version must decide whether to depend on PhotoSwipe or ship a lighter built-in overlay\u003c/p>\n\u003cp>(see the task's acceptance criteria).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003ccode>Image\u003c/code> gains the behaviour tracked in [[ds-0055-image-implementation]] (the per-component task)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Changes are additive — new file + barrel export; no existing component touched\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Lightbox dependency decision (PhotoSwipe vs built-in overlay) made and documented\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>New chrome reads \u003ccode>--ss-*\u003c/code> tokens; skeleton respects reduced-motion; respects zero border-radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>WCAG 2.2 AA upheld (alt text, dialog semantics for the lightbox); \u003ccode>pnpm test\u003c/code> green and \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Part of epic [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Concrete work is the single task [[ds-0055-image-implementation]]; the detailed checklist lives there.\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppImage.svelte\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":0},{"id":"DS-0050","type":"task","title":"Dropdown / Menu implementation","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0044","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Menu\u003c/code> (Dropdown) component at \u003ccode>src/lib/components/Menu.svelte\u003c/code>, generalizing the three\u003c/p>\n\u003cp>hand-rolled popovers on the website (\u003ccode>ThemeMenu\u003c/code>, \u003ccode>LanguageMenu\u003c/code>, \u003ccode>FloatNavButton\u003c/code>). Keep it token-driven\u003c/p>\n\u003cp>(zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped SCSS, Svelte 5 runes). Each acceptance-criteria line is one\u003c/p>\n\u003cp>concrete prop/state/behaviour.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Trigger + panel\u003c/strong> — a trigger snippet/button toggles a floating panel; panel rendered with the popover shadow token (\u003ccode>--ss-shadow-pop\u003c/code>), zero radius\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Items model\u003c/strong> — \u003ccode>items: MenuItem[]\u003c/code> with \u003ccode>{ id, label, icon?, disabled?, selected?, onSelect }\u003c/code>; render a checkmark/active marker for \u003ccode>selected\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Open/close control\u003c/strong> — \u003ccode>open\u003c/code> bindable + uncontrolled fallback; close on item select, click-outside, and \u003ccode>Esc\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Keyboard nav\u003c/strong> — roving focus with \u003ccode>ArrowUp\u003c/code>/\u003ccode>ArrowDown\u003c/code>/\u003ccode>Home\u003c/code>/\u003ccode>End\u003c/code>, \u003ccode>Enter\u003c/code>/\u003ccode>Space\u003c/code> to activate; focus returns to trigger on close\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>ARIA\u003c/strong> — trigger \u003ccode>aria-haspopup=\"menu\"\u003c/code> + \u003ccode>aria-expanded\u003c/code>/\u003ccode>aria-controls\u003c/code>; panel \u003ccode>role=\"menu\"\u003c/code>, items \u003ccode>role=\"menuitem\"\u003c/code> (or \u003ccode>menuitemradio\u003c/code> when selectable)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Placement\u003c/strong> — \u003ccode>align\u003c/code> (start|end) and \u003ccode>side\u003c/code> (bottom|top); reads size tokens so it rescales across sm/md/lg\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('Menu', size)\u003c/code> (\u003ccode>src/lib/config.ts\u003c/code>)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code> with \u003ccode>MenuItem\u003c/code> type\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests added in \u003ccode>test/unit/Menu.svelte.test.ts\u003c/code> (+ harness if needed); \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Docs: \u003ccode>Menu\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code> (\u003ccode>COMPONENTS\u003c/code>); \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0044-dropdown-menu-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Sources: \u003ccode>passoca/src/lib/components/{ThemeMenu,LanguageMenu,FloatNavButton}.svelte\u003c/code>.\u003c/li>\n\u003cli>Consider whether \u003ccode>Topbar\u003c/code>'s existing command-menu affordance should later consume this primitive (follow-up, not this task).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":0},{"id":"DS-0051","type":"task","title":"Accordion implementation","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0045","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Accordion\u003c/code> component at \u003ccode>src/lib/components/Accordion.svelte\u003c/code> (with item children), based on\u003c/p>\n\u003cp>the website's \u003ccode>AppExtension.svelte\u003c/code> but generalized to multiple panels. Keep it token-driven (zero radius,\u003c/p>\n\u003cp>\u003ccode>--ss-*\u003c/code> size + motion tokens, scoped SCSS, Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Header + content\u003c/strong> — each item has a clickable header (label + chevron) and an animated content region; chevron rotates 180° on open\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Animated reveal\u003c/strong> — expand/collapse uses a token-driven duration (\u003ccode>--ss-dur*\u003c/code>) and easing (\u003ccode>--ss-ease\u003c/code>); collapses to instant under \u003ccode>prefers-reduced-motion\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Single vs multi\u003c/strong> — \u003ccode>multiple?: boolean\u003c/code> (default single-open, where opening one closes the others)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Controlled + uncontrolled\u003c/strong> — \u003ccode>value\u003c/code> bindable (open item id, or array when \u003ccode>multiple\u003c/code>) with uncontrolled fallback; \u003ccode>onChange\u003c/code> callback\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Keyboard + ARIA\u003c/strong> — header is a \u003ccode>&lt;button&gt;\u003c/code> with \u003ccode>aria-expanded\u003c/code>/\u003ccode>aria-controls\u003c/code>; Enter/Space toggle; content region has \u003ccode>role=\"region\"\u003c/code> + \u003ccode>aria-labelledby\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('Accordion', size)\u003c/code>; padding/typography from size tokens\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code> (+ item types)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests added in \u003ccode>test/unit/Accordion.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Docs: \u003ccode>Accordion\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0045-accordion-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppExtension.svelte\u003c/code> (uses \u003ccode>max-height\u003c/code> + margin animation; consider a more robust grid-rows or height-auto technique).\u003c/li>\n\u003c/ul>","acTotal":9,"acDone":0},{"id":"DS-0052","type":"task","title":"Link implementation","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0046","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Link\u003c/code> component at \u003ccode>src/lib/components/Link.svelte\u003c/code>, porting the signature treatment from the\u003c/p>\n\u003cp>website's \u003ccode>AppLink.svelte\u003c/code>. Keep it token-driven (zero radius, \u003ccode>--ss-*\u003c/code> color/motion tokens, scoped SCSS,\u003c/p>\n\u003cp>Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Animated underline\u003c/strong> — pseudo-element underline that reveals on hover/focus with \u003ccode>--ss-ease\u003c/code> + a glow via box-shadow using \u003ccode>--ss-primary\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>href\u003c/code> + content\u003c/strong> — renders an \u003ccode>&lt;a&gt;\u003c/code>; accepts children; forwards \u003ccode>rest\u003c/code> attributes\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>external?\u003c/code>\u003c/strong> — when true (or auto-detected for off-site URLs) sets \u003ccode>target=\"_blank\"\u003c/code> + \u003ccode>rel=\"noopener noreferrer\"\u003c/code> and appends the \u003ccode>external\u003c/code> icon (\u003ccode>Icon.svelte\u003c/code>)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>variant\u003c/code>\u003c/strong> — \u003ccode>inline\u003c/code> (default, underline treatment) and \u003ccode>button\u003c/code> (solid primary, no underline) — note: do NOT duplicate \u003ccode>Button\u003c/code>; this is a link styled as a button\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>States\u003c/strong> — hover, \u003ccode>:focus-visible\u003c/code> (visible ring, not just underline), visited; honours reduced-motion\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('Link', size)\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests added in \u003ccode>test/unit/Link.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Docs: \u003ccode>Link\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0046-link-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppLink.svelte\u003c/code>.\u003c/li>\n\u003cli>Clarify the boundary with \u003ccode>Button\u003c/code> in docs: \u003ccode>Link\u003c/code> is for navigation, \u003ccode>Button\u003c/code> for actions; \u003ccode>variant=\"button\"\u003c/code> is purely visual.\u003c/li>\n\u003c/ul>","acTotal":9,"acDone":0},{"id":"DS-0053","type":"task","title":"SegmentedControl implementation","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0047","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>SegmentedControl\u003c/code> component at \u003ccode>src/lib/components/SegmentedControl.svelte\u003c/code>, generalizing the\u003c/p>\n\u003cp>website's \u003ccode>LanguageSwitcher.svelte\u003c/code> (compact EN/PT toggle) into an N-option control. Keep it token-driven\u003c/p>\n\u003cp>(zero radius, \u003ccode>--ss-*\u003c/code> size tokens, scoped SCSS, Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Options model\u003c/strong> — \u003ccode>options: SegmentOption[]\u003c/code> with \u003ccode>{ value, label, icon?, disabled? }\u003c/code>; renders a row of segments\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Selection\u003c/strong> — \u003ccode>value\u003c/code> bindable + \u003ccode>onChange\u003c/code>; selected segment visually highlighted (token-driven fill, zero radius)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Keyboard + ARIA\u003c/strong> — \u003ccode>role=\"radiogroup\"\u003c/code> with \u003ccode>role=\"radio\"\u003c/code> segments (or \u003ccode>tablist\u003c/code>/\u003ccode>tab\u003c/code> when used for views); arrow keys move + select, roving tabindex\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Density\u003c/strong> — compact by default; segment padding/typography from size tokens so it rescales across sm/md/lg\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>fullWidth?\u003c/code>\u003c/strong> — segments stretch to fill container (equal widths) vs hug content\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('SegmentedControl', size)\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code> with \u003ccode>SegmentOption\u003c/code> type\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests added in \u003ccode>test/unit/SegmentedControl.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Docs: \u003ccode>SegmentedControl\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0047-segmented-control-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/LanguageSwitcher.svelte\u003c/code>.\u003c/li>\n\u003cli>Pick radiogroup vs tablist semantics based on intended use; document both patterns.\u003c/li>\n\u003c/ul>","acTotal":9,"acDone":0},{"id":"DS-0054","type":"task","title":"BottomNav implementation","status":"backlog","priority":"low","tags":["ui","a11y"],"depends_on":[],"parent":"DS-0048","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>BottomNav\u003c/code> component at \u003ccode>src/lib/components/BottomNav.svelte\u003c/code>, based on the website's\u003c/p>\n\u003cp>\u003ccode>MobileBottomNav.svelte\u003c/code>. Keep it token-driven (zero radius, \u003ccode>--ss-*\u003c/code> size + shell tokens, scoped SCSS,\u003c/p>\n\u003cp>Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Items model\u003c/strong> — \u003ccode>items: NavItem[]\u003c/code> with \u003ccode>{ id, label, icon (IconName), href?, badge? }\u003c/code>; rendered as an equal-width row of icon+label tabs\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Active state\u003c/strong> — \u003ccode>active\u003c/code> (item id) + \u003ccode>onSelect\u003c/code>; active item highlighted and marked \u003ccode>aria-current=\"page\"\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Fixed shell affordance\u003c/strong> — fixed to the viewport bottom with blurred/elevated background; height from a shell size token; reads \u003ccode>--ss-*\u003c/code> so it rescales\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Safe-area inset\u003c/strong> — bottom padding uses \u003ccode>env(safe-area-inset-bottom)\u003c/code> for notched devices\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Hit targets\u003c/strong> — each tab meets the ≥44px touch-target guideline (WCAG 2.5.8) at md/lg\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>ARIA\u003c/strong> — \u003ccode>&lt;nav aria-label&gt;\u003c/code> wrapping a list; links/buttons per item; \u003ccode>aria-current\u003c/code> on active\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('BottomNav', size)\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code> with \u003ccode>NavItem\u003c/code> type\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests added in \u003ccode>test/unit/BottomNav.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Docs: \u003ccode>BottomNav\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0048-bottom-nav-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/MobileBottomNav.svelte\u003c/code>.\u003c/li>\n\u003cli>Complements existing shell components \u003ccode>Topbar\u003c/code>/\u003ccode>Sidebar\u003c/code>; reuse \u003ccode>Icon.svelte\u003c/code> and any shared shell tokens (\u003ccode>--ss-shell-*\u003c/code>).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":0},{"id":"DS-0055","type":"task","title":"Image implementation","status":"backlog","priority":"low","tags":["ui","a11y","media"],"depends_on":[],"parent":"DS-0049","epic":"DS-0043","created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Build a new \u003ccode>Image\u003c/code> component at \u003ccode>src/lib/components/Image.svelte\u003c/code>, based on the website's \u003ccode>AppImage.svelte\u003c/code>\u003c/p>\n\u003cp>but decoupled from its bespoke image API. Keep it token-driven (zero radius, \u003ccode>--ss-*\u003c/code> tokens, scoped SCSS,\u003c/p>\n\u003cp>Svelte 5 runes).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Responsive sources\u003c/strong> — accepts \u003ccode>src\u003c/code> + optional \u003ccode>srcset\u003c/code>/\u003ccode>sizes\u003c/code> (or a \u003ccode>sources[]\u003c/code> for \u003ccode>&lt;picture&gt;\u003c/code>); renders semantic markup with required \u003ccode>alt\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>No layout shift\u003c/strong> — aspect-ratio box from \u003ccode>width\u003c/code>/\u003ccode>height\u003c/code> or an explicit \u003ccode>ratio\u003c/code> prop reserves space before load\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Lazy + decode\u003c/strong> — \u003ccode>loading=\"lazy\"\u003c/code> + \u003ccode>decoding=\"async\"\u003c/code> by default (overridable for above-the-fold)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Loading skeleton\u003c/strong> — token-driven placeholder shown until load/error; respects \u003ccode>prefers-reduced-motion\u003c/code>; error fallback state\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>Lightbox (optional)\u003c/strong> — \u003ccode>lightbox?: boolean\u003c/code>; \u003cstrong>dependency decision documented\u003c/strong>: depend on PhotoSwipe (optional/peer dep) vs ship a lightweight built-in dialog overlay (recommend built-in to keep zero-dep). Lightbox uses \u003ccode>role=\"dialog\"\u003c/code>, focus trap, \u003ccode>Esc\u003c/code> to close\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>\u003cstrong>\u003ccode>size?: Size\u003c/code>\u003c/strong> prop resolved via \u003ccode>resolveComponentSize('Image', size)\u003c/code> where size affects skeleton/chrome (not intrinsic image dims)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Exported from \u003ccode>src/lib/index.ts\u003c/code>\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Tests added in \u003ccode>test/unit/Image.svelte.test.ts\u003c/code>; \u003ccode>pnpm test\u003c/code> green, \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Docs: \u003ccode>Image\u003c/code> page added to \u003ccode>documentation/src/lib/docs.config.ts\u003c/code>; \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Story: [[ds-0049-image-component]] · Epic: [[DS-0043-new-components-from-website]].\u003c/li>\n\u003cli>Source: \u003ccode>passoca/src/lib/components/Base/AppImage.svelte\u003c/code> (fetches variants from an API + PhotoSwipe — strip the API coupling; keep the responsive/lightbox UX).\u003c/li>\n\u003cli>Heaviest of the six; the lightbox dependency decision should be resolved before starting (keep dssoca's zero-runtime-dep posture in mind).\u003c/li>\n\u003c/ul>","acTotal":9,"acDone":0},{"id":"DS-0007","type":"story","title":"Interactive component explorer (Storybook)","status":"in-progress","priority":"high","tags":["tooling","docs","dx"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I can browse and exercise components in isolation in a\u003c/p>\n\u003cp>Storybook, toggling the two design axes (color \u003ccode>dark\u003c/code>/\u003ccode>light\u003c/code>, density \u003ccode>comfy\u003c/code>/\u003ccode>compact\u003c/code>)\u003c/p>\n\u003cp>from the toolbar, so I can develop, document, and visually review components without wiring\u003c/p>\n\u003cp>them into the showcase app. Covers all 14 components.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Storybook (v10, \u003ccode>@storybook/sveltekit\u003c/code>) runs against the existing Vite/SvelteKit + Svelte 5 setup\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm storybook\u003c/code> (dev) and \u003ccode>pnpm build-storybook\u003c/code> (static) scripts exist; static build succeeds\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stories authored in Svelte CSF (\u003ccode>@storybook/addon-svelte-csf\u003c/code>) + autodocs (\u003ccode>@storybook/addon-docs\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Toolbar globals for both axes apply \u003ccode>data-theme\u003c/code>/\u003ccode>data-density\u003c/code> to \u003ccode>&lt;html&gt;\u003c/code> so stories recolor/rescale via the real cascade\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>Button\u003c/code> page with Primary / Secondary / Ghost / Disabled stories and live Controls (variant, type, disabled, label)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>A page for \u003cstrong>every\u003c/strong> component (14 total): Badge, Button, Card, EmptyState, Icon, Input, LogStream, MetricTile, PassocaMark, ServiceCard, Sidebar, Sparkline, Toaster, Topbar — each with multiple stories covering real variants/states\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Stories live in \u003ccode>src/stories/\u003c/code> (not \u003ccode>src/lib/\u003c/code>) so \u003ccode>svelte-package\u003c/code> never publishes them — verified \u003ccode>pnpm pack\u003c/code> tarball contains no story/Storybook files\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green (121) and \u003ccode>pnpm pack\u003c/code> clean; full \u003ccode>pnpm build-storybook\u003c/code> succeeds\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Config: \u003ccode>.storybook/main.ts\u003c/code> (stories glob \u003ccode>src/**\u003c/code>, framework \u003ccode>@storybook/sveltekit\u003c/code>),\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>.storybook/preview.ts\u003c/code> (imports \u003ccode>theme.css\u003c/code>, axis toolbar globals + decorator).\u003c/p>\n\u003cul>\n\u003cli>Story: \u003ccode>src/stories/Button.stories.svelte\u003c/code> — \u003ccode>Button\u003c/code> takes its label as a child snippet,\u003c/li>\n\u003c/ul>\n\u003cp>  so a shared \u003ccode>template\u003c/code> snippet + \u003ccode>label\u003c/code> arg drives the text via Controls.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>pnpm-workspace.yaml\u003c/code> \u003ccode>allowBuilds: { esbuild: true }\u003c/code> lets pnpm 11 run esbuild's postinstall\u003c/li>\n\u003c/ul>\n\u003cp>  (Storybook/Vite need the native binary).\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>/storybook-static\u003c/code> gitignored. CI still runs \u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm pack\u003c/code> only; Storybook build\u003c/li>\n\u003c/ul>\n\u003cp>  is not wired into CI yet (follow-up if desired).\u003c/p>\n\u003cul>\n\u003cli>Interactive notes: \u003ccode>Input\u003c/code> value is \u003ccode>$bindable\u003c/code> (typed one-way per story; the binding falls\u003c/li>\n\u003c/ul>\n\u003cp>  back to the child). \u003ccode>Sidebar\u003c/code>/\u003ccode>Topbar\u003c/code> are controlled (parent owns \u003ccode>active\u003c/code>) — each story sets\u003c/p>\n\u003cp>  its own active item and forwards the callback to the actions panel. \u003ccode>Toaster\u003c/code> reads the\u003c/p>\n\u003cp>  module-singleton store, so its Playground story fires the \u003ccode>toast\u003c/code> API from trigger buttons.\u003c/p>\n\u003cul>\n\u003cli>Avoid \u003ccode>$state()\u003c/code> inside \u003ccode>{@const}\u003c/code> in story markup — the Svelte CSF static indexer can't parse\u003c/li>\n\u003c/ul>\n\u003cp>  it (SB_SVELTE_CSF_PARSER_EXTRACT_SVELTE_0009); use plain controlled props instead.\u003c/p>","acTotal":8,"acDone":8},{"id":"DS-0043","type":"epic","title":"New components from the passoca website","status":"in-progress","priority":"high","tags":["ui","epic","components"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-09","updated":"2026-06-09","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Promote the remaining \u003ccode>passoca\u003c/code>-website UI patterns that have \u003cstrong>no current dssoca equivalent\u003c/strong> into\u003c/p>\n\u003cp>first-class, token-driven components. An audit of the website (\u003ccode>/home/passoca/dev/passoca\u003c/code>, SvelteKit +\u003c/p>\n\u003cp>Svelte 5, ~26 components) against this design system (13 shipped) showed most pieces are already covered\u003c/p>\n\u003cp>(Header→\u003ccode>Topbar\u003c/code>, AppButton→\u003ccode>Button\u003c/code>, AppInput→\u003ccode>Input\u003c/code>, Hero/AppSVG→\u003ccode>Icon\u003c/code>, Post/ProjectCard composable\u003c/p>\n\u003cp>from \u003ccode>Card\u003c/code>/\u003ccode>Badge\u003c/code>). This epic groups the six genuinely-missing components, one \u003cstrong>story per component\u003c/strong>\u003c/p>\n\u003cp>(the user-facing need) and a single \u003cstrong>task per component\u003c/strong> whose acceptance criteria enumerate the concrete\u003c/p>\n\u003cp>props/states/behaviours to build.\u003c/p>\n\u003cp>Scope, in order: \u003cstrong>Dropdown / Menu\u003c/strong> (generalizes \u003ccode>ThemeMenu\u003c/code>/\u003ccode>LanguageMenu\u003c/code>/\u003ccode>FloatNavButton\u003c/code>),\u003c/p>\n\u003cp>\u003cstrong>Accordion\u003c/strong> (\u003ccode>AppExtension\u003c/code>), \u003cstrong>Link\u003c/strong> (\u003ccode>AppLink\u003c/code>), \u003cstrong>SegmentedControl\u003c/strong> (\u003ccode>LanguageSwitcher\u003c/code>),\u003c/p>\n\u003cp>\u003cstrong>BottomNav\u003c/strong> (\u003ccode>MobileBottomNav\u003c/code>), and \u003cstrong>Image\u003c/strong> (\u003ccode>AppImage\u003c/code>). Every component honours the house rules:\u003c/p>\n\u003cp>\u003cstrong>zero border-radius\u003c/strong>, \u003ccode>--ss-*\u003c/code> tokens (new chrome must rescale across sm/md/lg), \u003ccode>.ss-*\u003c/code> identity\u003c/p>\n\u003cp>prefix, scoped SCSS, Svelte 5 runes, and WCAG 2.2 AA.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>All 6 component stories (DS-0044 → DS-0049) and their tasks (DS-0050 → DS-0055) created and triaged\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Each new component is additive (does not alter existing components/exports)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Per the testing RULE: every implemented task adds tests under \u003ccode>test/unit/\u003c/code> (+ harness) and keeps \u003ccode>pnpm test\u003c/code> green / \u003ccode>pnpm pack\u003c/code> clean\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Per the docs RULE: each component gets a \u003ccode>documentation/src/lib/docs.config.ts\u003c/code> page (+ \u003ccode>docs/tokens.md\u003c/code> for any new tokens), \u003ccode>pnpm docs:test\u003c/code> green\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Each is exported from \u003ccode>src/lib/index.ts\u003c/code> (with public types where applicable)\u003c/li>\n\u003cli class=\"\">\u003cspan class=\"box\">\u003c/span>Board rebuilt (\u003ccode>node build.mjs\u003c/code>) as items move\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Scaffold landed\u003c/strong> (\u003ccode>feature/new-components-scaffold\u003c/code>): per-component token partials under\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>src/styles/components/\u003c/code> + a joiner, stub components wired into the barrel / \u003ccode>COMPONENT_NAMES\u003c/code> /\u003c/p>\n\u003cp>  docs assembler. This pre-slots every shared file so the six implementation PRs (DS-0050…0055) run\u003c/p>\n\u003cp>  in parallel without merge conflicts — each touches only files unique to its component.\u003c/p>\n\u003cul>\n\u003cli>Sibling epic [[DS-0016-components-improvements]] covered *improving existing* components; this one *adds new* ones.\u003c/li>\n\u003cli>Source components live in \u003ccode>/home/passoca/dev/passoca/src/lib/components/\u003c/code>.\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":0},{"id":"DS-0001","type":"story","title":"Themeable design system: color + density axes","status":"done","priority":"high","tags":["ui","theme"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I import one \u003ccode>theme.css\u003c/code> and get a coherent look (signal green on\u003c/p>\n\u003cp>near-black, monospace-forward) configured along two orthogonal axes — color\u003c/p>\n\u003cp>(\u003ccode>dark\u003c/code>/\u003ccode>light\u003c/code>) and density (\u003ccode>comfy\u003c/code>/\u003ccode>compact\u003c/code>) — so a content app and the dense\u003c/p>\n\u003cp>hub dashboard share tokens without forking styles.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Color axis via \u003ccode>data-theme\u003c/code> (\u003ccode>dark\u003c/code> default · \u003ccode>light\u003c/code>) swaps surface/foreground tokens only\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Density axis via \u003ccode>data-density\u003c/code> (\u003ccode>comfy\u003c/code> default · \u003ccode>compact\u003c/code>) rescales chrome paddings/gaps/heights, not colors or content typography\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All four combinations (dark/comfy, dark/compact, light/comfy, light/compact) are valid and cascade from any ancestor (usually \u003ccode>&lt;html&gt;\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>applyDesignConfig({ theme, density })\u003c/code> merges over current config and writes to \u003ccode>&lt;html&gt;\u003c/code> at runtime\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>designAttributes({ ... })\u003c/code> returns SSR-safe attributes to spread in markup (no hydration flash)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius on every token (house rule, never overridden)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/theme.css\u003c/code> (exported as \u003ccode>dssoca/theme.css\u003c/code>) — token source of truth\u003c/li>\n\u003cli>\u003ccode>src/lib/config.ts\u003c/code> — \u003ccode>applyDesignConfig\u003c/code> / \u003ccode>designAttributes\u003c/code>, re-exported from package root\u003c/li>\n\u003cli>Content typography (\u003ccode>h1\u003c/code>–\u003ccode>h3\u003c/code>, \u003ccode>--hs-size-*\u003c/code>, \u003ccode>--hs-s-*\u003c/code>) is density-independent; only \u003ccode>--hs-leading\u003c/code> differs (1.5 comfy / 1.3 compact)\u003c/li>\n\u003cli>See \u003ccode>DESIGN.md\u003c/code> + \u003ccode>docs/themes.md\u003c/code> / \u003ccode>docs/tokens.md\u003c/code>\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0002","type":"story","title":"Reusable Svelte 5 component set (~14 components)","status":"done","priority":"high","tags":["ui"],"depends_on":["DS-0001"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I import ready-made Svelte 5 components from \u003ccode>dssoca\u003c/code> instead\u003c/p>\n\u003cp>of rebuilding primitives per project, so every app looks consistent and picks\u003c/p>\n\u003cp>up the active theme/density automatically.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>~14 components shipped: Badge, Button, Card, EmptyState, Icon, Input, LogStream, MetricTile, PassocaMark, ServiceCard, Sidebar, Sparkline, Toaster, Topbar\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All exported from the package root (\u003ccode>import { Button, Card } from 'dssoca'\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Components are unstyled wrappers over global \u003ccode>.hub-*\u003c/code> classes in \u003ccode>theme.css\u003c/code> — they inherit whatever theme/density is active on an ancestor\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Icon set includes a \u003ccode>book\u003c/code> glyph\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Built to \u003ccode>dist\u003c/code> via \u003ccode>svelte-package\u003c/code> for consumers\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Vitest + @testing-library/svelte suite covers the components\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/\u003c/code> — one \u003ccode>.svelte\u003c/code> file per component\u003c/li>\n\u003cli>\u003ccode>src/lib/index.ts\u003c/code> — package barrel export\u003c/li>\n\u003cli>Runner: \u003ccode>pnpm test\u003c/code> (Vitest, jsdom) — per the testing rule, extend on any change\u003c/li>\n\u003c/ul>","acTotal":6,"acDone":6},{"id":"DS-0003","type":"story","title":"Toast notifications (Toaster + toast API)","status":"done","priority":"low","tags":["ui"],"depends_on":["DS-0002"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I mount a single \u003ccode>&lt;Toaster /&gt;\u003c/code> and call an imperative \u003ccode>toast(...)\u003c/code>\u003c/p>\n\u003cp>from anywhere to surface transient feedback (success/error), so apps get consistent\u003c/p>\n\u003cp>notifications without wiring their own state.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>&lt;Toaster /&gt;\u003c/code> component renders the stack and is exported from the package root\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Imperative \u003ccode>toast\u003c/code> API enqueues notifications from any module (no prop drilling)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Toasts honor the active theme/density and the zero border-radius rule\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Used by apps as the standard channel for error/success feedback\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/Toaster.svelte\u003c/code> (component) + \u003ccode>src/lib/toast.svelte.ts\u003c/code> (reactive store + \u003ccode>toast\u003c/code> API)\u003c/li>\n\u003cli>Backs the project-wide error-handling rule (uniform toast feedback across apps)\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0004","type":"story","title":"EmptyState + consistent error/empty affordances","status":"done","priority":"low","tags":["ui"],"depends_on":["DS-0002"],"parent":null,"epic":null,"created":"2026-06-05","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As an app author, I drop in an \u003ccode>EmptyState\u003c/code> for \"no data\" and \"something went wrong\"\u003c/p>\n\u003cp>cases, so empty lists and failed fetches render a consistent, on-theme affordance\u003c/p>\n\u003cp>instead of a blank screen in every app.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>EmptyState\u003c/code> component exported from the package root with title/message slots\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Renders on-theme (signal-green/near-black) and follows the zero border-radius rule\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Picks up active density (comfy/compact) like the rest of the set\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Used by apps for empty lists and degraded/error states (e.g. when a service is down)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003ccode>src/lib/components/EmptyState.svelte\u003c/code>\u003c/li>\n\u003cli>Pairs with the Toaster (DS-0003) to satisfy the repo-wide error-handling rule\u003c/li>\n\u003c/ul>","acTotal":4,"acDone":4},{"id":"DS-0005","type":"task","title":"Rename --hs- tokens + hub-* classes to ss-","status":"done","priority":"low","tags":["ui","theme","breaking"],"depends_on":[],"parent":"DS-0001","epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>The design system was extracted from the \u003ccode>hubssoca\u003c/code> monorepo as a lift-and-shift, keeping the\u003c/p>\n\u003cp>original \u003ccode>--hs-\u003c/code> CSS custom-property prefix and the global \u003ccode>hub-*\u003c/code> shell classes (e.g. \u003ccode>.ss-topbar\u003c/code>,\u003c/p>\n\u003cp>\u003ccode>.ss-panel\u003c/code>). For the standalone \u003ccode>dssoca\u003c/code> identity these were renamed to a neutral \u003ccode>ss-\u003c/code> prefix\u003c/p>\n\u003cp>(\u003ccode>--hs-\u003c/code> → \u003ccode>--ss-\u003c/code>, \u003ccode>hub-\u003c/code> → \u003ccode>ss-\u003c/code>).\u003c/p>\n\u003cp>This is a \u003cstrong>breaking change\u003c/strong> for any consumer that referenced the old tokens/classes directly. Done\u003c/p>\n\u003cp>in the working tree + committed; not yet published — the next npm release (≥ 0.2.0) ships it with a\u003c/p>\n\u003cp>migration note.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All \u003ccode>--hs-*\u003c/code> custom properties renamed to \u003ccode>--ss-*\u003c/code> in \u003ccode>src/lib/theme.css\u003c/code> and every component (472 refs)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>All global \u003ccode>hub-*\u003c/code> classes renamed to \u003ccode>ss-*\u003c/code> in \u003ccode>theme.css\u003c/code> and component markup (166 refs)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Tests updated to the new names; \u003ccode>pnpm test\u003c/code> green (121/121)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>DESIGN.md / docs / README references updated to \u003ccode>--ss-\u003c/code> / \u003ccode>ss-\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Release notes flag the breaking rename when the next version is published (dssoca@0.2.0)\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>Prefix chosen: \u003ccode>ss-\u003c/code> (soca system), not \u003ccode>ds-\u003c/code> as originally scoped\u003c/li>\n\u003cli>Mechanical sweep: \u003ccode>--hs-\u003c/code> → \u003ccode>--ss-\u003c/code>, \u003ccode>hub-\u003c/code> → \u003ccode>ss-\u003c/code> across \u003ccode>src/ test/ docs/\u003c/code> + README/DESIGN; prose \"hub\" left intact\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0006","type":"task","title":"CI pipeline + git-flow + agent docs (CLAUDE.md)","status":"done","priority":"high","tags":["infra","ci","docs"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-06","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>Set the repo up for collaborative/agent work: a CLAUDE.md operating guide, GitHub Actions CI on\u003c/p>\n\u003cp>every PR, and the git-flow branching model with protected branches.\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>CLAUDE.md\u003c/code> — agent operating instructions (stack, layout, house rules, commands, git-flow, releasing)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>.github/workflows/ci.yml\u003c/code> — runs \u003ccode>pnpm test\u003c/code> + \u003ccode>pnpm pack\u003c/code> on every PR and pushes to main/develop\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>packageManager\u003c/code> pinned in \u003ccode>package.json\u003c/code> (pnpm@11.1.3) for reproducible CI\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>git-flow: \u003ccode>develop\u003c/code> branch created off \u003ccode>main\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Branch protection on \u003ccode>main\u003c/code> + \u003ccode>develop\u003c/code>: require PR + green \u003ccode>test\u003c/code> check before merge\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>CI deliberately skips \u003ccode>pnpm check\u003c/code> (svelte-check) — pre-existing \u003ccode>$lib\u003c/code> alias error from the library template, not a real type bug\u003c/li>\n\u003cli>Solo-friendly protection: 0 required approvals (owner self-merges once CI is green)\u003c/li>\n\u003c/ul>","acTotal":5,"acDone":5},{"id":"DS-0008","type":"story","title":"Sass-based styling pipeline","status":"done","priority":"high","tags":["styling","sass","build","refactor"],"depends_on":[],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I author the global styling in \u003cstrong>Sass\u003c/strong> instead of\u003c/p>\n\u003cp>hand-written CSS — split into partials, with nesting and mixins for the repeated rule patterns —\u003c/p>\n\u003cp>while keeping the published \u003ccode>dssoca/theme.css\u003c/code> output and the \u003ccode>--ss-*\u003c/code> token + \u003ccode>data-theme\u003c/code>/\u003c/p>\n\u003cp>\u003ccode>data-density\u003c/code> cascade model exactly as they are today. This also enables \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>\u003c/p>\n\u003cp>in components so the follow-up scoped-styles work (DS-0009) can use Sass from the start.\u003c/p>\n\u003cp>Foundational and \u003cstrong>non-breaking\u003c/strong>: the compiled CSS is functionally identical, so nothing\u003c/p>\n\u003cp>changes for consumers. Sequenced first so DS-0009 writes scoped SCSS directly rather than\u003c/p>\n\u003cp>rewriting every component twice (CSS then SCSS).\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>sass\u003c/code> added as a devDependency; \u003ccode>vitePreprocess()\u003c/code> enabled via the \u003ccode>preprocess\u003c/code> field in \u003ccode>svelte.config.js\u003c/code> (uses the already-installed \u003ccode>@sveltejs/vite-plugin-svelte\u003c/code>)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>src/lib/theme.css\u003c/code> reauthored as Sass partials under \u003ccode>src/styles/\u003c/code> (outside \u003ccode>src/lib\u003c/code>, so \u003ccode>svelte-package\u003c/code> never publishes them): \u003ccode>_tokens.scss\u003c/code>, \u003ccode>_base.scss\u003c/code>, \u003ccode>_layout.scss\u003c/code>, \u003ccode>_components.scss\u003c/code>, and a \u003ccode>theme.scss\u003c/code> entry that \u003ccode>@use\u003c/code>-s them\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>--ss-*\u003c/code> tokens remain \u003cstrong>explicit CSS custom properties\u003c/strong> (not Sass \u003ccode>$variables\u003c/code>, not generated from maps); Sass is used only for structure (partials/nesting/mixins). All four axis combinations (dark/light × comfy/compact) still recolor/rescale identically\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Zero border-radius and the \u003ccode>--ss-*\u003c/code> / \u003ccode>.ss-*\u003c/code> prefixes preserved (house rules)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>prepack\u003c/code> compiles \u003ccode>src/styles/theme.scss\u003c/code> → \u003ccode>dist/theme.css\u003c/code> via a \u003cstrong>Dart Sass CLI\u003c/strong> step run *after* \u003ccode>svelte-package\u003c/code>; the \u003ccode>./theme.css\u003c/code> → \u003ccode>./dist/theme.css\u003c/code> export is unchanged\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Component \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code> compiles through \u003ccode>svelte-package\u003c/code> once the preprocessor is set — no extra config (svelte-package preprocesses \u003ccode>.svelte\u003c/code>; only standalone \u003ccode>.scss\u003c/code> needs the separate CLI step)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Dev/showcase/Storybook imports updated to the \u003ccode>.scss\u003c/code> entry (Vite compiles on the fly): \u003ccode>src/routes/+page.svelte\u003c/code>, \u003ccode>.storybook/preview.ts\u003c/code>\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm pack\u003c/code> tarball contains \u003ccode>dist/theme.css\u003c/code> and \u003cstrong>no\u003c/strong> \u003ccode>.scss\u003c/code>; \u003ccode>pnpm test\u003c/code> green (121); \u003ccode>pnpm dev\u003c/code> + \u003ccode>pnpm build-storybook\u003c/code> render identically to before\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>version\u003c/code> bumped to \u003cstrong>0.2.1\u003c/strong> (patch — non-breaking); agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Why a separate CLI step:\u003c/strong> \u003ccode>svelte-package@2.5.8\u003c/code> only preprocesses \u003ccode>.svelte\u003c/code>/\u003ccode>.ts\u003c/code>/\u003ccode>.js\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  and copies everything else verbatim (\u003ccode>node_modules/@sveltejs/package/src/index.js:258,285\u003c/code>),\u003c/p>\n\u003cp>  so a standalone \u003ccode>theme.scss\u003c/code> would ship un-compiled. The Dart Sass CLI step produces the\u003c/p>\n\u003cp>  published \u003ccode>dist/theme.css\u003c/code>.\u003c/p>\n\u003cul>\n\u003cli>Keep token blocks hand-written/explicit (they are the documented source of truth in\u003c/li>\n\u003c/ul>\n\u003cp>  \u003ccode>docs/tokens.md\u003c/code>); don't DRY them into Sass maps/loops at the cost of readability.\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>_components.scss\u003c/code> is a staging home for the current \u003ccode>.ss-*\u003c/code> component rules — DS-0009 lifts\u003c/li>\n\u003c/ul>\n\u003cp>  each block out into its component, leaving this partial empty/removed. See [[DS-0009-scoped-component-styles]].\u003c/p>\n\u003cul>\n\u003cli>Follows the same \"source lives outside the published \u003ccode>src/lib\u003c/code>\" pattern used for \u003ccode>src/stories/\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  in [[DS-0007-storybook-component-explorer]].\u003c/p>","acTotal":9,"acDone":9},{"id":"DS-0009","type":"story","title":"Scoped component styles","status":"done","priority":"high","tags":["styling","refactor","breaking"],"depends_on":["DS-0008"],"parent":null,"epic":null,"created":"2026-06-06","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, each component owns its styling in a scoped\u003c/p>\n\u003cp>\u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code> block instead of relying on global \u003ccode>.ss-*\u003c/code> rules, so styles live next to\u003c/p>\n\u003cp>the markup they style and can't leak. The global stylesheet shrinks to what genuinely must be\u003c/p>\n\u003cp>global — \u003ccode>--ss-*\u003c/code> tokens, base/element styles, and app-shell/layout.\u003c/p>\n\u003cp>\u003cstrong>Breaking\u003c/strong> (→ \u003ccode>0.3.0\u003c/code>): the global \u003ccode>.ss-*\u003c/code> *component* rules are removed from the published\u003c/p>\n\u003cp>\u003ccode>theme.css\u003c/code>. Components still render correctly (they apply their own classes and consume tokens\u003c/p>\n\u003cp>via \u003ccode>var(--ss-*)\u003c/code>, which cascade through Svelte's scoped boundary). Only consumers who hand-wrote\u003c/p>\n\u003cp>raw \u003ccode>&lt;button class=\"ss-btn\"&gt;\u003c/code> against \u003ccode>theme.css\u003c/code> — instead of using the components — are\u003c/p>\n\u003cp>affected. Depends on [[DS-0008-sass-styling-pipeline]].\u003c/p>\n\u003ch4 class=\"md-h\">Acceptance criteria\u003c/h4>\n\u003cul class=\"md-checks\">\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Component-owned rules moved from the global \u003ccode>_components\u003c/code> partial into each component's \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>: Badge, Button, Card, Input, LogStream, MetricTile, ServiceCard, Sparkline, Topbar, Sidebar; EmptyState + Toaster normalized to the same convention. Icon and PassocaMark (SVG utilities) need little/no change\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003cstrong>Naming rule\u003c/strong> applied: \u003ccode>ss-\u003c/code> is reserved for component identity / non-generic design-system classes. Component roots keep their \u003ccode>.ss-*\u003c/code> name (\u003ccode>.ss-btn\u003c/code>, \u003ccode>.ss-badge\u003c/code>, \u003ccode>.ss-panel\u003c/code>, \u003ccode>.ss-input\u003c/code>, \u003ccode>.ss-field\u003c/code>, \u003ccode>.ss-metric\u003c/code>, \u003ccode>.ss-svc\u003c/code>, \u003ccode>.ss-spark\u003c/code>, \u003ccode>.ss-logs\u003c/code>, \u003ccode>.ss-topbar\u003c/code>, \u003ccode>.ss-side\u003c/code>, \u003ccode>.ss-toast(er)\u003c/code>, \u003ccode>.ss-empty\u003c/code>); generic internal sub-elements use plain scoped names (\u003ccode>.dot\u003c/code>, \u003ccode>.title\u003c/code>, \u003ccode>.head\u003c/code>, \u003ccode>.body\u003c/code>, \u003ccode>.msg\u003c/code>, \u003ccode>.icon\u003c/code>, \u003ccode>.bar\u003c/code>…)\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>.ss-panel-head\u003c/code> / \u003ccode>.ss-panel-body\u003c/code> (the only ss-prefixed *sub-element* classes) renamed to local \u003ccode>.head\u003c/code> / \u003ccode>.body\u003c/code>; Card's ~4 test assertions updated. All other \u003ccode>.ss-*\u003c/code> root selectors unchanged, so the rest of the suite is untouched\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>theme.css\u003c/code> retains only: \u003ccode>--ss-*\u003c/code> tokens, base/element resets + \u003ccode>.hs-*\u003c/code> typography, app-shell/layout classes (\u003ccode>.ss-app\u003c/code>, \u003ccode>.ss-main\u003c/code>, \u003ccode>.ss-pageHead\u003c/code>, \u003ccode>.ss-metrics\u003c/code>, \u003ccode>.ss-grid-2\u003c/code>, \u003ccode>.ss-svc-grid\u003c/code>, \u003ccode>.ss-footer\u003c/code>), and generic utilities (\u003ccode>.ss-line\u003c/code>). The migrated component rules are deleted from the global CSS\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Components consume \u003ccode>--ss-*\u003c/code> via \u003ccode>var()\u003c/code> inside scoped blocks; all four axis combinations recolor/rescale correctly; zero border-radius preserved\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>:global()\u003c/code> used where a component styles projected \u003ccode>{@render children()}\u003c/code> / snippet content — \u003cstrong>verified none needed\u003c/strong>: every component's CSS targets only its own wrapper elements (Card styles \u003ccode>.ss-panel\u003c/code>/\u003ccode>.head\u003c/code>/\u003ccode>.body\u003c/code>, not the projected body content), and the Storybook build reports zero \"Unused CSS selector\" warnings\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>Internal raw \u003ccode>.ss-\u003c/code> usages fixed: Toaster and Input stories use the real components; the bogus \u003ccode>.ss-btn--primary\u003c/code> class (never matched the real \u003ccode>.ss-btn.primary\u003c/code>) removed\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>DESIGN.md\u003c/code> + \u003ccode>CLAUDE.md\u003c/code> updated: replace the \"components are thin wrappers over global \u003ccode>.ss-*\u003c/code> classes\" framing with the scoped model + the \u003ccode>ss-\u003c/code>-for-identity naming rule + what stays global; reconcile \u003ccode>docs/themes.md\u003c/code> / \u003ccode>docs/tokens.md\u003c/code> if they reference the old model\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>pnpm test\u003c/code> green (only Card selectors changed); \u003ccode>pnpm pack\u003c/code> clean; showcase + Storybook render identically\u003c/li>\n\u003cli class=\"done\">\u003cspan class=\"box\">✓\u003c/span>\u003ccode>version\u003c/code> bumped to \u003cstrong>0.3.0\u003c/strong> (breaking) with a short migration note (raw \u003ccode>.ss-*\u003c/code> component classes removed — use the components); agile updated + \u003ccode>node agile/build.mjs\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch4 class=\"md-h\">Notes\u003c/h4>\n\u003cul>\n\u003cli>\u003cstrong>Why tests barely move:\u003c/strong> Svelte keeps the original class names in the DOM (adding a hash),\u003c/li>\n\u003c/ul>\n\u003cp>  so \u003ccode>querySelector('.ss-btn')\u003c/code> etc. still match as long as the class stays in markup. The only\u003c/p>\n\u003cp>  renames are the two \u003ccode>.ss-panel-*\u003c/code> sub-element classes.\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>Cascade is safe:\u003c/strong> CSS custom properties inherit through Svelte's scoped-style boundary\u003c/li>\n\u003c/ul>\n\u003cp>  (no shadow DOM) — already proven by the existing \u003ccode>EmptyState.svelte\u003c/code> scoped block.\u003c/p>\n\u003cul>\n\u003cli>Builds directly on [[DS-0008-sass-styling-pipeline]]: lift each block out of \u003ccode>_components.scss\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>  into its component's \u003ccode>&lt;style lang=\"scss\"&gt;\u003c/code>, then delete the staging partial.\u003c/p>\n\u003cul>\n\u003cli>Out of scope: renaming the legacy \u003ccode>.hs-*\u003c/code> typography prefix (stays global in base).\u003c/li>\n\u003c/ul>","acTotal":10,"acDone":10},{"id":"DS-0010","type":"story","title":"Custom documentation site (shadcn-style)","status":"done","priority":"high","tags":["docs","tooling","dx"],"depends_on":["DS-0011","DS-0012","DS-0013"],"parent":null,"epic":null,"created":"2026-06-07","updated":"2026-06-07","project":"DS","bodyHtml":"\u003ch4 class=\"md-h\">Description\u003c/h4>\n\u003cp>As the design-system maintainer, I want a \u003cstrong>custom documentation site\u003c/strong> — in the spirit of\u003c/p>\n\u003cp>\u003ca href=\"https://ui.shadcn.com/\" rel=\"noreferrer\">ui.shadcn.com\u003c/a> but for dssoca — that \u003cstrong>dogfoods the design system\u003c/strong> for\u003c/p>\n\u003cp>its own UI, covers only the content that exists today, and \u003cstrong>connects to Storybook\u003c/strong> by embedding\u003c/p>\n\u003cp>the live stories. Storybook stays the interactive playground; this site is th
